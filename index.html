<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Artemis II — Live Mission Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
            cursor: grab;
        }
        body:active { cursor: grabbing; }
        #canvas-container { width: 100vw; height: 100vh; }

        #hud {
            position: fixed; top: 0; left: 0; width: 100%;
            pointer-events: none; z-index: 10;
            padding: 24px 32px;
        }
        #hud-left { display: flex; flex-direction: column; gap: 4px; }
        .mission-title {
            font-size: 11px; font-weight: 600; letter-spacing: 5px;
            text-transform: uppercase; color: rgba(255,255,255,0.4);
        }
        .mission-name {
            font-size: 38px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #6ec6ff 60%, #ff6b35 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .mission-status {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
            text-transform: uppercase; color: #4cff91; margin-top: 2px;
        }
        .status-dot {
            width: 7px; height: 7px; background: #4cff91; border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 6px #4cff91; }
            50% { opacity: 0.3; box-shadow: 0 0 14px #4cff91; }
        }

        #telemetry {
            position: fixed; bottom: 28px; left: 32px; z-index: 10; pointer-events: none;
        }
        .telem-grid { display: grid; grid-template-columns: repeat(2, auto); gap: 10px; }
        .telem-card {
            background: rgba(10,12,20,0.7); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 14px 18px; min-width: 145px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .telem-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 6px;
        }
        .telem-value {
            font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fff;
        }
        .telem-unit {
            font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.35); margin-left: 3px;
        }


        #timeline {
            position: fixed; bottom: 28px; right: 32px; z-index: 10;
            pointer-events: auto; width: 340px;
        }
        .timeline-icon-row {
            position: absolute;
            top: -46px;
            right: 14px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }
        #btn-observer-angle,
        #btn-zoom-in,
        #btn-zoom-out,
        #btn-play-pause {
            width: 36px;
            height: 36px;
            min-width: 0;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: static;
        }
        #btn-observer-angle .hint-btn-icon {
            width: 17px;
            height: 17px;
        }
        .timeline-zoom-icon {
            width: 15px;
            height: 15px;
        }
        .timeline-zoom-icon {
            position: relative;
            display: inline-block;
        }
        .timeline-zoom-icon::before,
        .timeline-zoom-icon::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            background: currentColor;
            border-radius: 999px;
            transform: translate(-50%, -50%);
        }
        .timeline-zoom-icon::before {
            width: 13px;
            height: 1.8px;
        }
        .timeline-zoom-icon.plus::after {
            width: 1.8px;
            height: 13px;
        }
        .timeline-playback-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            font-size: 15px;
            line-height: 1;
            font-weight: 400;
            color: rgba(255,255,255,0.82);
        }
        #btn-play-pause.is-playing .timeline-playback-icon {
            color: #ff6b35;
        }
        .timeline-bar {
            background: rgba(10,12,20,0.7); border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px; padding: 16px 20px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .timeline-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .timeline-title {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
        }
        .timeline-met {
            font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #6ec6ff;
        }
        .timeline-date-row {
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px; margin-bottom: 12px;
        }
        .timeline-date-label {
            font-size: 9px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
        }
        .timeline-date-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: rgba(255,255,255,0.72);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 7px 10px;
            min-width: 146px;
        }
        .timeline-date-input::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.75);
            cursor: pointer;
        }
        #observerSpecs {
            position: fixed;
            right: 32px;
            bottom: 154px;
            width: 380px;
            max-width: calc(100vw - 32px);
            background: rgba(10,12,20,0.86);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px 18px 16px;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
            z-index: 20;
            pointer-events: auto;
            display: none;
        }
        #observerSpecs.open { display: block; }
        .observer-vantage-top {
            margin-bottom: 12px;
        }
        .observer-specs-header {
            margin-bottom: 12px;
        }
        .observer-specs-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
        }
        .observer-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.62);
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            transition: all 0.2s;
        }
        .observer-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .observer-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        .observer-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.34);
        }
        #vantagePoint,
        #observer-json {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.86);
            font-family: 'Inter', sans-serif;
            border-radius: 10px;
            outline: none;
        }
        #vantagePoint {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
        }
        #observer-json {
            min-height: 270px;
            resize: vertical;
            padding: 12px 13px;
            font-size: 11px;
            line-height: 1.55;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        .observer-specs-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 6px 0 12px;
        }
        #btn-hide-observer-specs {
            margin: 0;
        }
        .observer-specs-toggle-wrap.hidden {
            display: none;
        }
        #observer-specs-advanced {
            display: none;
        }
        #observer-specs-advanced.open {
            display: block;
        }
        .observer-note-wrap {
            margin-bottom: 10px;
        }
        .observer-actions {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            align-items: center;
        }
        .observer-note {
            font-size: 11px;
            line-height: 1.4;
            color: rgba(255,255,255,0.42);
        }
        .observer-btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .observer-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            height: 36px;
            min-height: 36px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.82);
            border-radius: 10px;
            padding: 0 12px;
            line-height: 1;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .observer-btn:hover {
            background: rgba(255,255,255,0.11);
            color: #fff;
        }
        .observer-btn.sim-active {
            background: rgba(255,107,53,0.16);
            border-color: rgba(255,107,53,0.3);
            color: #ff9a70;
        }
        .observer-btn.primary {
            background: rgba(110,198,255,0.14);
            border-color: rgba(110,198,255,0.28);
            color: #8cd4ff;
        }
        .observer-btn.primary:hover {
            background: rgba(110,198,255,0.2);
            color: #c3ebff;
        }
        .progress-track {
            width: 100%; position: relative; margin-bottom: 12px;
            height: 16px; display: flex; align-items: center;
        }
        .timeline-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 3px; border-radius: 2px; outline: none;
            cursor: pointer; pointer-events: auto;
            background: rgba(255,255,255,0.08);
        }
        .timeline-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 13px; height: 13px; border-radius: 50%;
            background: #fff; cursor: pointer; border: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
            margin-top: -5px;
        }
        .timeline-slider::-moz-range-thumb {
            width: 13px; height: 13px; border-radius: 50%;
            background: #fff; cursor: pointer; border: none;
            box-shadow: 0 0 12px rgba(255,255,255,0.7);
        }
        .timeline-slider::-webkit-slider-runnable-track {
            height: 3px; border-radius: 2px;
        }
        .timeline-slider::-moz-range-track {
            height: 3px; border-radius: 2px;
            background: rgba(255,255,255,0.08);
        }
        .phase-labels { display: flex; justify-content: space-between; }
        .phase-label {
            font-size: 8px; font-weight: 600; color: rgba(255,255,255,0.2); letter-spacing: 0.5px;
        }
        .phase-label.active { color: #6ec6ff; }

        #controls-hint {
            position: fixed; top: 28px; right: 32px; z-index: 10;
            pointer-events: auto; display: flex; flex-direction: column;
            gap: 5px; align-items: flex-end;
        }
        .hint-btn {
            background: rgba(10,12,20,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 7px 14px; min-width: 135px; text-align: center;
            color: rgba(255,255,255,0.45); font-size: 11px; font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer; backdrop-filter: blur(24px); transition: all 0.3s;
        }
        .hint-btn.icon-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .hint-btn-icon {
            width: 13px; height: 13px; display: inline-block; flex: 0 0 auto;
        }
        .hint-btn-icon svg {
            width: 100%; height: 100%; display: block;
        }
        .hint-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .hint-btn.active {
            background: rgba(110,198,255,0.12); border-color: rgba(110,198,255,0.25); color: #6ec6ff;
        }
        .hint-btn.sim-active {
            background: rgba(255,107,53,0.15); border-color: rgba(255,107,53,0.3); color: #ff8855;
        }
        .sim-group { position: relative; }
        .sim-dropdown {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 4px;
            background: rgba(10,12,20,0.85); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; overflow: hidden; min-width: 80px;
            z-index: 100;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        }
        .sim-dropdown.open { display: block; }
        .sim-opt {
            display: block; width: 100%; padding: 8px 14px; border: none;
            background: transparent; color: rgba(255,255,255,0.6); font-size: 11px;
            font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer;
            text-align: right; transition: all 0.2s;
        }
        .sim-opt:hover { background: rgba(255,107,53,0.15); color: #ff8855; }
        .sim-slider-wrap {
            display: none; align-items: center; gap: 8px; margin-top: 4px;
            pointer-events: auto;
        }
        .sim-slider-wrap.visible { display: flex; }
        .sim-slider-wrap input[type="range"] {
            -webkit-appearance: none; appearance: none;
            width: 120px; height: 3px; background: rgba(255,255,255,0.15);
            border-radius: 2px; outline: none; cursor: pointer;
        }
        .sim-slider-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 12px; height: 12px; border-radius: 50%;
            background: #ff8855; cursor: pointer; border: none;
        }
        .sim-slider-label {
            font-size: 10px; font-weight: 600; color: #ff8855;
            min-width: 55px; text-align: right; letter-spacing: 0.5px;
        }

        #loading {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: opacity 1.2s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loading-ring {
            width: 50px; height: 50px; border: 2px solid rgba(255,255,255,0.08);
            border-top-color: #6ec6ff; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 18px; font-size: 10px; letter-spacing: 4px;
            text-transform: uppercase; color: rgba(255,255,255,0.3);
        }

        .met-counter {
            font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.25); letter-spacing: 1.5px; margin-top: 4px;
        }

        /* Connection line indicator */
        .dist-line-label {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 2px;
            pointer-events: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">Initializing Tracker</div>
    </div>

    <div id="canvas-container"></div>

    <div id="hud">
        <div id="hud-left">
            <div class="mission-title">NASA &middot; CSA</div>
            <div class="mission-name" id="mission-name">ARTEMIS II</div>
            <div class="mission-status">
                <div class="status-dot"></div>
                <span id="phase-text">In Transit to Moon</span>
            </div>
            <div class="met-counter" id="met-counter">T+00:00:00:00</div>
        </div>
    </div>


    <div id="telemetry">
        <div class="telem-grid">
            <div class="telem-card">
                <div class="telem-label">Earth Distance</div>
                <div><span class="telem-value" id="dist-earth">—</span><span class="telem-unit">km</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Moon Distance</div>
                <div><span class="telem-value" id="dist-moon">—</span><span class="telem-unit">km</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Velocity</div>
                <div><span class="telem-value" id="velocity">—</span><span class="telem-unit">km/s</span></div>
            </div>
            <div class="telem-card">
                <div class="telem-label">Mission Day</div>
                <div><span class="telem-value" id="mission-day">—</span></div>
            </div>
        </div>
    </div>

    <div id="timeline">
        <div class="timeline-icon-row">
            <button class="hint-btn icon-btn" id="btn-observer-angle" onclick="openObserverSpecs()" aria-label="Open observer specs">
                <span class="hint-btn-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 8h3l1.7-2h6.6L17 8h3a2 2 0 0 1 2 2v7a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3v-7a2 2 0 0 1 2-2Z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                </span>
            </button>
            <button class="hint-btn icon-btn" id="btn-zoom-in" onclick="zoomIn()" aria-label="Zoom in">
                <span class="timeline-zoom-icon plus" aria-hidden="true"></span>
            </button>
            <button class="hint-btn icon-btn" id="btn-zoom-out" onclick="zoomOut()" aria-label="Zoom out">
                <span class="timeline-zoom-icon minus" aria-hidden="true"></span>
            </button>
            <button class="hint-btn icon-btn" id="btn-play-pause" onclick="togglePlayback()" aria-label="Pause playback">
                <span class="timeline-playback-icon" aria-hidden="true">&#10074;&#10074;</span>
            </button>
        </div>
        <div class="timeline-bar">
            <div class="timeline-header">
                <div class="timeline-title" id="timeline-title-text">Mission Time</div>
                <div class="timeline-met" id="met-display">—</div>
            </div>
            <div class="timeline-date-row">
                <label class="timeline-date-label" for="planet-date-input">Planet Date</label>
                <input class="timeline-date-input" type="date" id="planet-date-input"
                       onchange="onPlanetDateChange(this.value)">
            </div>
            <div class="progress-track" id="progress-track">
                <input type="range" class="timeline-slider" id="timeline-slider"
                       min="0" max="10000" value="0"
                       oninput="onTimelineScrub(this.value)">
            </div>
            <div class="phase-labels">
                <span class="phase-label" id="pl-launch">Launch</span>
                <span class="phase-label" id="pl-tli">TLI</span>
                <span class="phase-label" id="pl-transit">Transit</span>
                <span class="phase-label" id="pl-flyby">Flyby</span>
                <span class="phase-label" id="pl-return">Return</span>
                <span class="phase-label" id="pl-reentry">Entry</span>
            </div>
        </div>
    </div>

    <div id="observerSpecs" aria-hidden="true">
        <button class="observer-close" onclick="closeObserverSpecs()" aria-label="Close observer specs">&times;</button>
        <div class="observer-specs-header">
            <div class="observer-specs-title">Vantage Point</div>
        </div>
        <div class="observer-row observer-vantage-top">
            <select id="vantagePoint" onchange="onVantagePointChange(this.value)">
                <option>From Space</option>
                <option>From Sun</option>
                <option>From Mercury</option>
                <option>From Venus</option>
                <option>From Earth</option>
                <option>From Moon</option>
                <option>From Mars</option>
                <option>From Astroid Belt</option>
                <option>From Jupiter</option>
                <option>From Saturn</option>
                <option>From Uranus</option>
                <option>From Neptune</option>
            </select>
        </div>
        <div class="observer-specs-toggle-wrap" id="observer-specs-toggle-wrap">
            <button class="observer-btn observer-specs-toggle" id="btn-toggle-observer-specs" onclick="toggleObserverSpecsEditor()">Change Specs</button>
        </div>
        <div id="observer-specs-advanced" aria-hidden="true">
            <div class="observer-row">
                <label class="observer-label" for="observer-json">Observer JSON</label>
                <textarea id="observer-json" spellcheck="false"></textarea>
            </div>
            <div class="observer-note-wrap">
                <div class="observer-note">Edit the JSON, then apply it to move the current observer angle.</div>
            </div>
            <div class="observer-actions">
                <div class="observer-btn-row">
                    <button class="observer-btn observer-specs-toggle" id="btn-hide-observer-specs" onclick="closeObserverSpecs()">Close</button>
                    <button class="observer-btn" id="btn-copy-observer-json" onclick="copyObserverJson()">Copy JSON</button>
                    <button class="observer-btn primary" onclick="applyObserverSpecs()">Apply View</button>
                </div>
            </div>
        </div>
    </div>

    <div id="controls-hint">
        <button class="hint-btn" id="btn-follow" onclick="toggleFollow()">Follow Orion</button>
        <button class="hint-btn" onclick="focusEarth()">Focus Earth</button>
        <button class="hint-btn" onclick="focusMoon()">Focus Moon</button>
        <button class="hint-btn" id="btn-earth-moon" onclick="focusEarthMoon()">Earth &amp; Moon</button>
        <button class="hint-btn" id="btn-solar-system" onclick="focusSolarSystem()">Solar System</button>
        <button class="hint-btn" id="btn-mars-2033" onclick="focusMars2033()">Mars 2033</button>
        <div class="sim-group">
            <button class="hint-btn" id="btn-sim" onclick="toggleSimMenu()">Accelerate</button>
            <div class="sim-dropdown" id="sim-dropdown">
                <button class="sim-opt" onclick="setSpeed(1000)">1,000x</button>
                <button class="sim-opt" onclick="setSpeed(5000)">5,000x</button>
                <button class="sim-opt" onclick="setSpeed(10000)">10,000x</button>
                <button class="sim-opt" onclick="setSpeed(30000)">30,000x</button>
                <button class="sim-opt" onclick="setSpeed(250000)">250,000x</button>
                <button class="sim-opt" onclick="setSpeed(1000000)">1,000,000x</button>
