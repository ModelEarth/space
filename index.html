            if (!anchor) {
                currentObserverVantagePoint = 'From Space';
                return getObserverPayloadFromCamera();
            }

            let lookTarget = getCurrentViewAnchorTarget();
            if (lookTarget.distanceToSquared(anchor) < 1) {
                lookTarget = getObserverFallbackTarget(vantagePoint);
            }

            const direction = lookTarget.clone().sub(anchor);
            if (direction.lengthSq() < 1e-6) direction.set(1, 0.12, 1);
            const position = anchor.clone().add(direction.normalize().multiplyScalar(getObserverVantageStandOff(vantagePoint)));
            currentObserverVantagePoint = vantagePoint;
            return getObserverPayloadFromCamera(position, lookTarget, {
                vantagePoint,
                view: activeView,
                cameraMode
            });
        }

        function parseObserverPayload() {
            const payload = JSON.parse(document.getElementById('observer-json').value);
            if (!payload || typeof payload !== 'object') {
                throw new Error('Observer JSON must be an object.');
            }
            if (!payload.target || typeof payload.target !== 'object') {
                throw new Error('Observer JSON requires a target object.');
            }

            const target = new THREE.Vector3(
                Number(payload.target.x),
                Number(payload.target.y),
                Number(payload.target.z)
            );
            if (!Number.isFinite(target.x) || !Number.isFinite(target.y) || !Number.isFinite(target.z)) {
                throw new Error('Target coordinates must be numeric.');
            }

            let position;
            if (
                Number.isFinite(Number(payload.distance)) &&
                Number.isFinite(Number(payload.azimuthDeg)) &&
                Number.isFinite(Number(payload.polarDeg))
            ) {
                position = target.clone().add(
                    new THREE.Vector3().setFromSpherical(
                        new THREE.Spherical(
                            Number(payload.distance),
                            THREE.MathUtils.degToRad(Number(payload.polarDeg)),
                            THREE.MathUtils.degToRad(Number(payload.azimuthDeg))
                        )
                    )
                );
            } else if (payload.position && typeof payload.position === 'object') {
                position = new THREE.Vector3(
                    Number(payload.position.x),
                    Number(payload.position.y),
                    Number(payload.position.z)
                );
            }

            if (!position || !Number.isFinite(position.x) || !Number.isFinite(position.y) || !Number.isFinite(position.z)) {
                throw new Error('Observer JSON needs numeric position or spherical values.');
            }

            return {
                view: payload.view,
                cameraMode: payload.cameraMode,
                vantagePoint: payload.vantagePoint || document.getElementById('vantagePoint').value || 'From Space',
                position,
                target
            };
        }

        function applyObserverCamera(position, target, viewOverride, cameraModeOverride, vantagePointOverride) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            zoomForwardAmount = 0;
            if (viewOverride) activeView = viewOverride;
            if (cameraModeOverride) cameraMode = cameraModeOverride;
            if (vantagePointOverride) currentObserverVantagePoint = vantagePointOverride;
            camera.position.copy(position);
            controls.target.copy(target);
            controls.update();
            syncActiveButtons();
        }

        function getCurrentForwardDirection() {
            const forward = controls.target.clone().sub(camera.position);
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, -1);
            return forward.normalize();
        }

        function zoomCameraBy(scaleFactor) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            const offset = camera.position.clone().sub(controls.target);
            if (offset.lengthSq() < 1e-6) offset.set(0, 0, 1);
            const currentRadius = offset.length();
            const zoomingIn = scaleFactor < 1;
            const trackedView = cameraMode === 'follow-orion' || cameraMode === 'earth-moon' || cameraMode === 'event';
            const nearZoomThreshold = trackedView ? 12 : 2;
            if (zoomingIn && trackedView && currentRadius <= nearZoomThreshold) {
                zoomForwardAmount += Math.max(1.5, currentRadius * 0.42);
            } else if (!zoomingIn && zoomForwardAmount > 0) {
                zoomForwardAmount = Math.max(0, zoomForwardAmount - Math.max(1.5, currentRadius * 0.5));
            }
            const nextRadius = Math.max(1.2, currentRadius * scaleFactor);
            camera.position.copy(
                controls.target.clone().add(offset.normalize().multiplyScalar(nextRadius))
            );
            controls.update();
        }

        function resetTrackedPanOffset() {
            trackedPanOffset.set(0, 0, 0);
        }

        window.panView = (xDir, yDir) => {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            const offset = camera.position.clone().sub(controls.target);
            const distance = Math.max(1, offset.length());
            const step = Math.max(0.8, distance * 0.08);
            const forward = controls.target.clone().sub(camera.position);
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, -1);
            forward.normalize();
            const right = forward.clone().cross(camera.up).normalize();
            const up = right.clone().cross(forward).normalize();
            const delta = right.multiplyScalar(step * xDir).add(up.multiplyScalar(step * yDir));
            trackedPanOffset.add(delta);
            camera.position.add(delta);
            controls.target.add(delta);
            controls.update();
        };

        function getCurrentSceneDay(now = Date.now()) {
            if (scrubDay !== null) return scrubDay;
            if (paused && pausedDay !== null) return pausedDay;
            if (simStartReal !== null && simStartDay !== null) {
                return Math.max(0, simStartDay + (now - simStartReal) * speedMult / MS_PER_DAY);
            }
            return Math.max(0, (now - LAUNCH_TIME) / MS_PER_DAY);
        }

        function getCurrentSolarDateMs(now = Date.now()) {
            if (scrubSolarDateMs !== null) return scrubSolarDateMs;
            if (paused && pausedSolarDateMs !== null) return pausedSolarDateMs;
            if (simStartReal !== null && solarSimStartDateMs !== null) {
                return solarSimStartDateMs + (now - simStartReal) * speedMult;
            }
            return solarBaseDateMs;
        }

        function isModelTimelineDriven() {
            return simStartReal !== null || paused || scrubDay !== null || scrubSolarDateMs !== null;
        }

        function clampMars2033DateMs(dateMs) {
            return Math.min(MARS_2033_RETURN_EARTH_MS, Math.max(MARS_2033_DEPART_EARTH_MS, dateMs));
        }

        function updatePlaybackButton() {
            const btn = document.getElementById('btn-play-pause');
            const icon = btn.querySelector('.timeline-playback-icon');
            const isPausedState = paused || scrubDay !== null || scrubSolarDateMs !== null;
            icon.innerHTML = isPausedState ? '&#9654;' : '&#10074;&#10074;';
            btn.setAttribute('aria-label', isPausedState ? 'Play playback' : 'Pause playback');
            btn.classList.toggle('sim-active', isPausedState);
            btn.classList.toggle('is-playing', !isPausedState);
        }

        function setRestartButtonVisible(visible) {
            document.getElementById('btn-restart-overlay').classList.toggle('visible', visible);
        }

        window.onPlanetDateChange = (value) => {
            const nextDateMs = dateInputValueToMs(value);
            solarBaseDateMs = nextDateMs;
            scrubSolarDateMs = null;

            if (simStartReal !== null) {
                solarSimStartDateMs = nextDateMs;
            } else if (paused) {
                pausedSolarDateMs = nextDateMs;
            } else {
                solarSimStartDateMs = null;
                pausedSolarDateMs = null;
            }
        };

        window.onEventChange = async (value) => {
            const missionId = EVENT_OPTIONS.has(value) ? value : DEFAULT_EVENT_ID;
            await applyEventSpecById(missionId, { updateHash: true, focusDefaultView: true });
            if (currentEventKind === 'orion') {
                await ensureHistoricOrionTrajectoryLoaded();
                ensureOrionArowLoaded();
            } else {
                setTrajectorySourceLabel('Embedded JPL Horizons Fallback');
            }
            if (cameraMode === 'follow-orion') {
                const activeCraft = getGroupWorldPosition(getFollowTargetGroup());
                snapCameraTo(activeCraft.clone().add(getFollowCameraOffset()), activeCraft);
            }
        };

        function restartArtemisMission(now = Date.now(), restartSpeed = speedMult) {
            speedMult = Math.max(1, restartSpeed || 1);
            simStartReal = now;
            simStartDay = 0;
            solarSimStartDateMs = getEventDateMs(0);
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            scrubDay = null;
            scrubSolarDateMs = null;
            solarBaseDateMs = getEventDateMs(0);
            lastPlanetDateInputValue = '';
            document.getElementById('sim-dropdown').classList.remove('open');
            refreshSpeedControls();
            updatePlaybackButton();
            const slider = document.getElementById('timeline-slider');
            slider.value = '0';
            slider.style.background = 'linear-gradient(90deg, #ff6b35 0%, #6ec6ff 0%, rgba(255,255,255,0.08) 0%)';
            setRestartButtonVisible(false);
        }

        window.restartCurrentEvent = () => {
            const now = Date.now();
            const restartSpeed = Math.max(1, speedMult || 1);
            speedMult = restartSpeed;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            scrubDay = null;
            scrubSolarDateMs = null;
            zoomForwardAmount = 0;
            document.getElementById('sim-dropdown').classList.remove('open');
            refreshSpeedControls();
            updatePlaybackButton();
            if (currentEventKind === 'orion') {
                restartArtemisMission(now, restartSpeed);
            } else {
                simStartReal = now;
                simStartDay = 0;
                solarBaseDateMs = currentEventStartMs;
                solarSimStartDateMs = currentEventStartMs;
                lastPlanetDateInputValue = '';
                refreshSpeedControls();
                updatePlaybackButton();
                const slider = document.getElementById('timeline-slider');
                slider.value = '0';
                slider.style.background = 'linear-gradient(90deg, #ff6b35 0%, #6ec6ff 0%, rgba(255,255,255,0.08) 0%)';
                setRestartButtonVisible(false);
            }
        }

        window.toggleFollow = () => {
            if (cameraMode === 'follow-orion') {
                cameraMode = 'free';
                syncActiveButtons();
                setFocusHash(
                    activeView === 'solar-system' ? 'solarsystem' :
                    activeView === 'earth-moon' ? 'earthmoon' :
                    getHashFocusValue()
                );
                return;
            }
            if (currentEventKind === 'orion' && (activeView === 'earth-moon' || activeView === 'solar-system')) {
                if (getCurrentSceneDay() >= MISSION_DAYS - 0.001) {
                    restartArtemisMission();
                }
            }
            if (speedMult < 30000) {
                setSpeed(30000);
            }
            focusOrion();
        };

        window.focusEarth = (updateHash = true) => {
            cameraMode = 'focus-earth';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            resetTrackedPanOffset();
            const ep = earthGroup.position.clone();
            const focusCamera = getEventFocusCamera('earth', ep);
            targetPos = focusCamera.position;
            targetLook = focusCamera.target;
            if (updateHash) setFocusHash('earth');
        };

        window.focusMoon = (updateHash = true) => {
            cameraMode = 'focus-moon';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            resetTrackedPanOffset();
            const mp = moonGroup.position.clone();
            const focusCamera = getEventFocusCamera('moon', mp);
            targetPos = focusCamera.position;
            targetLook = focusCamera.target;
            if (updateHash) setFocusHash('moon');
        };

        window.focusEarthMoon = (updateHash = true) => {
            cameraMode = 'earth-moon';
            activeView = 'earth-moon';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            resetTrackedPanOffset();
            const mid = getEarthMoonViewCenter();
            const focusCamera = getEventFocusCamera('earthMoon', mid);
            targetPos = focusCamera.position;
            targetLook = focusCamera.target;
            if (updateHash) setFocusHash('earthmoon');
        };

        window.focusSolarSystem = (updateHash = true) => {
            cameraMode = 'solar-system';
            activeView = 'solar-system';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            resetTrackedPanOffset();
            const focusCamera = getSolarSystemFocusCamera();
            targetPos = focusCamera.position;
            targetLook = focusCamera.target;
            if (updateHash) setFocusHash('solarsystem');
        };

        function focusEventView(updateHash = false, immediate = false, preserveCurrentCamera = false) {
            cameraMode = 'event';
            activeView = 'event';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            resetTrackedPanOffset();
            const nextPos = preserveCurrentCamera ? camera.position.clone() : currentEventInitialCameraPos.clone();
            const nextLook = preserveCurrentCamera ? controls.target.clone() : currentEventInitialCameraTarget.clone();
            if (immediate) {
                snapCameraTo(nextPos, nextLook);
            } else {
                targetPos = nextPos;
                targetLook = nextLook;
            }
            solarBaseDateMs = currentEventStartMs;
            scrubSolarDateMs = null;
            scrubbing = false;
            if (simStartReal !== null) solarSimStartDateMs = currentEventStartMs;
            if (paused) pausedSolarDateMs = currentEventStartMs;
            if (updateHash) setFocusHash('overview');
        }

        window.focusOverview = (updateHash = true) => {
            if (currentEventOverviewView === 'event') {
                focusEventView(updateHash);
            } else {
                focusEarthMoon(false);
                if (updateHash) setFocusHash('overview');
            }
        };

        window.addEventListener('hashchange', async () => {
            const hashMission = getRequestedEventId();
            if (hashMission !== currentEventId) {
                await applyEventSpecById(hashMission, { updateHash: false, focusDefaultView: false });
            }
            if (getHashFollowValue() || getHashFocusValue()) applyFocusHash();
            else focusOverview(false);
        });

        window.zoomIn = () => zoomCameraBy(0.82);
        window.zoomOut = () => zoomCameraBy(1.22);

        window.openObserverSpecs = () => {
            const payload = getObserverPayloadFromCamera(camera.position.clone(), controls.target.clone(), {
                vantagePoint: currentObserverVantagePoint
            });
            document.getElementById('vantagePoint').value = payload.vantagePoint || 'From Space';
            setObserverJsonText(payload);
            setObserverEditorVisible(false);
            setObserverPanelVisible(true);
        };

        window.closeObserverSpecs = () => {
            setObserverPanelVisible(false);
        };

        window.toggleObserverSpecsEditor = () => {
            const advanced = document.getElementById('observer-specs-advanced');
            setObserverEditorVisible(!advanced.classList.contains('open'));
        };

        window.copyObserverJson = async () => {
            try {
                await writeClipboardText(document.getElementById('observer-json').value);
                pulseObserverControl('btn-observer-angle');
                pulseObserverControl('btn-copy-observer-json');
            } catch (error) {
                console.error(error);
            }
        };

        window.applyObserverSpecs = () => {
            try {
                const payload = parseObserverPayload();
                document.getElementById('vantagePoint').value = payload.vantagePoint;
                applyObserverCamera(payload.position, payload.target, payload.view, payload.cameraMode, payload.vantagePoint);
                setObserverJsonText(getObserverPayloadFromCamera(payload.position, payload.target, {
                    view: payload.view || activeView,
                    cameraMode: payload.cameraMode || cameraMode,
                    vantagePoint: payload.vantagePoint
                }));
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        window.onVantagePointChange = (value) => {
            const payload = buildObserverVantagePayload(value);
            setObserverJsonText(payload);
            applyObserverCamera(
                new THREE.Vector3(payload.position.x, payload.position.y, payload.position.z),
                new THREE.Vector3(payload.target.x, payload.target.y, payload.target.z),
                payload.view,
                payload.cameraMode,
                payload.vantagePoint
            );
            closeObserverSpecs();
        };

        window.toggleTimelineDateEditor = (event) => {
            event?.stopPropagation();
            setTimelineDateEditorOpen(!timelineDateEditorOpen);
        };

        // Accelerate time
        window.toggleSimMenu = () => {
            document.getElementById('sim-dropdown').classList.toggle('open');
        };

        // Slider maps 0 → 1x, then 1-100 → MIN_SIM_SPEED to MAX_SIM_SPEED (exponential)
        function sliderToSpeed(val) {
            if (val <= 0) return 1;
            const t = (val - 1) / 99; // 1→100 maps to 0→1
            return Math.round(MIN_SIM_SPEED * Math.pow(MAX_SIM_SPEED / MIN_SIM_SPEED, t));
        }

        function speedToSlider(spd) {
            if (spd <= 1) return 0;
            return Math.round(1 + 99 * Math.log(spd / MIN_SIM_SPEED) / Math.log(MAX_SIM_SPEED / MIN_SIM_SPEED));
        }

        function formatSpeedLabel(spd) {
            return `Speed ${spd.toLocaleString()}x`;
        }

        function getSpeedButtonLabel() {
            return speedMult > 1 ? formatSpeedLabel(speedMult) : 'Model Speed 1x';
        }

        let resetButtonTimer = null;

        function showResetButtonTemporarily(durationMs = 4000) {
            const resetBtn = document.getElementById('btn-reset');
            if (!resetBtn) return;
            if (resetButtonTimer) {
                clearTimeout(resetButtonTimer);
                resetButtonTimer = null;
            }
            resetBtn.style.display = 'block';
            resetButtonTimer = window.setTimeout(() => {
                resetBtn.style.display = 'none';
                resetButtonTimer = null;
            }, durationMs);
        }

        function hideResetButton() {
            const resetBtn = document.getElementById('btn-reset');
            if (!resetBtn) return;
            if (resetButtonTimer) {
                clearTimeout(resetButtonTimer);
                resetButtonTimer = null;
            }
            resetBtn.style.display = 'none';
        }

        function refreshSpeedControls() {
            const simBtn = document.getElementById('btn-sim');
            const sliderWrap = document.getElementById('sim-slider-wrap');
            const slider = document.getElementById('sim-slider');

            simBtn.classList.add('sim-active');
            simBtn.textContent = getSpeedButtonLabel();
            sliderWrap.classList.add('visible');
            slider.value = speedMult > 1 ? speedToSlider(speedMult) : '0';
        }

        window.setSpeed = (spd) => {
            if (spd <= 1) {
                document.getElementById('sim-dropdown').classList.remove('open');
                resetRealTime();
                return;
            }
            simStartReal = Date.now();
            // Start simulation from scrub position if user was scrubbing, else from real time
            simStartDay = getCurrentSceneDay(simStartReal);
            solarSimStartDateMs = getCurrentSolarDateMs(simStartReal);
            scrubDay = null;
            scrubSolarDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            speedMult = spd;
            document.getElementById('sim-dropdown').classList.remove('open');
            refreshSpeedControls();
            showResetButtonTemporarily();
            updatePlaybackButton();
        };

        window.onSliderChange = (val) => {
            const spd = sliderToSpeed(Number(val));
            // Keep simStartReal but recalculate simStartDay from current simDay
            const now = Date.now();
            simStartDay = getCurrentSceneDay(now);
            solarSimStartDateMs = getCurrentSolarDateMs(now);
            simStartReal = now;
            scrubDay = null;
            scrubSolarDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            speedMult = spd;
            refreshSpeedControls();
            if (spd > 1) {
                showResetButtonTemporarily();
            } else {
                hideResetButton();
            }
            updatePlaybackButton();
        };

        window.togglePlayback = () => {
            const now = Date.now();
            if (paused || scrubDay !== null || scrubSolarDateMs !== null) {
                const resumeDay = scrubDay !== null ? scrubDay : pausedDay;
                simStartDay = Math.max(0, resumeDay ?? getCurrentSceneDay(now));
                solarSimStartDateMs = scrubSolarDateMs ?? pausedSolarDateMs ?? getCurrentSolarDateMs(now);
                simStartReal = now;
                scrubDay = null;
                scrubSolarDateMs = null;
                paused = false;
                pausedDay = null;
                pausedSolarDateMs = null;
                showResetButtonTemporarily();
            } else {
                pausedDay = getCurrentSceneDay(now);
                pausedSolarDateMs = getCurrentSolarDateMs(now);
                paused = true;
                simStartReal = null;
                simStartDay = null;
                solarSimStartDateMs = null;
                showResetButtonTemporarily();
            }
            updatePlaybackButton();
        };

        window.resetRealTime = () => {
            speedMult = 1;
            simStartReal = null;
            simStartDay = null;
            solarSimStartDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            scrubDay = null;
            scrubSolarDateMs = null;
            hideResetButton();
            refreshSpeedControls();
            updatePlaybackButton();
        };

        // Timeline scrub — user drags the mission timeline slider
        let scrubDay = null;
        let scrubbing = false;

        window.onTimelineScrub = (val) => {
            if (isEventTimelineView()) {
                const progress = val / 10000;
                scrubSolarDateMs = clampMissionDateMs(
                    currentEventStartMs + progress * Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs)
                );
                scrubDay = null;
            } else {
                // Slider 0-10000 maps to TLI_DAY → MISSION_DAYS
                scrubDay = TLI_DAY + (val / 10000) * (MISSION_DAYS - TLI_DAY);
                scrubSolarDateMs = null;
            }
            scrubbing = true;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            simStartReal = null;
            simStartDay = null;
            solarSimStartDateMs = null;
            if (speedMult > 1) {
                speedMult = 1;
                hideResetButton();
                refreshSpeedControls();
            }
            updatePlaybackButton();
        };

        // Detect when user finishes scrubbing
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('timeline-slider');
            const progressTrack = document.getElementById('progress-track');
            const planetDateInput = document.getElementById('planet-date-input');
            const simSlider = document.getElementById('sim-slider');
            if (slider) {
                slider.addEventListener('pointerup', () => { scrubbing = false; });
                slider.addEventListener('touchend', () => { scrubbing = false; });
            }
            if (simSlider) {
                const maybeShowSpeedReset = () => {
                    if (sliderToSpeed(Number(simSlider.value)) > 1) {
                        showResetButtonTemporarily();
                    } else {
                        hideResetButton();
                    }
                };
                simSlider.addEventListener('pointerdown', maybeShowSpeedReset);
                simSlider.addEventListener('touchstart', maybeShowSpeedReset, { passive: true });
            }
            if (planetDateInput) {
                planetDateInput.addEventListener('blur', () => {
                    window.setTimeout(() => {
                        if (!document.getElementById('timeline-met-wrap').contains(document.activeElement)) {
                            setTimelineDateEditorOpen(false);
                        }
                    }, 0);
                });
            }
            if (progressTrack && slider) {
                progressTrack.addEventListener('click', (event) => {
                    if (event.target === slider) return;
                    const rect = progressTrack.getBoundingClientRect();
                    const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
                    const value = Math.round(ratio * 10000);
                    slider.value = String(value);
                    window.onTimelineScrub(value);
                    scrubbing = false;
                });
            }
        });

        // Cancel camera animation as soon as user interacts
        ['pointerdown', 'wheel', 'touchstart'].forEach(evt => {
            renderer.domElement.addEventListener(evt, () => {
                targetPos = null;
                targetLook = null;
                currentObserverVantagePoint = 'From Space';
                zoomForwardAmount = 0;
            }, { passive: true });
        });

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.sim-group')) {
                document.getElementById('sim-dropdown').classList.remove('open');
            }
            if (timelineDateEditorOpen && !e.target.closest('#timeline-met-wrap')) {
                setTimelineDateEditorOpen(false);
            }
        });

        // ═══════════════════════════════════════════
        // ANIMATION LOOP
        // ═══════════════════════════════════════════
        let prevOrionPos = null;
        let timelineDateEditorOpen = false;

        function setTimelineDateEditorOpen(open) {
            timelineDateEditorOpen = open;
            const wrap = document.getElementById('timeline-met-wrap');
            const btn = document.getElementById('btn-timeline-calendar');
            wrap.classList.toggle('editing', open);
            btn.classList.toggle('active', open);
            if (open) {
                window.requestAnimationFrame(() => {
                    const input = document.getElementById('planet-date-input');
                    input.focus();
                    if (typeof input.showPicker === 'function') {
                        try {
                            input.showPicker();
                        } catch (error) {
                            // Browser blocked programmatic picker opening.
                        }
                    }
                });
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // Delta time (seconds)
            const dt = (now - prevFrameTime) / 1000;
            prevFrameTime = now;

            // Mission time (real for HUD)
            const realElapsed = now - LAUNCH_TIME;
            const realElapsedDays = Math.max(0, realElapsed / MS_PER_DAY);
            const realT = Math.max(0, Math.min(realElapsed / MISSION_DURATION_MS, 1.0));
            const realDay = realT * MISSION_DAYS;
            const solarDateMs = getCurrentSolarDateMs(now);

            // Simulated time for 3D scene
            let simDayRaw;
            if (scrubDay !== null) {
                // User is scrubbing the timeline
                simDayRaw = scrubDay;
            } else if (paused && pausedDay !== null) {
                simDayRaw = pausedDay;
            } else if (simStartReal !== null && simStartDay !== null) {
                const dtMs = now - simStartReal;
                simDayRaw = simStartDay + (dtMs * speedMult) / MS_PER_DAY;
            } else {
                simDayRaw = realElapsedDays;
            }
            const simDay = Math.max(0, Math.min(simDayRaw, MISSION_DAYS));
            const simT = simDay / MISSION_DAYS;
            const missionDateMs = getEventDateMs(simDay);
            const sceneSolarDateMs =
                activeView === 'earth-moon' || cameraMode === 'follow-orion'
                    ? missionDateMs
                    : solarDateMs;
            const solarDate = new Date(solarDateMs);
            const starScale = activeView === 'solar-system' ? SOLAR_STAR_SCALE : 1;
            starBackgroundGroup.scale.lerp(
                new THREE.Vector3(starScale, starScale, starScale),
                0.08
            );

            // ── Update Solar System ──
            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                if (Math.abs(sceneSolarDateMs - planet.lastOrbitRefreshMs) >= 30 * MS_PER_DAY) {
                    refreshSolarOrbitGeometry(planet, sceneSolarDateMs);
                }
                planet.group.position.copy(getPlanetLocalPos(planet.data, sceneSolarDateMs));
                const heliocentricOrbitMode = activeView === 'solar-system' || isEventView();
                const earthMoonWideOrbitMode =
                    activeView === 'earth-moon' &&
                    camera.position.distanceTo(controls.target) > 120;
                const earthMoonOrbitLineMode = activeView === 'earth-moon';
                const showStandaloneEarth = true;
                const suppressPlanetHalo = name === 'Jupiter' || name === 'Saturn';
                const basePlanetVisualBoost = activeView === 'solar-system'
                    ? (name === 'Earth' || name === 'Mars' ? 40 : 28)
                    : isEventView()
                    ? (name === 'Earth' || name === 'Mars' ? 9 : 6)
                    : earthMoonWideOrbitMode
                    ? (name === 'Earth' || name === 'Mars' ? 14 : 10)
                    : 1;
                const zoomResponsiveBoost = (heliocentricOrbitMode || earthMoonWideOrbitMode)
                    ? Math.min(
                        activeView === 'solar-system' ? 5.5 : earthMoonWideOrbitMode ? 5.2 : 4.5,
                        Math.max(
                            1,
                            camera.position.distanceTo(controls.target) / (
                                activeView === 'solar-system' ? 180000 :
                                earthMoonWideOrbitMode ? 6000 :
                                50000
                            )
                        )
                    )
                    : 1;
                const planetVisualBoost = basePlanetVisualBoost * zoomResponsiveBoost;
                planet.visual.scale.setScalar(planetVisualBoost);
                planet.visual.visible = showStandaloneEarth;
                planet.label.visible = !(activeView === 'earth-moon' && name === 'Earth');
                planet.label.position.y = planet.baseLabelY + (planetVisualBoost - 1) * planet.bodyRadius * 1.35;
                const labelScaleBoost = activeView === 'solar-system' ? 1.45 : isEventView() ? 1.3 : earthMoonWideOrbitMode ? 1.75 : 1.2;
                planet.label.scale.set(5.2 * labelScaleBoost, 0.65 * labelScaleBoost, 1);
                planet.label.material.opacity = activeView === 'earth-moon' ? 0.96 : isEventView() ? 0.9 : 0.88;
                planet.body.material.opacity = heliocentricOrbitMode ? 1 : 0.96;
                planet.marker.visible = showStandaloneEarth && heliocentricOrbitMode && !suppressPlanetHalo;
                planet.marker.material.opacity = suppressPlanetHalo ? 0 : activeView === 'solar-system' ? 0.08 : isEventView() ? 0.06 : 0.008;
                planet.glow.material.opacity = suppressPlanetHalo ? 0 : isEventView() ? 0.02 : activeView === 'solar-system' ? 0.025 : earthMoonWideOrbitMode ? 0.003 : 0.006;
                if (planet.sprite) {
                    planet.sprite.material.opacity = suppressPlanetHalo ? 0 : isEventView() ? 0.02 : activeView === 'solar-system' ? 0.025 : earthMoonWideOrbitMode ? 0.004 : 0.008;
                }
                planet.orbitTube.material.opacity = heliocentricOrbitMode
                    ? (name === 'Earth' ? 0.26 : 0.18)
                    : 0;
                planet.orbitLine.material.opacity = !showStandaloneEarth
                    ? 0
                    : heliocentricOrbitMode
                    ? Math.min(0.95, planet.orbitBaseOpacity + 0.36)
                    : earthMoonOrbitLineMode
                    ? (name === 'Earth' ? (earthMoonWideOrbitMode ? 0.28 : 0) : 0.26)
                    : planet.orbitBaseOpacity;
            }
            let missionRoutePointsLocal = [];
            let missionRoutePointsWorld = [];
            let missionProgressT = 0;
            let missionCraftWorld = activeEventWorldPos.clone();
            if (currentEventKind === 'mars') {
                const missionEarthDepart = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS);
                const missionMarsArrive = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS);
                const missionMarsDepart = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS);
                const missionEarthReturn = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS);
                const outHeight = Math.max(2000, missionEarthDepart.distanceTo(missionMarsArrive) * 0.12);
                const backHeight = Math.max(2000, missionMarsDepart.distanceTo(missionEarthReturn) * 0.12);
                const outbound = buildTransferSegment(missionEarthDepart, missionMarsArrive, outHeight, 1200);
                outbound[outbound.length - 1].copy(missionMarsArrive);
                const stay = buildPlanetTimedPath(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS, MARS_2033_DEPART_MARS_MS, 10).slice(1);
                const missionReturn = buildTransferSegment(missionMarsDepart, missionEarthReturn, -backHeight, 950).slice(1);
                missionRoutePointsLocal = outbound.concat(stay, missionReturn);
                missionRoutePointsWorld = missionRoutePointsLocal.map((point) => point.clone().add(SOLAR_CENTER));
                const outboundCount = Math.max(1, outbound.length - 1);
                const stayCount = Math.max(1, stay.length - 1);
                const returnCount = Math.max(1, missionReturn.length - 1);
                const pointCount = Math.max(1, missionRoutePointsLocal.length - 1);
                if (solarDateMs < MARS_2033_ARRIVE_MARS_MS) {
                    missionProgressT = ((solarDateMs - MARS_2033_DEPART_EARTH_MS) / (MARS_2033_ARRIVE_MARS_MS - MARS_2033_DEPART_EARTH_MS)) * (outboundCount / pointCount);
                } else if (solarDateMs < MARS_2033_DEPART_MARS_MS) {
                    missionProgressT = (outboundCount + ((solarDateMs - MARS_2033_ARRIVE_MARS_MS) / (MARS_2033_DEPART_MARS_MS - MARS_2033_ARRIVE_MARS_MS)) * stayCount) / pointCount;
                } else if (solarDateMs < MARS_2033_RETURN_EARTH_MS) {
                    missionProgressT = (outboundCount + stayCount + ((solarDateMs - MARS_2033_DEPART_MARS_MS) / (MARS_2033_RETURN_EARTH_MS - MARS_2033_DEPART_MARS_MS)) * returnCount) / pointCount;
                } else {
                    missionProgressT = 1;
                }
                missionCraftWorld = getMars2033VehicleLocalPos(solarDateMs, outbound, stay, missionReturn).add(SOLAR_CENTER);
                mars2033CraftGroup.position.copy(missionCraftWorld.clone().sub(SOLAR_CENTER));
            } else if (currentEventKind === 'orbit' && currentEventOrbit) {
                missionRoutePointsLocal = buildOrbitEventPoints(currentEventOrbit, currentEventStartMs, 720);
                missionRoutePointsWorld = missionRoutePointsLocal.map((point) => point.clone().add(SOLAR_CENTER));
                const elapsedFraction = Math.max(0, (solarDateMs - currentEventStartMs) / MS_PER_DAY / Math.max(1e-6, currentEventOrbit.periodDays));
                missionProgressT = ((elapsedFraction % 1) + 1) % 1;
                missionCraftWorld = getOrbitEventLocalPos(currentEventOrbit, solarDateMs).add(SOLAR_CENTER);
            } else if (currentEventKind === 'custom') {
                missionRoutePointsWorld = flattenEventSegments(currentEventSegments);
                missionRoutePointsLocal = missionRoutePointsWorld.map((point) => point.clone().sub(SOLAR_CENTER));
                missionCraftWorld = getCustomEventWorldPos(solarDateMs, currentEventSegments);
                // Compute missionProgressT matching the per-segment timing of getCustomEventWorldPos
                // so the color-change point aligns with the spacecraft position
                let cumPoints = 0;
                missionProgressT = 1;
                for (let si = 0; si < currentEventSegments.length; si++) {
                    const seg = currentEventSegments[si];
                    if (solarDateMs <= seg.endMs) {
                        const localT = Math.max(0, Math.min(1, (solarDateMs - seg.startMs) / Math.max(1, seg.endMs - seg.startMs)));
                        missionProgressT = (cumPoints + localT * Math.max(1, seg.points.length - 1)) / Math.max(1, missionRoutePointsLocal.length - 1);
                        break;
                    }
                    cumPoints += seg.points.length;
                }
            }

            missionProgressT = Math.max(0, Math.min(1, missionProgressT));
            mars2033TransferLine.geometry.dispose();
            mars2033TransferLine.geometry = new THREE.BufferGeometry().setFromPoints(missionRoutePointsLocal);
            mars2033TransferLine.computeLineDistances();
            const missionTraveledIdx = Math.min(
                missionRoutePointsLocal.length,
                Math.max(2, Math.ceil(missionProgressT * Math.max(1, missionRoutePointsLocal.length - 1)) + 1)
            );
            mars2033TraveledLine.geometry.dispose();
            mars2033TraveledLine.geometry = new THREE.BufferGeometry().setFromPoints(missionRoutePointsLocal.slice(0, missionTraveledIdx));
            mars2033TransferGlow.geometry.dispose();
            mars2033TransferGlow.geometry = new THREE.BufferGeometry().setFromPoints(missionRoutePointsLocal);
            const showMissionTransfer = isEventView() || activeView === 'solar-system';
            mars2033TransferLine.visible = showMissionTransfer;
            mars2033TraveledLine.visible = showMissionTransfer;
            mars2033TransferGlow.visible = showMissionTransfer;
            mars2033CraftGroup.visible = currentEventVehicle === 'mars' && (showMissionTransfer || cameraMode === 'follow-orion');
            mars2033Orb.material.opacity = 0.92;
            activeEventWorldPos.copy(missionCraftWorld);
            const nextMissionPos = missionRoutePointsWorld.length
                ? samplePathPoints(missionRoutePointsWorld, Math.min(1, missionProgressT + 0.003))
                : missionCraftWorld.clone().add(new THREE.Vector3(1, 0, 0));
            activeEventWorldDir.copy(nextMissionPos.clone().sub(missionCraftWorld));
            if (activeEventWorldDir.lengthSq() < 1e-6) activeEventWorldDir.set(0, 0, 1);
            activeEventWorldDir.normalize();

            // ── Update Moon ──
            const earthWorld = getPlanetWorldPos(solarPlanets.Earth.data, sceneSolarDateMs);
            earthGroup.position.copy(earthWorld);
            const moonOffset = currentEventKind === 'orion'
                ? getMoonOffsetForOrionDay(simDay)
                : getMoonOffsetForDateMs(sceneSolarDateMs);
            moonOrbitVisualGroup.position.copy(earthWorld);
            moonGroup.position.copy(earthWorld.clone().add(moonOffset));
            const moonOrbitRefreshKey = currentEventKind === 'orion' ? simDay : sceneSolarDateMs;
            const moonOrbitRefreshThreshold = currentEventKind === 'orion' ? 0.02 : 0.25 * MS_PER_DAY;
            if (lastMoonOrbitRefreshMs === null || Math.abs(moonOrbitRefreshKey - lastMoonOrbitRefreshMs) >= moonOrbitRefreshThreshold) {
                const fullOrbitPts = currentEventKind === 'orion'
                    ? buildMoonOrbitPointsAroundOrionDay(simDay, 240)
                    : buildMoonOrbitPointsAroundDate(sceneSolarDateMs, 27.321661, 240);
                moonOrbitReferenceLine.geometry.dispose();
                moonOrbitReferenceLine.geometry = new THREE.BufferGeometry().setFromPoints(fullOrbitPts);
                moonOrbitReferenceGlow.geometry.dispose();
                moonOrbitReferenceGlow.geometry = new THREE.BufferGeometry().setFromPoints(fullOrbitPts);

                const currentArcPts = currentEventKind === 'orion'
                    ? buildMoonOrbitPointsAroundOrionDay(simDay, 180)
                    : buildMoonOrbitPointsAroundDate(sceneSolarDateMs, 27.321661, 180);
                moonOrbitCurrentArc.geometry.dispose();
                moonOrbitCurrentArc.geometry = new THREE.BufferGeometry().setFromPoints(currentArcPts);
                lastMoonOrbitRefreshMs = moonOrbitRefreshKey;
            }

            // ── Update Orion ──
            const orionKm = getTrajectoryPos(simDay);
            const orionSc = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            const orionWorld = earthWorld.clone().add(orionSc);
            const nextKm = getTrajectoryPos(Math.min(simDay + 0.005, MISSION_DAYS));
            const dir = new THREE.Vector3().subVectors(
                new THREE.Vector3(nextKm.x, nextKm.y, nextKm.z),
                orionKm
            ).normalize();
            const orionLookTarget = orionWorld.clone().add(dir.clone().multiplyScalar(SCALE));
            const selectedCraftWorld = currentEventKind === 'orion' ? orionWorld : activeEventWorldPos;
            const selectedCraftLookTarget = currentEventKind === 'orion'
                ? orionLookTarget
                : activeEventWorldPos.clone().add(activeEventWorldDir.clone().multiplyScalar(4000));
            orionGroup.position.copy(selectedCraftWorld);
            sphereCraftGroup.position.copy(selectedCraftWorld);
            eventModelGroup.position.copy(selectedCraftWorld);
            orionGroup.lookAt(selectedCraftLookTarget);
            sphereCraftGroup.lookAt(selectedCraftLookTarget);
            eventModelGroup.lookAt(selectedCraftLookTarget);
            const solarCraftScaleBoost = activeView === 'solar-system' ? 5500 : activeView === 'earth-moon' ? 8 : 1;
            const orionFollowReferenceDistance = Math.sqrt(4.5 * 4.5 + 4.5 * 4.5 + 10 * 10);
            const eventModelVisibilityScale =
                currentEventVehicle === 'model' && cameraMode === 'follow-orion'
                    ? Math.max(1, (getFollowCameraOffset().length() / orionFollowReferenceDistance) * 2.4)
                    : currentEventVehicle === 'model' && isEventView()
                    ? Math.max(420, Math.min(4200, camera.position.distanceTo(controls.target) / 70))
                    : 1;
            const sphereVisibilityScale = activeView === 'earth-moon' ? (1.25 / 6) : 1.25;
            const orionEarthAltitudeKm = Math.max(0, orionWorld.distanceTo(earthWorld) / SCALE - EARTH_RADIUS_KM);
            const isLateEarthApproach = currentEventKind === 'orion' && simDay >= MISSION_DAYS * 0.9 && orionEarthAltitudeKm <= 80000;
            const orionSphereScaleFactor =
                currentEventKind === 'orion' && (cameraMode === 'follow-orion' || isLateEarthApproach)
                    ? 0.25
                    : 1;
            orionGroup.scale.setScalar(solarCraftScaleBoost);
            sphereCraftGroup.scale.setScalar(solarCraftScaleBoost * sphereVisibilityScale * orionSphereScaleFactor);
            const eventGroupScale = solarCraftScaleBoost * eventModelVisibilityScale;
            eventModelGroup.scale.setScalar(eventGroupScale);
            // Keep the beacon sprite at a constant 1.5 world-units regardless of group scale
            if (eventBeaconSprite && eventGroupScale > 0) {
                const s = 1.5 / eventGroupScale;
                eventBeaconSprite.scale.set(s, s, 1);
            }
            mars2033CraftGroup.scale.setScalar(activeView === 'solar-system' ? 1.65 : 1);

            // Beacon pulse
            beacon.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.006);
            if (eventBeaconSprite) eventBeaconSprite.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.006);
            engineGlow.intensity = 2 + Math.sin(now * 0.004) * 1;
            if (eventModelEngineLight) {
                eventModelEngineLight.intensity = 1.5 + Math.sin(now * 0.005) * 0.5;
            }

            // ── Traveled trajectory ──
            const trajProgress = getTrajectoryCurveProgress(simDay);
            const traveledIdx = Math.min(
                trajPts.length,
                Math.max(2, Math.ceil(trajProgress * Math.max(1, trajPts.length - 1)) + 1)
            );
            const traveled = trajPts.slice(0, traveledIdx);
            traveledLine.geometry.dispose();
            traveledLine.geometry = new THREE.BufferGeometry().setFromPoints(traveled);
            trajectoryGroup.position.copy(earthWorld);
            trajectoryGroup.visible = currentEventKind === 'orion' && (activeView === 'earth-moon' || activeView === 'solar-system' || cameraMode === 'follow-orion');

            // ── Earth-Moon line ──
            emLine.geometry.dispose();
            emLine.geometry = new THREE.BufferGeometry().setFromPoints([
                earthGroup.position.clone(), moonGroup.position.clone()
            ]);
            emLine.computeLineDistances();
            emLine.visible = activeView === 'earth-moon' || cameraMode === 'follow-orion';

            // ── Earth rotation (360° in 24h, accelerated with sim) ──
            const earthAngularVel = (2 * Math.PI) / 86400; // rad/s
            const earthRotationSpeed =
                (paused || scrubbing)
                    ? 0
                    : speedMult > 1
                    ? speedMult
                    : 1;
            earthMesh.rotation.y += earthAngularVel * dt * earthRotationSpeed;

            // ── Sun alignment ──
            if (sunSprite) {
                sunSprite.position.set(0, 0, 0);
            }
            sunDir.position.copy(SOLAR_CENTER);
            sunDir.target.position.copy(earthGroup.position);

            // ── Camera ──
            // Animate transitions first (button clicks)
            if (targetPos) {
                camera.position.lerp(targetPos, 0.06);
                controls.target.lerp(targetLook, 0.06);
                if (camera.position.distanceTo(targetPos) < 1.0) {
                    targetPos = null;
                    targetLook = null;
                }
            }

            // After transition, continuously track targets (direct copy, no lerp = no fighting)
            if (!targetPos) {
                if (cameraMode === 'follow-orion') {
                    // Move camera with Orion — keep relative offset stable
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    const activeCraft = getGroupWorldPosition(getEventVehicleGroup());
                    controls.target.copy(activeCraft).add(dolly).add(trackedPanOffset);
                    camera.position.copy(activeCraft).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'focus-earth') {
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    const focusAnchor = earthGroup.position.clone();
                    controls.target.copy(focusAnchor).add(dolly).add(trackedPanOffset);
                    camera.position.copy(focusAnchor).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'focus-moon') {
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    const focusAnchor = moonGroup.position.clone();
                    controls.target.copy(focusAnchor).add(dolly).add(trackedPanOffset);
                    camera.position.copy(focusAnchor).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'earth-moon') {
                    const mid = getEarthMoonViewCenter();
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(mid).add(dolly).add(trackedPanOffset);
                    camera.position.copy(mid).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'event') {
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(activeEventWorldPos).add(dolly).add(trackedPanOffset);
                    camera.position.copy(activeEventWorldPos).add(offset).add(dolly).add(trackedPanOffset);
                }
            }

            controls.update();
            if (activeView === 'solar-system') {
                starBackgroundGroup.position.lerp(SOLAR_CENTER, 0.12);
            } else {
                starBackgroundGroup.position.copy(camera.position);
            }
            syncActiveButtons();

            // Labels face camera
            earthLabel.lookAt(camera.position);
            moonLabel.lookAt(camera.position);
            orionLabel.lookAt(camera.position);
            sphereLabel.lookAt(camera.position);
            eventModelLabel.lookAt(camera.position);
            mars2033CraftLabel.lookAt(camera.position);
            for (const name in solarPlanets) {
                solarPlanets[name].label.lookAt(camera.position);
            }

            // ═══ HUD UPDATE — uses simDay during simulation/scrub ═══
            const hudDay = isModelTimelineDriven() ? simDay : realDay;
            const hudT = hudDay / MISSION_DAYS;
            const hudElapsedMs = hudDay * MS_PER_DAY;
            const missionTimelineMs = clampMissionDateMs(solarDateMs);
            const missionProgress = (missionTimelineMs - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs);
            const missionDay = Math.max(0, (missionTimelineMs - currentEventStartMs) / MS_PER_DAY);
            const marsArrivalProgress = currentEventKind === 'mars'
                ? (MARS_2033_ARRIVE_MARS_MS - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs)
                : 0;
            const marsDepartProgress = currentEventKind === 'mars'
                ? (MARS_2033_DEPART_MARS_MS - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs)
                : 0;

            // Human-readable date/time in user's timezone
            const missionDate = new Date(LAUNCH_TIME + hudElapsedMs);
            const solarDateValue = msToDateInputValue(solarDateMs);
            if (solarDateValue !== lastPlanetDateInputValue) {
                document.getElementById('planet-date-input').value = solarDateValue;
                lastPlanetDateInputValue = solarDateValue;
            }

            if (activeView === 'solar-system' || isEventView()) {
                document.getElementById('timeline-title-text').textContent = 'Planet Date';
                document.getElementById('met-display').textContent = solarDate.toLocaleDateString(undefined, {
                    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC'
                });
            } else {
                const dateStr = missionDate.toLocaleDateString(undefined, {
                    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
                });
                const timeStr = missionDate.toLocaleTimeString(undefined, {
                    hour: '2-digit', minute: '2-digit', hour12: false
                });
                document.getElementById('timeline-title-text').textContent = 'Mission Time';
                document.getElementById('met-display').textContent = `${dateStr}, ${timeStr}`;
            }
            document.getElementById('mission-name').textContent = currentEventName;

            // Update timeline slider (only when not being dragged)
            if (!scrubbing) {
                const sliderVal = isEventTimelineView()
                    ? missionProgress * 10000
                    : Math.max(0, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY)) * 10000;
                document.getElementById('timeline-slider').value = Math.round(Math.min(10000, sliderVal));
            }
            // Update slider gradient fill
            const pct = isEventTimelineView()
                ? Math.max(0, Math.min(100, missionProgress * 100))
                : Math.max(0, Math.min(100, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY) * 100));
            document.getElementById('timeline-slider').style.background =
                `linear-gradient(90deg, #ff6b35 0%, #6ec6ff ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;
            const arriveMarker = document.getElementById('timeline-marker-arrive');
            const departMarker = document.getElementById('timeline-marker-depart');
            if (isEventTimelineView() && currentEventKind === 'mars') {
                arriveMarker.style.left = `${marsArrivalProgress * 100}%`;
                departMarker.style.left = `${marsDepartProgress * 100}%`;
                arriveMarker.classList.add('visible');
                departMarker.classList.add('visible');
            } else {
                arriveMarker.classList.remove('visible');
                departMarker.classList.remove('visible');
            }

            // Phase labels
            if (isEventTimelineView() && currentEventKind === 'mars') {
                const labels = currentEventPhaseLabels || ['Depart', '', 'Arrive Mars', 'Stay', 'Depart Mars', 'Return'];
                [
                    ['pl-launch', labels[0] || 'Depart', 0, 0.03],
                    ['pl-tli', labels[1] || '', 0.03, marsArrivalProgress],
                    ['pl-transit', labels[2] || 'Arrive Mars', marsArrivalProgress, Math.min(1, marsArrivalProgress + 0.03)],
                    ['pl-flyby', labels[3] || 'Stay', Math.min(1, marsArrivalProgress + 0.03), marsDepartProgress],
                    ['pl-return', labels[4] || 'Depart Mars', marsDepartProgress, Math.min(1, marsDepartProgress + 0.03)],
                    ['pl-reentry', labels[5] || 'Return', Math.min(1, marsDepartProgress + 0.03), 1.0001]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    el.textContent = label;
                    el.classList.toggle('active', missionProgress >= start && missionProgress < end);
                });
                document.getElementById('pl-transit').style.transform = 'translateX(-20px)';
                document.getElementById('pl-flyby').style.transform = 'translateX(-10px)';
            } else if (isEventTimelineView()) {
                const labels = currentEventPhaseLabels || ['Launch', 'Phase 2', 'Phase 3', 'Phase 4', 'Phase 5', 'Complete'];
                const boundaries = [0, 1 / 6, 2 / 6, 3 / 6, 4 / 6, 5 / 6, 1.0001];
                ['pl-launch', 'pl-tli', 'pl-transit', 'pl-flyby', 'pl-return', 'pl-reentry'].forEach((id, index) => {
                    const el = document.getElementById(id);
                    el.textContent = labels[index] || '';
                    el.classList.toggle('active', missionProgress >= boundaries[index] && missionProgress < boundaries[index + 1]);
                });
                document.getElementById('pl-transit').style.transform = '';
                document.getElementById('pl-flyby').style.transform = '';
            } else {
                [['pl-launch','Launch',0,0.106],['pl-tli','TLI',0.106,0.15],['pl-transit','Transit',0.15,0.53],
                 ['pl-flyby','Flyby',0.53,0.63],['pl-return','Return',0.63,0.95],['pl-reentry','Entry',0.95,1]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    el.textContent = label;
                    el.classList.toggle('active', hudT >= start && hudT < end);
                });
                document.getElementById('pl-transit').style.transform = '';
                document.getElementById('pl-flyby').style.transform = '';
            }

            // Phase text (matches real Artemis II timeline)
            let phase = currentEventPhaseText || 'Mission Complete';
            if (isEventTimelineView() && currentEventKind === 'mars') {
                if (missionTimelineMs < MARS_2033_ARRIVE_MARS_MS) phase = 'Outbound Transfer';
                else if (missionTimelineMs < MARS_2033_DEPART_MARS_MS) phase = 'Mars Surface Window';
                else if (missionTimelineMs < MARS_2033_RETURN_EARTH_MS) phase = 'Return Transfer';
                else phase = 'Earth Return';
            } else if (isEventTimelineView()) {
                if (currentEventPhaseText) {
                    phase = currentEventPhaseText;
                } else {
                    const labels = currentEventPhaseLabels || ['Mission In Progress'];
                    const index = Math.min(labels.length - 1, Math.max(0, Math.floor(missionProgress * labels.length)));
                    phase = labels[index] || 'Mission In Progress';
                }
            } else {
                if (hudDay < 1.06) phase = 'Earth Orbit';
                else if (hudDay < 1.5) phase = 'Translunar Injection';
                else if (hudDay < 5.3) phase = 'Translunar Coast';
                else if (hudDay < 6.3) phase = 'Lunar Flyby';
                else if (hudDay < 9.5) phase = 'Return Transit';
                else if (hudDay < 10) phase = 'Re-entry';
            }
            document.getElementById('phase-text').textContent = phase;

            // MET counter
            const metMs = isEventTimelineView()
                ? Math.max(0, missionTimelineMs - currentEventStartMs)
                : Math.max(0, hudElapsedMs);
            const metD = Math.floor(metMs / MS_PER_DAY);
            const metH = Math.floor((metMs % MS_PER_DAY) / 3600000);
            const metM = Math.floor((metMs % 3600000) / 60000);
            const metS = Math.floor((metMs % 60000) / 1000);
            document.getElementById('met-counter').textContent =
                `T+${String(metD).padStart(2,'0')}:${String(metH).padStart(2,'0')}:${String(metM).padStart(2,'0')}:${String(metS).padStart(2,'0')}`;

            // Distances
            const activeCraftWorld = currentEventKind === 'orion' ? orionWorld : activeEventWorldPos;
            const dEarth = Math.max(0, activeCraftWorld.distanceTo(earthGroup.position) / SCALE - EARTH_RADIUS_KM);
            const dMoon = Math.max(0, activeCraftWorld.distanceTo(moonGroup.position) / SCALE - MOON_RADIUS_KM);

            document.getElementById('dist-earth').textContent = formatKm(dEarth);
            document.getElementById('dist-moon').textContent = formatKm(dMoon);

            // Velocity
            const velStep = 0.002;
            const prevOrionKm = getTrajectoryPos(Math.max(0, simDay - velStep));
            const prevCraftWorld = currentEventKind === 'orion'
                ? earthWorld.clone().add(new THREE.Vector3(prevOrionKm.x * SCALE, prevOrionKm.y * SCALE, prevOrionKm.z * SCALE))
                : missionRoutePointsWorld.length
                ? samplePathPoints(missionRoutePointsWorld, Math.max(0, missionProgressT - velStep))
                : activeEventWorldPos.clone();
            const vel = activeCraftWorld.distanceTo(prevCraftWorld) / SCALE / (velStep * 86400);
            document.getElementById('velocity').textContent = vel.toFixed(2);

            // Mission day
            document.getElementById('mission-day').textContent = isEventTimelineView()
                ? `Day ${Math.floor(missionDay) + 1} of ${Math.max(1, Math.round((currentEventEndMs - currentEventStartMs) / MS_PER_DAY))}`
                : `Day ${Math.floor(hudDay) + 1} of ${Math.round(MISSION_DAYS)}`;

            const currentEventComplete = currentEventDisableCompletion
                ? false
                : currentEventKind === 'orion'
                ? hudDay >= MISSION_DAYS - 0.001
                : missionTimelineMs >= currentEventEndMs - 1000;
            setRestartButtonVisible(currentEventComplete);
            if (currentEventComplete && !paused) {
                paused = true;
                simStartReal = null;
                simStartDay = null;
                scrubDay = null;
                scrubSolarDateMs = null;
                if (currentEventKind === 'orion') {
                    pausedDay = MISSION_DAYS;
                    pausedSolarDateMs = getEventDateMs(MISSION_DAYS);
                } else {
                    pausedDay = null;
                    pausedSolarDateMs = currentEventEndMs;
                }
                updatePlaybackButton();
            }

            // Render
            composer.render();
        }

        // ═══════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
        });

        async function initializeApp() {
            const initialEventId = getRequestedEventId();
            const initialSpec = await loadEventSpecById(initialEventId);
            primeEventUi(initialSpec);
            await applyEventSpecById(initialEventId, { updateHash: !getHashEventValue(), focusDefaultView: false });
            if (currentEventKind === 'orion') {
                await ensureHistoricOrionTrajectoryLoaded();
            }
            const now = Date.now();
            const elapsed = now - LAUNCH_TIME;
            const t = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0));
            const day = t * MISSION_DAYS;
            document.getElementById('planet-date-input').value = msToDateInputValue(solarBaseDateMs);
            lastPlanetDateInputValue = msToDateInputValue(solarBaseDateMs);

            const initialMissionDateMs = currentEventKind === 'orion' ? getEventDateMs(day) : solarBaseDateMs;
            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                planet.group.position.copy(getPlanetLocalPos(planet.data, initialMissionDateMs));
                refreshSolarOrbitGeometry(planet, initialMissionDateMs);
            }

            const earthWorld = getPlanetWorldPos(solarPlanets.Earth.data, initialMissionDateMs);
            earthGroup.position.copy(earthWorld);
            const moonOffset = currentEventKind === 'orion'
                ? getMoonOffsetForOrionDay(day)
                : getMoonOffsetForDateMs(initialMissionDateMs);
            moonOrbitVisualGroup.position.copy(earthWorld);
            moonGroup.position.copy(earthWorld.clone().add(moonOffset));
            const initialMoonOrbitPts = currentEventKind === 'orion'
                ? buildMoonOrbitPointsAroundOrionDay(day, 240)
                : buildMoonOrbitPointsAroundDate(initialMissionDateMs, 27.321661, 240);
            moonOrbitReferenceLine.geometry.dispose();
            moonOrbitReferenceLine.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonOrbitPts);
            moonOrbitReferenceGlow.geometry.dispose();
            moonOrbitReferenceGlow.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonOrbitPts);
            const initialMoonArcPts = currentEventKind === 'orion'
                ? buildMoonOrbitPointsAroundOrionDay(day, 180)
                : buildMoonOrbitPointsAroundDate(initialMissionDateMs, 27.321661, 180);
            moonOrbitCurrentArc.geometry.dispose();
            moonOrbitCurrentArc.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonArcPts);
            lastMoonOrbitRefreshMs = currentEventKind === 'orion' ? day : initialMissionDateMs;
            const orionKm = getTrajectoryPos(day);
            const orionOffset = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            const orionWorld = earthWorld.clone().add(orionOffset);
            trajectoryGroup.position.copy(earthWorld);
            trajectoryGroup.visible = currentEventKind === 'orion';
            activeEventWorldPos.copy(
                currentEventKind === 'orion'
                    ? orionWorld
                    : currentEventKind === 'mars'
                    ? getMars2033VehicleLocalPos(
                        initialMissionDateMs,
                        buildTransferSegment(
                            getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS),
                            getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS),
                            Math.max(2000, getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS).distanceTo(getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS)) * 0.12),
                            1200
                        ),
                        buildPlanetTimedPath(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS, MARS_2033_DEPART_MARS_MS, 10).slice(1),
                        buildTransferSegment(
                            getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS),
                            getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS),
                            -Math.max(2000, getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS).distanceTo(getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS)) * 0.12),
                            950
                        ).slice(1)
                    ).add(SOLAR_CENTER)
                    : currentEventKind === 'orbit' && currentEventOrbit
                    ? getOrbitEventLocalPos(currentEventOrbit, initialMissionDateMs).add(SOLAR_CENTER)
                    : getCustomEventWorldPos(initialMissionDateMs, currentEventSegments)
            );
            orionGroup.position.copy(activeEventWorldPos);
            sphereCraftGroup.position.copy(activeEventWorldPos);
            eventModelGroup.position.copy(activeEventWorldPos);
            mars2033CraftGroup.position.copy(activeEventWorldPos.clone().sub(SOLAR_CENTER));
            document.getElementById('event').value = currentEventId;
            syncEventVehicleVisibility();
            updateFollowButtonText();
            const mid = getEarthMoonViewCenter();
            const earthMoonFocusCamera = getEventFocusCamera('earthMoon', mid);
            camera.position.copy(earthMoonFocusCamera.position);
            controls.target.copy(earthMoonFocusCamera.target);
            controls.update();
            starBackgroundGroup.position.copy(camera.position);
            if (getHashFollowValue() || getHashFocusValue()) applyFocusHash();
            else if (currentEventOverviewView === 'event') focusEventView(false, true, currentEventPreserveStartupCamera);
            else {
                focusOverview(false);
                setFocusHash('overview');
            }
            updatePlaybackButton();
        }

        hydrateEventMenu(INITIAL_EVENT_ID);
        animate();
        initializeApp()
            .then(() => {
                if (currentEventKind === 'orion') {
                    setTrajectorySourceLabel('Loading NASA AROW Ephemeris...');
                    ensureOrionArowLoaded();
                } else {
                    setTrajectorySourceLabel('Embedded JPL Horizons Fallback');
                }
                document.getElementById('loading').classList.add('hidden');
            })
            .catch((error) => {
                console.error(error);
                document.getElementById('loading').classList.add('hidden');
            });
    </script>
</body>
