        );
        solarSystemGroup.add(mars2033TraveledLine);

        const mars2033TransferGlow = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x6b3fb3, transparent: true, opacity: 0.2 })
        );
        solarSystemGroup.add(mars2033TransferGlow);

        const earthOrbitLoopLine = new THREE.LineLoop(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x9fe7ff, transparent: true, opacity: 0.34 })
        );
        solarSystemGroup.add(earthOrbitLoopLine);

        const earthOrbitLoopGlow = new THREE.LineLoop(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x9fe7ff, transparent: true, opacity: 0.08 })
        );
        solarSystemGroup.add(earthOrbitLoopGlow);

        const mars2033CraftGroup = new THREE.Group();
        mars2033CraftGroup.visible = false;
        mars2033CraftGroup.frustumCulled = false;

        const mars2033Orb = new THREE.Mesh(
            new THREE.SphereGeometry(180, 18, 18),
            new THREE.MeshBasicMaterial({ color: 0xd7a6ff, transparent: true, opacity: 0.9 })
        );
        mars2033CraftGroup.add(mars2033Orb);

        const mars2033CraftLabel = createLabel('MARS 2033', '#d3a8ff');
        mars2033CraftLabel.position.set(0, 1350, 0);
        mars2033CraftLabel.scale.set(8000, 1000, 1);
        mars2033CraftGroup.add(mars2033CraftLabel);
        solarSystemGroup.add(mars2033CraftGroup);

        // ═══════════════════════════════════════════
        // STATE & CONTROLS
        // ═══════════════════════════════════════════
        // Camera modes: 'free', 'follow-orion', 'focus-earth', 'focus-moon', 'earth-moon', 'solar-system', 'mission'
        let cameraMode = 'free';
        let activeView = 'earth-moon';
        let speedMult = 1;
        let simStartReal = null;   // Date.now() when sim was activated
        let simStartDay = null;    // elapsed day when sim was activated
        let solarBaseDateMs = DEFAULT_SOLAR_DATE_MS;
        let solarSimStartDateMs = null;
        let paused = false;
        let pausedDay = null;
        let pausedSolarDateMs = null;
        let scrubSolarDateMs = null;
        let prevFrameTime = Date.now();
        let targetPos = null;
        let targetLook = null;
        let lastPlanetDateInputValue = '';
        let observerAngleResetTimeout = null;
        let currentObserverVantagePoint = 'From Space';
        let zoomForwardAmount = 0;
        let followCraftZoomScale = 1;
        let panModeActive = false;
        let trackedPanOffset = new THREE.Vector3();
        let lastTrackedAutoTarget = null;
        let activeEventWorldPos = SOLAR_CENTER.clone();
        let activeEventWorldDir = new THREE.Vector3(0, 0, 1);
        let lastMoonOrbitRefreshMs = null;
        let lastMoonOrbitNormal = null;
        let lastHudDomUpdateMs = 0;
        let lastHudDomUpdateKey = '';

        function isEventView() {
            return activeView === 'event';
        }

        function isEventTimelineView() {
            return isEventView() && currentEventKind !== 'orion';
        }

        function getEventVehicleGroup() {
            switch (currentEventVehicle) {
                case 'model':
                    return eventModelGroup;
                case 'mars':
                    return mars2033CraftGroup;
                default:
                    return sphereCraftGroup;
            }
        }

        function getGroupWorldPosition(group) {
            const worldPos = new THREE.Vector3();
            group.getWorldPosition(worldPos);
            return worldPos;
        }

        function getMoonEarthBackgroundBasis(anchor) {
            const earthAnchor = earthGroup.position.clone();
            const earthDir = earthAnchor.clone().sub(anchor);
            if (earthDir.lengthSq() < 1e-9) earthDir.set(0, 0, -1);
            earthDir.normalize();
            const back = earthDir.clone().negate();
            const sunDir = SOLAR_CENTER.clone().sub(anchor);
            if (sunDir.lengthSq() < 1e-9) sunDir.set(1, 0, 0);
            sunDir.normalize();
            let sunSideBias = sunDir.clone().sub(back.clone().multiplyScalar(sunDir.dot(back)));
            if (sunSideBias.lengthSq() < 1e-9) {
                sunSideBias = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), back);
            }
            sunSideBias.normalize();
            const viewBack = back.clone().multiplyScalar(1.18).add(sunSideBias.multiplyScalar(0.22)).normalize();
            let side = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 1, 0), viewBack);
            if (side.lengthSq() < 1e-9) side.set(1, 0, 0);
            else side.normalize();
            const up = new THREE.Vector3().crossVectors(viewBack, side).normalize();
            return { earthDir, viewBack, side, up };
        }

        function getEventFocusCamera(viewKey, anchor) {
            const isNarrowTracker = getTrackerWidth() <= 700;
            const fallbackPositionOffsets = {
                earth: new THREE.Vector3(0, eR * 8.6, eR * 7.9),
                moon: isNarrowTracker
                    ? new THREE.Vector3(mR * 2.6, mR * 2.45, mR * 10.2)
                    : new THREE.Vector3(mR * 2.1, mR * 2.15, mR * 7.6),
                earthMoon: new THREE.Vector3(0, 100, 60)
            };
            const focusConfig = currentEventFocusCameras?.[viewKey];
            const positionOffset = focusConfig?.positionOffset?.lengthSq()
                ? focusConfig.positionOffset
                : fallbackPositionOffsets[viewKey];
            const targetOffset = focusConfig?.targetOffset || (viewKey === 'earth' ? new THREE.Vector3(0, -eR * 1.2, 0) : new THREE.Vector3());
            if (viewKey === 'moon' && currentEventFocusMoonEarthBackground) {
                const { earthDir, viewBack, side, up } = getMoonEarthBackgroundBasis(anchor);
                const earthLookDistance = Math.max(mR * 10, anchor.distanceTo(earthGroup.position) * 0.14);
                return {
                    position: anchor.clone()
                        .add(side.clone().multiplyScalar(positionOffset.x))
                        .add(up.clone().multiplyScalar(positionOffset.y))
                        .add(viewBack.clone().multiplyScalar(positionOffset.z)),
                    target: anchor.clone()
                        .add(earthDir.clone().multiplyScalar(earthLookDistance))
                        .add(side.clone().multiplyScalar(targetOffset.x))
                        .add(up.clone().multiplyScalar(targetOffset.y))
                        .add(viewBack.clone().multiplyScalar(targetOffset.z))
                };
            }
            return {
                position: anchor.clone().add(positionOffset),
                target: anchor.clone().add(targetOffset)
            };
        }

        function getFollowTargetGroup() {
            return currentEventKind === 'orion' && !isEventView()
                ? getEventVehicleGroup()
                : getEventVehicleGroup();
        }

        function getFollowCameraOffset() {
            return isEventView()
                ? new THREE.Vector3(2200, 1400, 3600)
                : new THREE.Vector3(4.5, 4.5, 10);
        }

        function shouldReplaceVehicleWithObjectModel() {
            return Boolean(
                currentEventVehicle === 'sphere' &&
                currentEventObject?.replaceVehicleWhenLoaded &&
                eventModelNode &&
                eventModelLoadedPath === currentEventObject.path
            );
        }

        function getEventFollowCameraPose(craftWorld) {
            if (currentEventKind === 'orion' || !currentEventFollowCamera) {
                return {
                    position: craftWorld.clone().add(getFollowCameraOffset()),
                    target: craftWorld.clone()
                };
            }
            const forward = activeEventWorldDir.clone();
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, 1);
            forward.normalize();

            let up = new THREE.Vector3(0, 1, 0);
            if (currentEventKind === 'earth-orbit') {
                up = craftWorld.clone().sub(earthGroup.position);
                if (up.lengthSq() < 1e-6) up.set(0, 1, 0);
                up.normalize();
            }
            let side = new THREE.Vector3().crossVectors(forward, up);
            if (side.lengthSq() < 1e-6) {
                side = new THREE.Vector3(1, 0, 0);
            } else {
                side.normalize();
            }
            const correctedUp = new THREE.Vector3().crossVectors(side, forward).normalize();
            return {
                position: craftWorld.clone()
                    .add(correctedUp.clone().multiplyScalar(currentEventFollowCamera.height))
                    .add(forward.clone().multiplyScalar(-currentEventFollowCamera.distance)),
                target: craftWorld.clone()
                    .add(correctedUp.clone().multiplyScalar(currentEventFollowCamera.targetHeight))
                    .add(forward.clone().multiplyScalar(currentEventFollowCamera.lookAhead))
            };
        }

        function getCurrentEventFollowHashValues() {
            const values = new Set();
            const primary = sanitizeHashSlug(currentEventFollowHash);
            if (primary) values.add(primary);
            (currentEventPhaseLabels || []).forEach((label) => {
                const slug = sanitizeHashSlug(label);
                if (slug) values.add(slug);
            });
            return values;
        }

        function getSolarSystemFocusCamera() {
            const currentTarget = controls.target.clone();
            const currentOffset = camera.position.clone().sub(currentTarget);
            const fallbackOffset = new THREE.Vector3(0, 165000, 435000);
            const offsetDirection = currentOffset.lengthSq() > 1e-6
                ? currentOffset.clone().normalize()
                : fallbackOffset.clone().normalize();
            const minimumSolarDistance = fallbackOffset.length();
            const desiredDistance = Math.max(currentOffset.length() * 2.4, minimumSolarDistance);

            return {
                position: SOLAR_CENTER.clone().add(offsetDirection.multiplyScalar(desiredDistance)),
                target: SOLAR_CENTER.clone()
            };
        }

        function snapCameraTo(position, target) {
            targetPos = null;
            targetLook = null;
            camera.position.copy(position);
            controls.target.copy(target);
            controls.update();
        }

        function syncEventVehicleVisibility() {
            const replaceSphereWithModel = shouldReplaceVehicleWithObjectModel();
            sphereCraftGroup.visible = (currentEventVehicle === 'sphere' && !replaceSphereWithModel) || (currentEventVehicle === 'model' && currentEventMarkerOrbConfigured);
            eventModelGroup.visible = currentEventVehicle === 'model' || replaceSphereWithModel;
            mars2033CraftGroup.visible = currentEventVehicle === 'mars' && (isEventView() || cameraMode === 'follow-orion');
        }

        function updateFollowButtonText() {
            document.getElementById('btn-follow').textContent = currentEventFollowLabel;
        }

        function isNarrowUi() {
            return getTrackerWidth() <= 700;
        }

        function getResponsiveOverviewLabel(label) {
            const nextLabel = `${label || 'Overview'}`.trim();
            return isNarrowUi() ? nextLabel.replace(/\s+Overview$/i, '') || nextLabel : nextLabel;
        }

        function updateOverviewButtonText() {
            document.getElementById('btn-overview').textContent = getResponsiveOverviewLabel(currentEventOverviewLabel);
        }

        function updateVehicleLabels() {
            setLabelText(sphereLabel, currentEventVehicleLabel, '#ffb088');
            setLabelText(eventModelLabel, currentEventVehicleLabel, '#ff6b35');
        }

        function updateEventVideoPanel() {
            const telemetry = document.getElementById('telemetry');
            const frame = document.getElementById('event-video-frame');
            const youtubeId = (currentEventVideoYoutubeId || '').trim();
            const hasVideo = Boolean(youtubeId);
            telemetry.classList.toggle('has-video', hasVideo);
            if (hasVideo) {
                const nextSrc = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&playsinline=1&rel=0`;
                if (frame.dataset.youtubeId !== youtubeId) {
                    frame.src = nextSrc;
                    frame.dataset.youtubeId = youtubeId;
                }
            } else {
                frame.src = 'about:blank';
                frame.dataset.youtubeId = '';
            }
        }

        function updateHeaderText() {
            document.getElementById('mission-title-text').textContent = currentEventKind === 'orion' ? 'NASA · CSA' : '';
            {
                const missionNameEl = document.getElementById('mission-name');
                const missionName = currentEventName || '';
                missionNameEl.textContent = missionName;
                missionNameEl.classList.toggle('mission-name-long', missionName.length > 25);
                missionNameEl.classList.toggle('mission-name-xlong', missionName.length > 50);
            }
        }

        function updateBrowserTitle() {
            document.title =
                activeView === 'solar-system' ? 'Solar System' :
                isEventView() ? currentEventBrowserTitle :
                DEFAULT_BROWSER_TITLE;
        }

        function clearActiveButtons() {
            document.getElementById('btn-follow').classList.remove('active');
            document.getElementById('btn-earth').classList.remove('active');
            document.getElementById('btn-moon').classList.remove('active');
            document.getElementById('btn-overview').classList.remove('active');
            document.getElementById('btn-solar-system').classList.remove('active');
        }

        function setActiveViewButton(id) {
            clearActiveButtons();
            if (id) document.getElementById(id)?.classList.add('active');
        }

        function syncActiveButtons() {
            if (cameraMode === 'follow-orion') {
                setActiveViewButton('btn-follow');
                updateBrowserTitle();
                return;
            }

            const hashFocus = getHashFocusValue();
            if ((cameraMode === 'free' || cameraMode === 'focus-earth' || cameraMode === 'focus-moon') && (hashFocus === 'earth' || hashFocus === 'moon')) {
                setActiveViewButton(hashFocus === 'earth' ? 'btn-earth' : 'btn-moon');
                updateBrowserTitle();
                return;
            }

            setActiveViewButton(
                activeView === 'solar-system' ? 'btn-solar-system' :
                ((cameraMode === 'focus-earth' && currentEventOverviewView === 'earth') ||
                (cameraMode === 'focus-moon' && currentEventOverviewView === 'moon')) ? 'btn-overview' :
                (activeView === 'earth-moon' || activeView === 'event') ? 'btn-overview' :
                null
            );
            updateBrowserTitle();
        }

        function clampMissionDateMs(dateMs) {
            return Math.min(currentEventEndMs, Math.max(currentEventStartMs, dateMs));
        }

        async function applyEventSpecById(missionId, { updateHash = false, focusDefaultView = false } = {}) {
            const spec = await loadEventSpecById(missionId);
            currentEventSpec = spec;
            currentEventId = spec.id;
            currentEventKind = spec.kind;
            currentEventVehicle = spec.vehicle;
            currentEventVehicleLabel = spec.vehicleLabel;
            currentEventVideoYoutubeId = spec.videoYoutubeId || '';
            currentEventPathColor = spec.pathColor || '#6b3fb3';
            currentEventPhaseText = spec.phaseText || '';
            currentEventDisableCompletion = Boolean(spec.disableCompletion);
            currentEventObject = spec.object || null;
            currentEventObjectSurfaceGlow = spec.object?.surfaceGlow || null;
            currentEventFollowLabel = spec.followLabel;
            currentEventFollowHash = spec.followHash || 'orion';
            currentEventName = spec.missionName;
            currentEventBrowserTitle = spec.browserTitle;
            currentEventShowSolarSystem = spec.showSolarSystem !== false;
            currentEventInitialView = spec.initialView;
            currentEventOverviewLabel = spec.overviewLabel;
            currentEventOverviewView = spec.overviewView;
            currentEventInitialCameraPos = spec.initialCameraPos.clone();
            currentEventInitialCameraTarget = spec.initialCameraTarget.clone();
            currentEventInitialCameraRelative = Boolean(spec.initialCameraRelative);
            currentEventInitialCameraAnchorBody = spec.initialCameraAnchorBody || 'event';
            currentEventPreserveStartupCamera = Boolean(spec.preserveStartupCamera);
            currentEventPhaseLabels = spec.phaseLabels;
            currentEventFocusCameras = spec.focusCameras || {};
            currentEventFocusMoonEarthBackground = Boolean(spec.focusMoonEarthBackground);
            currentEventPlaySpeed = Math.max(1, spec.playSpeed || 30000);
            currentEventFollowCamera = spec.followCamera || null;
            currentEventFollowSpeed = Math.max(1, spec.followSpeed || 1);
            currentEventTumbleSpeed = Number.isFinite(spec.tumbleSpeed) ? Math.max(1, spec.tumbleSpeed) : null;
            currentEventTumbleSpeedDeg = Number.isFinite(spec.tumbleSpeedDeg) ? spec.tumbleSpeedDeg : 0;
            currentEventTumbleStartMs = Number.isFinite(spec.tumbleStartMs) ? spec.tumbleStartMs : null;
            currentEventTumbleSpeedApplied = false;
            currentEventTumbleAxes = spec.tumbleAxes?.lengthSq() ? spec.tumbleAxes.clone().normalize() : new THREE.Vector3(0, 0, 1);
            currentEventMarkerOrbConfigured = Boolean(spec.markerOrb?.enabled);
            currentEventMarkerOrbStartMs = Number.isFinite(spec.markerOrb?.startMs) ? spec.markerOrb.startMs : null;
            currentEventMarkerOrbEnabled = currentEventMarkerOrbConfigured;
            currentEventMarkerOrbScale = Number.isFinite(spec.markerOrb?.scale) ? spec.markerOrb.scale : 1;
            currentEventMarkerOrbOpacity = Number.isFinite(spec.markerOrb?.opacity) ? spec.markerOrb.opacity : 0.95;
            currentEventMarkerOrbDepthWrite = spec.markerOrb?.depthWrite === undefined ? true : Boolean(spec.markerOrb.depthWrite);
            currentEventMarkerOrbSide =
                spec.markerOrb?.side === 'back' ? THREE.BackSide :
                spec.markerOrb?.side === 'double' ? THREE.DoubleSide :
                THREE.FrontSide;
            currentEventMarkerOrbRenderOrder = Number.isFinite(spec.markerOrb?.renderOrder) ? spec.markerOrb.renderOrder : 10;
            currentEventMarkerLabelScale = Number.isFinite(spec.markerOrb?.labelScale) ? spec.markerOrb.labelScale : 1;
            currentEventMarkerLabelOffsetY = Number.isFinite(spec.markerOrb?.labelOffsetY) ? spec.markerOrb.labelOffsetY : 0.6;
            currentEventModelLabelScale = Number.isFinite(spec.markerOrb?.modelLabelScale) ? spec.markerOrb.modelLabelScale : 1;
            currentEventModelLabelOffsetY = Number.isFinite(spec.markerOrb?.modelLabelOffsetY) ? spec.markerOrb.modelLabelOffsetY : 0.6;
            currentEventLandingSite = spec.landingSite && Number.isFinite(spec.landingSite.latDeg) && Number.isFinite(spec.landingSite.lonDeg)
                ? {
                    latDeg: spec.landingSite.latDeg,
                    lonDeg: spec.landingSite.lonDeg,
                    altitudeKm: Number.isFinite(spec.landingSite.altitudeKm) ? spec.landingSite.altitudeKm : 18
                }
                : null;
            currentEventOrbit = spec.orbit || null;
            currentEventEarthOrbit = spec.earthOrbit || null;
            currentEventRoute = spec.route || [];
            currentEventSegments = spec.kind === 'custom' ? buildCustomEventSegments(currentEventRoute) : [];
            currentEventSceneStartMs = Number.isFinite(spec.sceneStartMs)
                ? spec.sceneStartMs
                : (Number.isFinite(spec.solarStartDateMs) ? spec.solarStartDateMs : spec.startMs);
            currentEventStartMs = spec.startMs;
            currentEventEndMs = spec.endMs;
            lastMoonOrbitRefreshMs = null;
            lastMoonOrbitNormal = null;
            eventModelLockedQuaternion = null;
            followCraftZoomScale = 1;

            if (spec.kind === 'orion') {
                LAUNCH_TIME = spec.launchTimeMs;
                ORION_REFERENCE_LAUNCH_TIME = spec.launchTimeMs;
                MISSION_DAYS = spec.missionDays;
                MISSION_DURATION_MS = MISSION_DAYS * MS_PER_DAY;
            } else {
                LAUNCH_TIME = spec.startMs;
                MISSION_DURATION_MS = Math.max(MS_PER_DAY, spec.endMs - spec.startMs);
                MISSION_DAYS = Math.max(1, MISSION_DURATION_MS / MS_PER_DAY);
            }

            if (spec.kind === 'mars') {
                MARS_2033_DEPART_EARTH_MS = spec.departEarthMs;
                MARS_2033_ARRIVE_MARS_MS = spec.arriveTargetMs;
                MARS_2033_DEPART_MARS_MS = spec.departTargetMs;
                MARS_2033_RETURN_EARTH_MS = spec.returnEarthMs;
                MARS_2033_MISSION_DURATION_MS = MARS_2033_RETURN_EARTH_MS - MARS_2033_DEPART_EARTH_MS;
                MARS_2033_MISSION_DAYS = MARS_2033_MISSION_DURATION_MS / MS_PER_DAY;
                MARS_2033_INITIAL_CAMERA_POS = spec.initialCameraPos.clone();
                MARS_2033_INITIAL_CAMERA_TARGET = spec.initialCameraTarget.clone();
            }

            solarBaseDateMs = currentEventSceneStartMs;
            currentEventMarkerOrbEnabled = currentEventMarkerOrbConfigured && (
                currentEventMarkerOrbStartMs === null || currentEventSceneStartMs >= currentEventMarkerOrbStartMs
            );
            solarSimStartDateMs = null;
            pausedSolarDateMs = null;
            scrubSolarDateMs = null;
            lastPlanetDateInputValue = '';
            document.getElementById('event').value = spec.id;
            updateFollowButtonText();
            updateOverviewButtonText();
            updateHeaderText();
            updateVehicleLabels();
            updateEventVideoPanel();
            scheduleEventObjectLoad(currentEventObject);
            mars2033TransferLine.material.color.set(currentEventPathColor);
            mars2033TransferGlow.material.color.set(currentEventPathColor);
            syncEventVehicleVisibility();
            updateBrowserTitle();
            if (updateHash) setEventHash(spec.id);
            setMissionMenuOpen(false);
            if (focusDefaultView) {
                focusOverview(false);
            }
        }

        function focusOrion(updateHash = true, immediate = true) {
            if (currentEventKind !== 'orion' && speedMult < currentEventFollowSpeed) {
                setSpeed(currentEventFollowSpeed);
            }
            cameraMode = 'follow-orion';
            syncActiveButtons();
            controls.enabled = true;
            resetTrackedPanOffset();
            followCraftZoomScale = 1;
            const op = getGroupWorldPosition(getFollowTargetGroup());
            const followPose = getEventFollowCameraPose(op);
            const followPos = followPose.position;
            const followLook = followPose.target;
            if (immediate) {
                snapCameraTo(followPos, followLook);
            } else {
                targetPos = followPos;
                targetLook = followLook;
            }
            if (updateHash) setFollowHash(currentEventFollowHash);
        }

        function applyFocusHash() {
            const hashFollow = sanitizeHashSlug(getHashFollowValue());
            if (hashFollow) {
                if (getCurrentEventFollowHashValues().has(hashFollow) && (cameraMode !== 'follow-orion' || hashFollow !== sanitizeHashSlug(currentEventFollowHash))) {
                    focusOrion(false, true);
                    return;
                }
            }
            switch (getHashFocusValue()) {
                case 'orion':
                    if (cameraMode !== 'follow-orion') focusOrion(false, true);
                    break;
                case 'earth':
                    focusEarth(false);
                    break;
                case 'moon':
                    focusMoon(false);
                    break;
                case 'overview':
                    focusOverview(false);
                    break;
                case 'earthmoon':
                    focusEarthMoon(false);
                    break;
                case 'solarsystem':
                    focusSolarSystem(false);
                    break;
                default:
                    break;
            }
        }

        function roundCameraValue(value) {
            return Number(value.toFixed(3));
        }

        function pulseObserverControl(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.classList.add('speed-active');
            if (observerAngleResetTimeout !== null) {
                clearTimeout(observerAngleResetTimeout);
            }
            observerAngleResetTimeout = window.setTimeout(() => {
                el.classList.remove('speed-active');
                observerAngleResetTimeout = null;
            }, 1200);
        }

        function setObserverPanelVisible(visible) {
            const panel = document.getElementById('observerSpecs');
            const btn = document.getElementById('btn-observer-angle');
            panel.classList.toggle('open', visible);
            panel.setAttribute('aria-hidden', visible ? 'false' : 'true');
            btn.classList.toggle('active', visible);
            if (!visible) setObserverEditorVisible(false);
        }

        function setObserverEditorVisible(visible) {
            const panel = document.getElementById('observerSpecs');
            const advanced = document.getElementById('observer-specs-advanced');
            panel.classList.toggle('editor-open', visible);
            advanced.classList.toggle('open', visible);
            advanced.setAttribute('aria-hidden', visible ? 'false' : 'true');
            document.getElementById('observer-specs-toggle-wrap').classList.toggle('hidden', visible);
        }

        async function writeClipboardText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.setAttribute('readonly', '');
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            textArea.style.pointerEvents = 'none';
            document.body.appendChild(textArea);
            textArea.select();

            const copied = document.execCommand('copy');
            document.body.removeChild(textArea);

            if (!copied) {
                throw new Error('Clipboard copy failed');
            }
        }

        function getObserverPayloadFromCamera(position = camera.position.clone(), target = controls.target.clone(), extra = {}) {
            const offset = position.clone().sub(target);
            const spherical = new THREE.Spherical().setFromVector3(offset);
            return {
                view: activeView,
                cameraMode,
                vantagePoint: currentObserverVantagePoint,
                distance: roundCameraValue(spherical.radius),
                azimuthDeg: roundCameraValue(THREE.MathUtils.radToDeg(spherical.theta)),
                polarDeg: roundCameraValue(THREE.MathUtils.radToDeg(spherical.phi)),
                position: {
                    x: roundCameraValue(position.x),
                    y: roundCameraValue(position.y),
                    z: roundCameraValue(position.z)
                },
                target: {
                    x: roundCameraValue(target.x),
                    y: roundCameraValue(target.y),
                    z: roundCameraValue(target.z)
                },
                ...extra
            };
        }

        function setObserverSummary(payload) {
            const el = document.getElementById('observer-specs-summary');
            if (!el) return;
            const fmt = v => (v !== undefined && v !== null) ? v : '—';
            const fmtXYZ = obj => obj ? `${obj.x},  ${obj.y},  ${obj.z}` : '—';
            el.innerHTML =
                `<div class="obs-spec-row"><span class="obs-spec-label">View</span><span class="obs-spec-value">${fmt(payload.view)}</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Camera Mode</span><span class="obs-spec-value">${fmt(payload.cameraMode)}</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Distance</span><span class="obs-spec-value">${fmt(payload.distance)}</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Polar Degree</span><span class="obs-spec-value">${fmt(payload.polarDeg)}°</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Position</span><span class="obs-spec-value">${fmtXYZ(payload.position)}</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Target</span><span class="obs-spec-value">${fmtXYZ(payload.target)}</span></div>` +
                `<div class="obs-spec-row"><span class="obs-spec-label">Azimuth Degree</span><span class="obs-spec-value">${fmt(payload.azimuthDeg)}°<span class="obs-spec-note">${payload.azimuthDeg == 0 ? '= forward, increases clockwise' : '= horizontal angle (0° = forward, increases clockwise)'}</span></span></div>`;
        }

        function setObserverJsonText(payload) {
            document.getElementById('observer-json').value = JSON.stringify(payload, null, 2);
            setObserverSummary(payload);
        }

        function getCurrentViewAnchorTarget() {
            if (cameraMode === 'follow-orion') return getGroupWorldPosition(getFollowTargetGroup());
            if (cameraMode === 'focus-earth') return earthGroup.position.clone();
            if (cameraMode === 'focus-moon') return moonGroup.position.clone();
            if (cameraMode === 'earth-moon') {
                return getEarthMoonViewCenter();
            }
            if (cameraMode === 'event') {
                return controls.target.clone();
            }
            if (cameraMode === 'solar-system') return SOLAR_CENTER.clone();
            return controls.target.clone();
        }

        function getSolarBodyWorldPos(name, dateMs = getCurrentSolarDateMs()) {
            if (name === 'Sun') return SOLAR_CENTER.clone();
            if (!solarPlanets[name]) return null;
            return getPlanetWorldPos(solarPlanets[name].data, dateMs);
        }

        function getEventCameraAnchorWorldPos(anchorBody = currentEventInitialCameraAnchorBody) {
            switch (`${anchorBody || 'event'}`) {
                case 'Sun':
                    return SOLAR_CENTER.clone();
                case 'Earth':
                    return earthGroup.position.clone();
                case 'Moon':
                    return moonGroup.position.clone();
                case 'Mercury':
                case 'Venus':
                case 'Mars':
                case 'Jupiter':
                case 'Saturn':
                case 'Uranus':
                case 'Neptune':
                    return getSolarBodyWorldPos(anchorBody) || activeEventWorldPos.clone();
                case 'event':
                default:
                    return activeEventWorldPos.clone();
            }
        }

        function getResolvedEventInitialCamera() {
            if (!currentEventInitialCameraRelative) {
                return {
                    position: currentEventInitialCameraPos.clone(),
                    target: currentEventInitialCameraTarget.clone()
                };
            }
            const anchor = getEventCameraAnchorWorldPos();
            return {
                position: anchor.clone().add(currentEventInitialCameraPos),
                target: anchor.clone().add(currentEventInitialCameraTarget)
            };
        }

        function getEarthWorldPosForView() {
            return earthGroup.position.clone();
        }

        function getMoonWorldPosForView() {
            return moonGroup.position.clone();
        }

        function getAstroidBeltWorldPos(target = getCurrentViewAnchorTarget(), dateMs = getCurrentSolarDateMs()) {
            const mars = getPlanetWorldPos(solarPlanets.Mars.data, dateMs);
            const jupiter = getPlanetWorldPos(solarPlanets.Jupiter.data, dateMs);
            const beltRadius = mars.distanceTo(SOLAR_CENTER) * 0.45 + jupiter.distanceTo(SOLAR_CENTER) * 0.55;
            const radial = target.clone().sub(SOLAR_CENTER);
            if (radial.lengthSq() < 1e-6) radial.set(1, 0, 0);
            radial.normalize();
            return SOLAR_CENTER.clone().add(radial.multiplyScalar(beltRadius)).add(new THREE.Vector3(0, 1200, 0));
        }

        function getObserverVantageAnchor(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun': return getSolarBodyWorldPos('Sun');
                case 'From Mercury': return getSolarBodyWorldPos('Mercury');
                case 'From Venus': return getSolarBodyWorldPos('Venus');
                case 'From Earth': return getEarthWorldPosForView();
                case 'From Moon': return getMoonWorldPosForView();
                case 'From Mars': return getSolarBodyWorldPos('Mars');
                case 'From Astroid Belt': return getAstroidBeltWorldPos();
                case 'From Jupiter': return getSolarBodyWorldPos('Jupiter');
                case 'From Saturn': return getSolarBodyWorldPos('Saturn');
                case 'From Uranus': return getSolarBodyWorldPos('Uranus');
                case 'From Neptune': return getSolarBodyWorldPos('Neptune');
                default: return null;
            }
        }

        function getObserverFallbackTarget(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun':
                    return getSolarBodyWorldPos('Earth');
                case 'From Earth':
                    return activeView === 'earth-moon' ? moonGroup.position.clone() : getSolarBodyWorldPos('Sun');
                case 'From Moon':
                    return earthGroup.position.clone();
                case 'From Mars':
                    return getSolarBodyWorldPos('Earth');
                case 'From Astroid Belt':
                    return SOLAR_CENTER.clone();
                default:
                    return SOLAR_CENTER.clone();
            }
        }

        function getObserverVantageStandOff(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun': return 2600;
                case 'From Moon': return 9;
                case 'From Astroid Belt': return 2800;
                case 'From Jupiter':
                case 'From Saturn':
                case 'From Uranus':
                case 'From Neptune':
                    return 32;
                default: return 16;
            }
        }

        function buildObserverVantagePayload(vantagePoint) {
            if (vantagePoint === 'From Space') {
                currentObserverVantagePoint = vantagePoint;
                return getObserverPayloadFromCamera(camera.position.clone(), controls.target.clone(), {
                    vantagePoint
                });
            }

            const anchor = getObserverVantageAnchor(vantagePoint);
            if (!anchor) {
                currentObserverVantagePoint = 'From Space';
                return getObserverPayloadFromCamera();
            }

            let lookTarget = getCurrentViewAnchorTarget();
            if (lookTarget.distanceToSquared(anchor) < 1) {
                lookTarget = getObserverFallbackTarget(vantagePoint);
            }

            const direction = lookTarget.clone().sub(anchor);
            if (direction.lengthSq() < 1e-6) direction.set(1, 0.12, 1);
            const position = anchor.clone().add(direction.normalize().multiplyScalar(getObserverVantageStandOff(vantagePoint)));
            currentObserverVantagePoint = vantagePoint;
            return getObserverPayloadFromCamera(position, lookTarget, {
                vantagePoint,
                view: activeView,
                cameraMode
            });
        }

        function parseObserverPayload() {
            const payload = JSON.parse(document.getElementById('observer-json').value);
            if (!payload || typeof payload !== 'object') {
                throw new Error('Observer JSON must be an object.');
            }
            if (!payload.target || typeof payload.target !== 'object') {
                throw new Error('Observer JSON requires a target object.');
            }

            const target = new THREE.Vector3(
                Number(payload.target.x),
                Number(payload.target.y),
                Number(payload.target.z)
            );
            if (!Number.isFinite(target.x) || !Number.isFinite(target.y) || !Number.isFinite(target.z)) {
                throw new Error('Target coordinates must be numeric.');
            }

            let position;
            if (
                Number.isFinite(Number(payload.distance)) &&
                Number.isFinite(Number(payload.azimuthDeg)) &&
                Number.isFinite(Number(payload.polarDeg))
            ) {
                position = target.clone().add(
                    new THREE.Vector3().setFromSpherical(
                        new THREE.Spherical(
                            Number(payload.distance),
                            THREE.MathUtils.degToRad(Number(payload.polarDeg)),
                            THREE.MathUtils.degToRad(Number(payload.azimuthDeg))
                        )
                    )
                );
            } else if (payload.position && typeof payload.position === 'object') {
                position = new THREE.Vector3(
                    Number(payload.position.x),
                    Number(payload.position.y),
                    Number(payload.position.z)
                );
            }

            if (!position || !Number.isFinite(position.x) || !Number.isFinite(position.y) || !Number.isFinite(position.z)) {
                throw new Error('Observer JSON needs numeric position or spherical values.');
            }

            return {
                view: payload.view,
                cameraMode: payload.cameraMode,
                vantagePoint: payload.vantagePoint || document.getElementById('vantagePoint').value || 'From Space',
                position,
                target
            };
        }

        function applyObserverCamera(position, target, viewOverride, cameraModeOverride, vantagePointOverride) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            zoomForwardAmount = 0;
            if (viewOverride) activeView = viewOverride;
            if (cameraModeOverride) cameraMode = cameraModeOverride;
            if (vantagePointOverride) currentObserverVantagePoint = vantagePointOverride;
            camera.position.copy(position);
            controls.target.copy(target);
            controls.update();
            syncActiveButtons();
        }

        function getCurrentForwardDirection() {
            const forward = controls.target.clone().sub(camera.position);
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, -1);
            return forward.normalize();
        }

        const ZOOM_SLIDER_LOG_MIN = Math.log(0.5);
        const ZOOM_SLIDER_LOG_MAX = Math.log(1200000);

        function distToSlider(dist) {
            const clamped = Math.max(0.5, Math.min(1200000, dist));
            return Math.round(1000 * (ZOOM_SLIDER_LOG_MAX - Math.log(clamped)) / (ZOOM_SLIDER_LOG_MAX - ZOOM_SLIDER_LOG_MIN));
        }

        function sliderToDist(val) {
            return Math.exp(ZOOM_SLIDER_LOG_MAX - (val / 1000) * (ZOOM_SLIDER_LOG_MAX - ZOOM_SLIDER_LOG_MIN));
        }

        function updateZoomSlider() {
            const slider = document.getElementById('zoom-slider');
            if (!slider) return;
            slider.value = distToSlider(camera.position.distanceTo(controls.target));
        }

        function zoomCameraBy(scaleFactor) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            const craftOnlyFollowZoom = cameraMode === 'follow-orion' && currentEventKind === 'earth-orbit';
            if (craftOnlyFollowZoom) {
                const zoomingIn = scaleFactor < 1;
                if (zoomingIn) {
                    followCraftZoomScale = Math.min(12, followCraftZoomScale / Math.max(0.0001, scaleFactor));
                } else {
                    followCraftZoomScale = Math.max(1, followCraftZoomScale / Math.max(1, scaleFactor));
                }
                return;
            }
            const offset = camera.position.clone().sub(controls.target);
            if (offset.lengthSq() < 1e-6) offset.set(0, 0, 1);
            const currentRadius = offset.length();
            const zoomingIn = scaleFactor < 1;
            const trackedView = cameraMode === 'follow-orion' || cameraMode === 'earth-moon' || cameraMode === 'event';
            const nearZoomThreshold = trackedView ? 12 : 2;
            if (zoomingIn && trackedView && currentRadius <= nearZoomThreshold) {
                zoomForwardAmount += Math.max(1.5, currentRadius * 0.42);
            } else if (!zoomingIn && zoomForwardAmount > 0) {
                zoomForwardAmount = Math.max(0, zoomForwardAmount - Math.max(1.5, currentRadius * 0.5));
            }
            const nextRadius = Math.max(1.2, currentRadius * scaleFactor);
            camera.position.copy(
                controls.target.clone().add(offset.normalize().multiplyScalar(nextRadius))
            );
            controls.update();
        }

        function resetTrackedPanOffset() {
            trackedPanOffset.set(0, 0, 0);
            lastTrackedAutoTarget = null;
        }

        window.togglePanMode = () => {
            panModeActive = !panModeActive;
            updatePanModeState();
        };

        window.panView = (xDir, yDir) => {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            const offset = camera.position.clone().sub(controls.target);
            const distance = Math.max(1, offset.length());
            const step = Math.max(0.8, distance * 0.08);
            const forward = controls.target.clone().sub(camera.position);
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, -1);
            forward.normalize();
            const right = forward.clone().cross(camera.up).normalize();
            const up = right.clone().cross(forward).normalize();
            const delta = right.multiplyScalar(step * xDir).add(up.multiplyScalar(step * yDir));
            trackedPanOffset.add(delta);
            camera.position.add(delta);
            controls.target.add(delta);
            controls.update();
        };

        function getCurrentSceneDay(now = Date.now()) {
            if (scrubDay !== null) return scrubDay;
            if (paused && pausedDay !== null) return pausedDay;
            if (simStartReal !== null && simStartDay !== null) {
                return Math.max(0, simStartDay + (now - simStartReal) * speedMult / MS_PER_DAY);
            }
            if (currentEventKind !== 'orion') {
                return Math.max(0, (solarBaseDateMs - currentEventStartMs) / MS_PER_DAY);
            }
            return Math.max(0, (now - LAUNCH_TIME) / MS_PER_DAY);
        }

        function getCurrentSolarDateMs(now = Date.now()) {
            if (scrubSolarDateMs !== null) return scrubSolarDateMs;
            if (paused && pausedSolarDateMs !== null) return pausedSolarDateMs;
            if (simStartReal !== null && solarSimStartDateMs !== null) {
                return solarSimStartDateMs + (now - simStartReal) * speedMult;
            }
            return solarBaseDateMs;
        }

        function isModelTimelineDriven() {
            return simStartReal !== null || paused || scrubDay !== null || scrubSolarDateMs !== null;

        function clampMars2033DateMs(dateMs) {

        // Slider maps 0 → 1x, then 1-100 → MIN_SIM_SPEED to MAX_SIM_SPEED (exponential)
        function sliderToSpeed(val) {
            if (val <= 0) return 1;
            const t = (val - 1) / 99; // 1→100 maps to 0→1
            return Math.round(MIN_SIM_SPEED * Math.pow(MAX_SIM_SPEED / MIN_SIM_SPEED, t));
        }

        function formatCompactSpeedValue(spd) {
            if (spd >= 1000000) {

                return `${Number.isInteger(millions) ? millions : millions.toFixed(1).replace(/\.0$/, '')}M`;
            }
            if (spd >= 1000) {
                const thousands = spd / 1000;
                return `${Number.isInteger(thousands) ? thousands : thousands.toFixed(1).replace(/\.0$/, '')}K`;
            }
            return `${Math.round(spd)}`;

        // ANIMATION LOOP
        // ═══════════════════════════════════════════
        let prevOrionPos = null;
        let timelineDateEditorOpen = false;

        function setTimelineDateEditorOpen(open) {

        }

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // Delta time (seconds)
            const dt = (now - prevFrameTime) / 1000;
            prevFrameTime = now;

            // Mission time (real for HUD)
            const realElapsed = now - LAUNCH_TIME;
            const realElapsedDays = Math.max(0, realElapsed / MS_PER_DAY);
            const realT = Math.max(0, Math.min(realElapsed / MISSION_DURATION_MS, 1.0));
            const realDay = realT * MISSION_DAYS;
            const solarDateMs = getCurrentSolarDateMs(now);

            // Simulated time for 3D scene
            let simDayRaw;
            if (scrubDay !== null) {
                // User is scrubbing the timeline
                simDayRaw = scrubDay;
            } else if (paused && pausedDay !== null) {
                simDayRaw = pausedDay;
            } else if (simStartReal !== null && simStartDay !== null) {
                const dtMs = now - simStartReal;
                simDayRaw = simStartDay + (dtMs * speedMult) / MS_PER_DAY;
            } else {
                simDayRaw = realElapsedDays;
            }
            const simDay = Math.max(0, Math.min(simDayRaw, MISSION_DAYS));
            const simT = simDay / MISSION_DAYS;
            const missionDateMs = getEventDateMs(simDay);
            const sceneSolarDateMs =
                activeView === 'earth-moon' || cameraMode === 'follow-orion'
                    ? missionDateMs
                    : solarDateMs;
            if (currentEventTumbleStartMs !== null && sceneSolarDateMs < currentEventTumbleStartMs) {
                currentEventTumbleSpeedApplied = false;
            } else if (
                currentEventTumbleStartMs !== null &&
                currentEventTumbleSpeed &&
                !currentEventTumbleSpeedApplied &&
                sceneSolarDateMs >= currentEventTumbleStartMs
            ) {
                currentEventTumbleSpeedApplied = true;
                if (speedMult !== currentEventTumbleSpeed) {
                    setSpeed(currentEventTumbleSpeed);
                }
            }
            currentEventMarkerOrbEnabled = currentEventMarkerOrbConfigured && (
                currentEventMarkerOrbStartMs === null || sceneSolarDateMs >= currentEventMarkerOrbStartMs
            );
            const effectiveTumbleSpeedDeg =
                currentEventTumbleStartMs === null || sceneSolarDateMs >= currentEventTumbleStartMs
                    ? currentEventTumbleSpeedDeg
                    : 0;
            const solarDate = new Date(solarDateMs);
            const starScale = activeView === 'solar-system' ? SOLAR_STAR_SCALE : 1;
            starBackgroundGroup.scale.lerp(
                new THREE.Vector3(starScale, starScale, starScale),
                0.08
            );

            // ── Update Solar System ──
            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                if (Math.abs(sceneSolarDateMs - planet.lastOrbitRefreshMs) >= 30 * MS_PER_DAY) {
                    refreshSolarOrbitGeometry(planet, sceneSolarDateMs);
                }
                planet.group.position.copy(getPlanetLocalPos(planet.data, sceneSolarDateMs));
                const heliocentricOrbitMode = activeView === 'solar-system' || isEventView();
                const earthMoonWideOrbitMode =
                    activeView === 'earth-moon' &&
                    camera.position.distanceTo(controls.target) > 120;
                const earthMoonOrbitLineMode = activeView === 'earth-moon';
                const suppressEarthFocusOverlay =
                    currentEventKind !== 'orion' &&
                    (cameraMode === 'focus-earth' || cameraMode === 'focus-moon' || cameraMode === 'follow-orion');
                const hideHeliocentricEarthOverlay =
                    name === 'Earth' &&
                    (
                        (currentEventKind === 'earth-orbit' && (isEventView() || cameraMode === 'focus-earth')) ||
                        suppressEarthFocusOverlay
                    );
                const showStandaloneEarth = true;
                const suppressPlanetHalo = name === 'Jupiter' || name === 'Saturn';
                const venusHaloFactor = name === 'Venus' ? 0.3 : 1;
                const mercuryHaloFactor = name === 'Mercury' ? 0.35 : 1;
                const earthHaloFactor =
                    name === 'Earth' && (
                        activeView === 'solar-system' ||
                        (currentEventKind === 'earth-orbit' && (isEventView() || cameraMode === 'focus-earth')) ||
                        suppressEarthFocusOverlay
                    )
                        ? 0
                        : 1;
                const planetHaloFactor = venusHaloFactor * mercuryHaloFactor * earthHaloFactor;
                const mercuryVisualFactor = name === 'Mercury' ? 1.8 : 1;
                const basePlanetVisualBoost = activeView === 'solar-system'
                    ? (name === 'Earth' || name === 'Mars' ? 40 : 28)
                    : isEventView()
                    ? (name === 'Earth' || name === 'Mars' ? 9 : 6)
                    : earthMoonWideOrbitMode
                    ? (name === 'Earth' || name === 'Mars' ? 14 : 10)
                    : 1;
                const zoomResponsiveBoost = (heliocentricOrbitMode || earthMoonWideOrbitMode)
                    ? Math.min(
                        activeView === 'solar-system' ? 5.5 : earthMoonWideOrbitMode ? 5.2 : 4.5,
                        Math.max(
                            1,
                            camera.position.distanceTo(controls.target) / (
                                activeView === 'solar-system' ? 180000 :
                                earthMoonWideOrbitMode ? 6000 :
                                50000
                            )
                        )
                    )
                    : 1;
                const planetVisualBoost = basePlanetVisualBoost * zoomResponsiveBoost * mercuryVisualFactor;
                planet.visual.scale.setScalar(planetVisualBoost);
                planet.visual.visible = showStandaloneEarth && !hideHeliocentricEarthOverlay;
                planet.label.visible = !(activeView === 'earth-moon' && name === 'Earth') && !hideHeliocentricEarthOverlay;
                planet.label.position.y = planet.baseLabelY + (planetVisualBoost - 1) * planet.bodyRadius * 1.35;
                const labelScaleBoost = activeView === 'solar-system' ? 1.45 : isEventView() ? 1.3 : earthMoonWideOrbitMode ? 1.75 : 1.2;
                planet.label.scale.set(5.2 * labelScaleBoost, 0.65 * labelScaleBoost, 1);
                planet.label.material.opacity = activeView === 'earth-moon' ? 0.96 : isEventView() ? 0.9 : 0.88;
                planet.body.material.opacity = heliocentricOrbitMode ? 1 : 0.96;
                planet.marker.visible = showStandaloneEarth && heliocentricOrbitMode && !suppressPlanetHalo && planetHaloFactor > 0 && !hideHeliocentricEarthOverlay;
                planet.glow.visible = !suppressPlanetHalo && planetHaloFactor > 0 && !hideHeliocentricEarthOverlay;
                planet.marker.material.opacity = (suppressPlanetHalo ? 0 : activeView === 'solar-system' ? 0.08 : isEventView() ? 0.06 : 0.008) * planetHaloFactor;
                planet.glow.material.opacity = (suppressPlanetHalo ? 0 : isEventView() ? 0.02 : activeView === 'solar-system' ? 0.025 : earthMoonWideOrbitMode ? 0.003 : 0.006) * planetHaloFactor;
                if (planet.sprite) {
                    planet.sprite.visible = !suppressPlanetHalo && planetHaloFactor > 0 && !hideHeliocentricEarthOverlay;
                    planet.sprite.material.opacity = (suppressPlanetHalo ? 0 : isEventView() ? 0.02 : activeView === 'solar-system' ? 0.025 : earthMoonWideOrbitMode ? 0.004 : 0.008) * planetHaloFactor;
                }
                planet.orbitTube.material.opacity = hideHeliocentricEarthOverlay
                    ? 0
                    : heliocentricOrbitMode
                    ? (name === 'Earth' ? 0.26 : 0.18)
                    : 0;
                planet.orbitLine.material.opacity = !showStandaloneEarth || hideHeliocentricEarthOverlay
                    ? 0
                    : heliocentricOrbitMode
                    ? Math.min(0.95, planet.orbitBaseOpacity + 0.36)
                    : earthMoonOrbitLineMode
                    ? (name === 'Earth' ? (earthMoonWideOrbitMode ? 0.28 : 0) : 0.26)
                    : planet.orbitBaseOpacity;
            }
            let missionRoutePointsLocal = [];
            let missionRoutePointsWorld = [];
            let missionProgressT = 0;
            let missionCraftWorld = activeEventWorldPos.clone();
            if (currentEventKind === 'mars') {
                const missionEarthDepart = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS);
                const missionMarsArrive = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS);
                const missionMarsDepart = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS);
                const missionEarthReturn = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS);
                const outHeight = Math.max(2000, missionEarthDepart.distanceTo(missionMarsArrive) * 0.12);
                const backHeight = Math.max(2000, missionMarsDepart.distanceTo(missionEarthReturn) * 0.12);
                const outbound = buildTransferSegment(missionEarthDepart, missionMarsArrive, outHeight, 1200);
                outbound[outbound.length - 1].copy(missionMarsArrive);
                const stay = buildPlanetTimedPath(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS, MARS_2033_DEPART_MARS_MS, 10).slice(1);
                const missionReturn = buildTransferSegment(missionMarsDepart, missionEarthReturn, -backHeight, 950).slice(1);
                missionRoutePointsLocal = outbound.concat(stay, missionReturn);
                missionRoutePointsWorld = missionRoutePointsLocal.map((point) => point.clone().add(SOLAR_CENTER));
                const outboundCount = Math.max(1, outbound.length - 1);
                const stayCount = Math.max(1, stay.length - 1);
                const returnCount = Math.max(1, missionReturn.length - 1);
                const pointCount = Math.max(1, missionRoutePointsLocal.length - 1);
                if (solarDateMs < MARS_2033_ARRIVE_MARS_MS) {
                    missionProgressT = ((solarDateMs - MARS_2033_DEPART_EARTH_MS) / (MARS_2033_ARRIVE_MARS_MS - MARS_2033_DEPART_EARTH_MS)) * (outboundCount / pointCount);
                } else if (solarDateMs < MARS_2033_DEPART_MARS_MS) {
                    missionProgressT = (outboundCount + ((solarDateMs - MARS_2033_ARRIVE_MARS_MS) / (MARS_2033_DEPART_MARS_MS - MARS_2033_ARRIVE_MARS_MS)) * stayCount) / pointCount;
                } else if (solarDateMs < MARS_2033_RETURN_EARTH_MS) {
                    missionProgressT = (outboundCount + stayCount + ((solarDateMs - MARS_2033_DEPART_MARS_MS) / (MARS_2033_RETURN_EARTH_MS - MARS_2033_DEPART_MARS_MS)) * returnCount) / pointCount;
                } else {
                    missionProgressT = 1;
                }
                missionCraftWorld = getMars2033VehicleLocalPos(solarDateMs, outbound, stay, missionReturn).add(SOLAR_CENTER);
                mars2033CraftGroup.position.copy(missionCraftWorld.clone().sub(SOLAR_CENTER));
            } else if (currentEventKind === 'earth-orbit' && currentEventEarthOrbit) {
                const earthLocal = getPlanetLocalPos(solarPlanets.Earth.data, sceneSolarDateMs);
                const earthWorldForOrbit = earthLocal.clone().add(SOLAR_CENTER);
                const missionOrbitLocal = buildEarthOrbitVisualLoopPoints(
                    currentEventEarthOrbit,
                    solarDateMs,
                    currentEventEarthOrbit.visualSampleCount || 144
                );
                missionRoutePointsLocal = missionOrbitLocal.map((point) => point.clone().add(earthLocal));
                missionRoutePointsWorld = missionRoutePointsLocal.map((point) => point.clone().add(SOLAR_CENTER));
                const orbitState = getEarthOrbitDecayState(currentEventEarthOrbit, solarDateMs);
                missionProgressT = (((orbitState.meanAnomalyDeg % 360) + 360) % 360) / 360;
                missionCraftWorld = earthWorldForOrbit.add(getEarthOrbitEventLocalPos(currentEventEarthOrbit, solarDateMs));
                const tangentSampleMs = solarDateMs + 2 * 60 * 1000;
                const nextEarthWorldForOrbit = getPlanetWorldPos(solarPlanets.Earth.data, tangentSampleMs);
                const nextMissionCraftWorld = nextEarthWorldForOrbit.add(getEarthOrbitEventLocalPos(currentEventEarthOrbit, tangentSampleMs));

                if (activeEventWorldDir.lengthSq() < 1e-6) activeEventWorldDir.set(0, 0, 1);

            // ── Update Moon ──

            const moonOrbitRefreshKey = currentEventKind === 'orion' ? simDay : sceneSolarDateMs;

            if (lastMoonOrbitRefreshMs === null || Math.abs(moonOrbitRefreshKey - lastMoonOrbitRefreshMs) >= moonOrbitRefreshThreshold) {
                const fullOrbitPts = currentEventKind === 'orion'

                    ? buildMoonOrbitPointsAroundOrionDay(simDay, 180)

                moonOrbitCurrentArc.geometry = new THREE.BufferGeometry().setFromPoints(currentArcPts);
                lastMoonOrbitRefreshMs = moonOrbitRefreshKey;
            }

            // ── Update Orion ──
            const orionKm = getTrajectoryPos(simDay);
            const orionSc = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            const orionWorld = earthWorld.clone().add(orionSc);
            const nextKm = getTrajectoryPos(Math.min(simDay + 0.005, MISSION_DAYS));
            const dir = new THREE.Vector3().subVectors(
                new THREE.Vector3(nextKm.x, nextKm.y, nextKm.z),
                orionKm
            ).normalize();
            const orionLookTarget = orionWorld.clone().add(dir.clone().multiplyScalar(SCALE));
            const selectedCraftWorld = currentEventKind === 'orion' ? orionWorld : activeEventWorldPos;
            const selectedCraftLookTarget = currentEventKind === 'orion'
                ? orionLookTarget
                : activeEventWorldPos.clone().add(activeEventWorldDir.clone().multiplyScalar(4000));
            const eventModelWorld = getEventModelWorldPos(selectedCraftWorld);
            sphereCraftGroup.position.copy(selectedCraftWorld);
            eventModelGroup.position.copy(eventModelWorld);
            sphereCraftGroup.lookAt(selectedCraftLookTarget);
            const eventModelLookTarget = getEventModelWorldPos(selectedCraftLookTarget);
            const lockModelOrientationUntilTumble =
                currentEventVehicle === 'model' &&
                Boolean(currentEventObject?.lockOrientationUntilTumble) &&
                currentEventTumbleStartMs !== null &&
                sceneSolarDateMs < currentEventTumbleStartMs;
            if (lockModelOrientationUntilTumble) {
                if (!eventModelLockedQuaternion) {
                    eventModelGroup.lookAt(eventModelLookTarget);
                    eventModelLockedQuaternion = eventModelGroup.quaternion.clone();
                }
                eventModelGroup.quaternion.copy(eventModelLockedQuaternion);
            } else {
                eventModelGroup.lookAt(eventModelLookTarget);
                eventModelLockedQuaternion = null;
            }
            if (eventModelNode && effectiveTumbleSpeedDeg !== 0) {
                const tumbleTimeScale =
                    paused || scrubbing
                        ? 0
                        : (cameraMode === 'follow-orion' && currentEventKind !== 'orion')
                        ? Math.max(1, speedMult)
                        : 1;
                const tumbleStep = THREE.MathUtils.degToRad(effectiveTumbleSpeedDeg) * dt * tumbleTimeScale;
                const tumbleAxis = currentEventTumbleAxes.lengthSq() > 1e-9
                    ? currentEventTumbleAxes
                    : new THREE.Vector3(0, 0, 1);

            }
            if (eventModelNode) {
                const glowActive = Boolean(currentEventObjectSurfaceGlow?.enabled) && currentEventMarkerOrbEnabled;
                const glowColor = new THREE.Color(currentEventObjectSurfaceGlow?.color || '#ff7a2c');
                const darkColor = new THREE.Color(currentEventObjectSurfaceGlow?.darkColor || '#2d3138');
                const litColor = new THREE.Color(currentEventObjectSurfaceGlow?.litColor || currentEventObjectSurfaceGlow?.color || '#ff7a2c');
                const edgeHighlightActive = Boolean(currentEventObject?.edgeHighlight?.enabled);
                const edgeHighlightColor = new THREE.Color(currentEventObject?.edgeHighlight?.color || '#ffd79b');
                const edgeHighlightIntensity = Number.isFinite(currentEventObject?.edgeHighlight?.intensity) ? currentEventObject.edgeHighlight.intensity : 0.16;
                const edgeHighlightPower = Number.isFinite(currentEventObject?.edgeHighlight?.power) ? currentEventObject.edgeHighlight.power : 2.2;
                const glowIntensity = Number.isFinite(currentEventObjectSurfaceGlow?.intensity) ? currentEventObjectSurfaceGlow.intensity : 0.28;
                const glowPulseAmplitude = Number.isFinite(currentEventObjectSurfaceGlow?.pulseAmplitude) ? currentEventObjectSurfaceGlow.pulseAmplitude : 0.12;
                const sunWorldPos = sunSceneGroup?.position || SOLAR_CENTER;
                eventModelNode.traverse?.((child) => {

                    const glowPhase = Number.isFinite(child.userData?.surfaceGlowPhase) ? child.userData.surfaceGlowPhase : 0;
                    const partLocalCenter = child.userData?.surfaceCenterLocal || new THREE.Vector3();
                    const partWorldCenter = child.localToWorld(partLocalCenter.clone());
                    const radialDir = partWorldCenter.clone().sub(eventModelWorld).normalize();
                    const sunDir = sunWorldPos.clone().sub(partWorldCenter).normalize();

                        ? THREE.MathUtils.smoothstep((radialDir.dot(sunDir) + 1) * 0.5, 0.2, 0.95)

                        ? Math.pow(Math.max(0, 1 - Math.abs(radialDir.dot(viewDir))), edgeHighlightPower)

                        ? Math.max(
                            0,
                            0.55
                            + 0.45 * Math.sin(now * (0.0048 + glowWeight * 0.0016) + glowPhase)
                            + glowPulseAmplitude * Math.sin(now * 0.013 + glowPhase * 1.7)

                        : 0;

            }

                : activeView === 'earth-moon'

                    )

                    ? currentEventKind === 'earth-orbit'

                            ? Math.max(1, Math.min(1.6, camera.position.distanceTo(controls.target) * 0.03))
                            : Math.max(4, Math.min(40, camera.position.distanceTo(controls.target) * 0.8))
                        : Math.max(420, Math.min(4200, camera.position.distanceTo(controls.target) / 70))
                    : 1;

            const followZoomScaleFactor =
                currentEventVehicle === 'model' && cameraMode === 'follow-orion' && currentEventKind !== 'orion' && configuredFollowCraftDistance > 0
                    ? Math.max(1, Math.min(6, configuredFollowCraftDistance / Math.max(1e-6, nonOrionFollowCraftDistance)))
                    : 1;
            const followCraftScaleFactor =
                cameraMode === 'follow-orion' && currentEventKind === 'earth-orbit'

                    : 1;
            const solarSystemOrionScaleFactor = currentEventKind === 'orion' && activeView === 'solar-system' ? 0.25 : 1;
            const sphereVisibilityScale = activeView === 'earth-moon' ? (1.25 / 6) : 1.25;
            const orionEarthAltitudeKm = Math.max(0, orionWorld.distanceTo(earthWorld) / SCALE - EARTH_RADIUS_KM);
            const isLateEarthApproach = currentEventKind === 'orion' && simDay >= MISSION_DAYS * 0.985 && orionEarthAltitudeKm <= 25000;
            const focusMoonCraftDistance = camera.position.distanceTo(selectedCraftWorld);
            const focusMoonNearCraftFactor =

                    ? 0.05 + 0.95 * Math.min(1, Math.max(0, (focusMoonCraftDistance - 40) / 180))

            const markerOrbScaleFactor = currentEventMarkerOrbScale || 1;

            eventModelLabel.position.y = compactFollowModelLabel

                : (currentEventModelLabelOffsetY ?? (currentEventKind === 'earth-orbit' ? 0.28 : 0.6));

            eventModelLabel.visible = (currentEventVehicle === 'model' || replaceSphereWithModel) && !currentEventMarkerOrbEnabled;
            const markerOrbPulse =
                currentEventVehicle === 'model' && currentEventMarkerOrbEnabled
                    ? (0.88 + 0.12 * Math.sin(now * 0.006))

            sphereCraft.material.opacity =
                currentEventVehicle === 'sphere'
                    ? currentEventMarkerOrbOpacity
                    : currentEventMarkerOrbEnabled
                    ? currentEventMarkerOrbOpacity * markerOrbPulse

            sphereCraft.material.side = currentEventMarkerOrbSide;
            sphereCraft.renderOrder = currentEventMarkerOrbRenderOrder;
            sphereCraft.material.depthTest = true;
            const modelBeaconActive = currentEventVehicle === 'model'

            emLine.geometry = new THREE.BufferGeometry().setFromPoints([

            const useMinimalEarthHalo =
                (currentEventKind === 'earth-orbit' && (isEventView() || cameraMode === 'focus-earth')) ||
                (currentEventKind !== 'orion' && (cameraMode === 'focus-earth' || cameraMode === 'focus-moon' || cameraMode === 'follow-orion'));
            earthAtmosphereMesh.visible = !useMinimalEarthHalo;

            if (earthBeaconSprite) {
                earthBeaconSprite.visible = !useMinimalEarthHalo;
                earthBeaconSprite.material.opacity = useMinimalEarthHalo ? 0 : 0.8;
            }

            // ── Earth rotation (360° in 24h, accelerated with sim) ──
            const earthAngularVel = (2 * Math.PI) / 86400; // rad/s
            const earthRotationSpeed =
                (paused || scrubbing)
                    ? 0
                    : speedMult > 1
                    ? speedMult
                    : 1;
            earthMesh.rotation.y += earthAngularVel * dt * earthRotationSpeed;
            earthNightLightsMesh.rotation.copy(earthMesh.rotation);
            earthNightLightsUniforms.sunWorldPosition.value.copy(sunSceneGroup?.position || SOLAR_CENTER);

            // ── Sun alignment ──
            if (sunSceneGroup) {
                sunSceneGroup.visible = true;
                sunSceneGroup.position.copy(SOLAR_CENTER);
            }
            if (sunSceneCore) {
                sunSceneCore.scale.setScalar(1);
            }
            if (sunSceneGlow) {

                sunSceneGlow.scale.set(glowDiameter, glowDiameter, 1);
            }
            sunDir.position.copy(SOLAR_CENTER);
            sunDir.target.position.copy(earthGroup.position);

            // ── Camera ──
            // Animate transitions first (button clicks)
            if (targetPos) {
                camera.position.lerp(targetPos, 0.06);
                controls.target.lerp(targetLook, 0.06);
                if (camera.position.distanceTo(targetPos) < 1.0) {
                    targetPos = null;
                    targetLook = null;
                }
            }

            // After transition, continuously track targets (direct copy, no lerp = no fighting)
            if (!targetPos) {
                const isTrackedPanMode =
                    panModeActive &&
                    (cameraMode === 'follow-orion' || cameraMode === 'focus-earth' || cameraMode === 'focus-moon' || cameraMode === 'earth-moon' || cameraMode === 'event');
                if (isTrackedPanMode && lastTrackedAutoTarget) {
                    const panDelta = controls.target.clone().sub(lastTrackedAutoTarget);
                    if (panDelta.lengthSq() > 1e-8) {

                if (cameraMode === 'follow-orion') {
                    const activeCraft = getGroupWorldPosition(getEventVehicleGroup());
                    if (currentEventKind === 'orion' || !currentEventFollowCamera) {

                        const offset = camera.position.clone().sub(controls.target);
                        const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                        controls.target.copy(activeCraft).add(dolly).add(trackedPanOffset);
                        camera.position.copy(activeCraft).add(offset).add(dolly).add(trackedPanOffset);
                    } else {
                        const followPose = getEventFollowCameraPose(activeCraft);
                        const dolly = activeEventWorldDir.clone().normalize().multiplyScalar(zoomForwardAmount);
                        controls.target.copy(followPose.target).add(dolly).add(trackedPanOffset);
                        camera.position.copy(followPose.position).add(dolly).add(trackedPanOffset);
                    }
                } else if (cameraMode === 'focus-earth') {
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    const focusAnchor = earthGroup.position.clone();
                    controls.target.copy(focusAnchor).add(dolly).add(trackedPanOffset);
                    camera.position.copy(focusAnchor).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'focus-moon') {
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);

                    if (currentEventFocusMoonEarthBackground) {
                        const focusCamera = getEventFocusCamera('moon', focusAnchor);
                        controls.target.copy(focusCamera.target).add(dolly).add(trackedPanOffset);

                    } else {
