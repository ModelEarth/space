        function formatKm(n) {
            return Math.round(Math.abs(n)).toLocaleString('en-US');
        }

        function normalizeDegrees(deg) {
            return ((deg % 360) + 360) % 360;
        }

        function normalizeSignedDegrees(deg) {
            const normalized = normalizeDegrees(deg);
            return normalized > 180 ? normalized - 360 : normalized;
        }

        function toJulianDate(ms) {
            return ms / MS_PER_DAY + 2440587.5;
        }

        function msToDateInputValue(ms) {
            return new Date(ms).toISOString().slice(0, 10);
        }

        function dateInputValueToMs(value) {
            if (!value) return DEFAULT_SOLAR_DATE_MS;
            const [year, month, day] = value.split('-').map(Number);
            return Date.UTC(year, month - 1, day, 12, 0, 0);
        }

        function solveKeplerDegrees(Mdeg, e) {
            let E = Mdeg + (180 / Math.PI) * e * Math.sin(Mdeg * Math.PI / 180);
            for (let i = 0; i < 12; i++) {
                const deltaM = Mdeg - (E - (180 / Math.PI) * e * Math.sin(E * Math.PI / 180));
                const deltaE = deltaM / (1 - e * Math.cos(E * Math.PI / 180));
                E += deltaE;
                if (Math.abs(deltaE) <= 1e-6) break;
            }
            return E;
        }

        function getPlanetElementsAtDate(planet, dateMs) {
            const T = (toJulianDate(dateMs) - JD_J2000) / 36525;
            const el = planet.elements;
            const a = el.a0 + el.a1 * T;
            const e = el.e0 + el.e1 * T;
            const I = el.I0 + el.I1 * T;
            const L = el.L0 + el.L1 * T;
            const longPeri = el.lp0 + el.lp1 * T;
            const longNode = el.node0 + el.node1 * T;
            const omega = longPeri - longNode;
            const M = normalizeSignedDegrees(
                L - longPeri +
                el.b * T * T +
                el.c * Math.cos(el.f * T * Math.PI / 180) +
                el.s * Math.sin(el.f * T * Math.PI / 180)
            );

            return { a, e, I, omega, longNode, M };
        }

        function orbitalPointToScene(xPrime, yPrime, Ideg, omegaDeg, nodeDeg) {
            const I = Ideg * Math.PI / 180;
            const omega = omegaDeg * Math.PI / 180;
            const node = nodeDeg * Math.PI / 180;

            const cosO = Math.cos(omega), sinO = Math.sin(omega);
            const cosN = Math.cos(node), sinN = Math.sin(node);
            const cosI = Math.cos(I), sinI = Math.sin(I);

            const xEcl = (cosO * cosN - sinO * sinN * cosI) * xPrime +
                (-sinO * cosN - cosO * sinN * cosI) * yPrime;
            const yEcl = (cosO * sinN + sinO * cosN * cosI) * xPrime +
                (-sinO * sinN + cosO * cosN * cosI) * yPrime;
            const zEcl = (sinO * sinI) * xPrime + (cosO * sinI) * yPrime;

            return new THREE.Vector3(
                xEcl * AU_KM * SOLAR_ORBIT_SCALE,
                zEcl * AU_KM * SOLAR_ORBIT_SCALE,
                yEcl * AU_KM * SOLAR_ORBIT_SCALE
            );
        }

        function getPlanetLocalPos(planet, dateMs) {
            const { a, e, I, omega, longNode, M } = getPlanetElementsAtDate(planet, dateMs);
            const E = solveKeplerDegrees(M, e) * Math.PI / 180;
            const xPrime = a * (Math.cos(E) - e);
            const yPrime = a * Math.sqrt(1 - e * e) * Math.sin(E);
            return orbitalPointToScene(xPrime, yPrime, I, omega, longNode);
        }

        function getPlanetWorldPos(planet, dateMs) {
            return getPlanetLocalPos(planet, dateMs).add(SOLAR_CENTER);
        }

        function buildPlanetOrbitPoints(planet, dateMs, segments = 360) {
            const { a, e, I, omega, longNode } = getPlanetElementsAtDate(planet, dateMs);
            const pts = [];
            for (let i = 0; i < segments; i++) {
                const E = (i / segments) * Math.PI * 2;
                const xPrime = a * (Math.cos(E) - e);
                const yPrime = a * Math.sqrt(1 - e * e) * Math.sin(E);
                pts.push(orbitalPointToScene(xPrime, yPrime, I, omega, longNode));
            }
            return pts;
        }

        function getOrbitTubeRadius(points) {
            let maxRadius = 0;
            for (const p of points) maxRadius = Math.max(maxRadius, p.length());
            return Math.max(SOLAR_ORBIT_TUBE_MIN, Math.min(SOLAR_ORBIT_TUBE_MAX, maxRadius * 0.00012));
        }

        function buildOrbitTubeGeometry(points) {
            const closedPoints = points.concat(points[0].clone());
            const curve = new THREE.CatmullRomCurve3(closedPoints, true, 'centripetal');
            return new THREE.TubeGeometry(curve, closedPoints.length * 2, getOrbitTubeRadius(points), 10, true);
        }

        function refreshSolarOrbitGeometry(record, dateMs) {
            const pts = buildPlanetOrbitPoints(record.data, dateMs);
            record.orbitLine.geometry.dispose();
            record.orbitLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
            record.orbitTube.geometry.dispose();
            record.orbitTube.geometry = buildOrbitTubeGeometry(pts);
            record.lastOrbitRefreshMs = dateMs;
        }

        function buildTransferSegment(start, end, height, outwardScale) {
            const mid = start.clone().add(end).multiplyScalar(0.5);
            const outward = mid.clone().normalize().multiplyScalar(outwardScale);
            const curve = new THREE.CatmullRomCurve3([
                start.clone(),
                start.clone().lerp(end, 0.22).add(new THREE.Vector3(0, height * 0.65, 0)).add(outward.clone().multiplyScalar(0.35)),
                mid.clone().add(new THREE.Vector3(0, height, 0)).add(outward),
                start.clone().lerp(end, 0.78).add(new THREE.Vector3(0, height * 0.6, 0)).add(outward.clone().multiplyScalar(0.25)),
                end.clone()
            ]);
            return curve.getPoints(72);
        }

        function buildHoldArc(center, start, end, lift = 0) {
            const radius = Math.max(18, start.distanceTo(center) * 0.35);
            const startDir = start.clone().sub(center).normalize();
            const endDir = end.clone().sub(center).normalize();
            const arcMid = startDir.clone().add(endDir).normalize();
            if (arcMid.lengthSq() < 1e-6) arcMid.copy(startDir.clone().cross(new THREE.Vector3(0, 1, 0)).normalize());
            return new THREE.CatmullRomCurve3([
                start.clone(),
                center.clone().add(startDir.multiplyScalar(radius)).add(new THREE.Vector3(0, lift, 0)),
                center.clone().add(arcMid.multiplyScalar(radius * 1.2)).add(new THREE.Vector3(0, lift * 1.2, 0)),
                center.clone().add(endDir.multiplyScalar(radius)).add(new THREE.Vector3(0, lift, 0)),
                end.clone()
            ]).getPoints(36);
        }

        function samplePathPoints(points, t) {
            if (!points.length) return new THREE.Vector3();
            if (points.length === 1) return points[0].clone();
            const clampedT = Math.max(0, Math.min(1, t));
            const scaledIndex = clampedT * (points.length - 1);
            const baseIndex = Math.floor(scaledIndex);
            const nextIndex = Math.min(points.length - 1, baseIndex + 1);
            const localT = scaledIndex - baseIndex;
            return points[baseIndex].clone().lerp(points[nextIndex], localT);
        }

        function getMars2033VehicleLocalPos(dateMs, outboundPoints, stayPoints, returnPoints) {
            if (dateMs <= MARS_2033_DEPART_EARTH_MS) return outboundPoints[0].clone();
            if (dateMs < MARS_2033_ARRIVE_MARS_MS) {
                return samplePathPoints(
                    outboundPoints,
                    (dateMs - MARS_2033_DEPART_EARTH_MS) / (MARS_2033_ARRIVE_MARS_MS - MARS_2033_DEPART_EARTH_MS)
                );
            }
            if (dateMs < MARS_2033_DEPART_MARS_MS) {
                return samplePathPoints(
                    stayPoints,
                    (dateMs - MARS_2033_ARRIVE_MARS_MS) / (MARS_2033_DEPART_MARS_MS - MARS_2033_ARRIVE_MARS_MS)
                );
            }
            if (dateMs < MARS_2033_RETURN_EARTH_MS) {
                return samplePathPoints(
                    returnPoints,
                    (dateMs - MARS_2033_DEPART_MARS_MS) / (MARS_2033_RETURN_EARTH_MS - MARS_2033_DEPART_MARS_MS)
                );
            }
            return returnPoints[returnPoints.length - 1].clone();
        }

        // ═══════════════════════════════════════════
        // SOLAR SYSTEM
        // ═══════════════════════════════════════════
        const initialSolarOrbitDateMs = DEFAULT_SOLAR_DATE_MS;
        for (const planet of solarSystemData) {
            const initialOrbitPoints = buildPlanetOrbitPoints(planet, initialSolarOrbitDateMs);
            const orbitLine = new THREE.LineLoop(
                new THREE.BufferGeometry().setFromPoints(initialOrbitPoints),
                new THREE.LineBasicMaterial({
                    color: planet.orbitColor,
                    transparent: true,
                    opacity: planet.name === 'Earth' ? 0.32 : 0.18
                })
            );
            orbitLine.frustumCulled = false;
            solarSystemGroup.add(orbitLine);

            const orbitTube = new THREE.Mesh(
                buildOrbitTubeGeometry(initialOrbitPoints),
                new THREE.MeshBasicMaterial({
                    color: planet.orbitColor,
                    transparent: true,
                    opacity: 0,
                    side: THREE.DoubleSide,
                    depthWrite: false
                })
            );
            orbitTube.frustumCulled = false;
            solarSystemGroup.add(orbitTube);

            const planetGroup = new THREE.Group();
            const planetVisual = new THREE.Group();
            planetGroup.add(planetVisual);
            const bodyRadius = Math.max(planet.radiusKm * SOLAR_PLANET_RADIUS_SCALE, 0.5);
            const body = new THREE.Mesh(
                new THREE.SphereGeometry(bodyRadius, 32, 16),
                new THREE.MeshBasicMaterial({
                    color: planet.color,
                    transparent: true,
                    opacity: 0.96
                })
            );
            planetVisual.add(body);

            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(Math.max(bodyRadius * 2.4, 7), 18, 12),
                new THREE.MeshBasicMaterial({
                    color: planet.color,
                    transparent: true,
                    opacity: 0.9,
                    depthWrite: false
                })
            );
            marker.visible = false;
            planetVisual.add(marker);

            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(bodyRadius * 3.2, 16, 12),
                new THREE.MeshBasicMaterial({
                    color: planet.color,
                    transparent: true,
                    opacity: 0.18,
                    blending: THREE.AdditiveBlending
                })
            );
            planetVisual.add(glow);

            let sprite = null;
            (() => {
                const c = document.createElement('canvas');
                c.width = 128; c.height = 128;
                const ctx = c.getContext('2d');
                const color = `#${planet.color.toString(16).padStart(6, '0')}`;
                const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
                grad.addColorStop(0, color);
                grad.addColorStop(0.22, color);
                grad.addColorStop(0.45, `${color}88`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 128, 128);
                const tex = new THREE.CanvasTexture(c);
                sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: tex,
                    transparent: true,
                    opacity: 0.42,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                }));
                const spriteSize = Math.max(bodyRadius * 4.6, 4.5);
                sprite.scale.set(spriteSize, spriteSize, 1);
                planetVisual.add(sprite);
            })();

            if (planet.hasRings) {
                const rings = new THREE.Mesh(
                    new THREE.RingGeometry(bodyRadius * 1.35, bodyRadius * 2.4, 64),
                    new THREE.MeshBasicMaterial({
                        color: 0xd7c7a1,
                        transparent: true,
                        opacity: 0.45,
                        side: THREE.DoubleSide
                    })
                );
                rings.rotation.x = Math.PI / 2;
                rings.rotation.z = 0.55;
                planetVisual.add(rings);
            }

            const label = createLabel(planet.name.toUpperCase(), planet.label);
            const baseLabelY = bodyRadius + 2.2;
            label.position.set(0, baseLabelY, 0);
            label.scale.set(5.2, 0.65, 1);
            planetGroup.add(label);

            solarSystemGroup.add(planetGroup);
            solarPlanets[planet.name] = {
                data: planet,
                group: planetGroup,
                visual: planetVisual,
                body,
                marker,
                glow,
                sprite,
                bodyRadius,
                baseLabelY,
                label,
                orbitLine,
                orbitTube,
                orbitBaseOpacity: planet.name === 'Earth' ? 0.32 : 0.18,
                lastOrbitRefreshMs: initialSolarOrbitDateMs
            };
        }

        const mars2033TransferLine = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineDashedMaterial({
                color: 0x6b3fb3,
                transparent: true,
                opacity: 0.7,
                dashSize: 2.5,
                gapSize: 1.2
            })
        );
        solarSystemGroup.add(mars2033TransferLine);

        const mars2033TraveledLine = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0xff6b35, transparent: true, opacity: 0.9 })
        );
        solarSystemGroup.add(mars2033TraveledLine);

        const mars2033TransferGlow = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: 0x6b3fb3, transparent: true, opacity: 0.2 })
        );
        solarSystemGroup.add(mars2033TransferGlow);

        const mars2033CraftGroup = new THREE.Group();
        mars2033CraftGroup.visible = false;
        mars2033CraftGroup.frustumCulled = false;

        const mars2033Orb = new THREE.Mesh(
            new THREE.SphereGeometry(180, 18, 18),
            new THREE.MeshBasicMaterial({ color: 0xd7a6ff, transparent: true, opacity: 0.9 })
        );
        mars2033CraftGroup.add(mars2033Orb);

        const mars2033CraftLabel = createLabel('MARS 2033', '#d3a8ff');
        mars2033CraftLabel.position.set(0, 1350, 0);
        mars2033CraftLabel.scale.set(8000, 1000, 1);
        mars2033CraftGroup.add(mars2033CraftLabel);
        solarSystemGroup.add(mars2033CraftGroup);

        // ═══════════════════════════════════════════
        // STATE & CONTROLS
        // ═══════════════════════════════════════════
        // Camera modes: 'free', 'follow-orion', 'earth-moon', 'solar-system', 'mars-2033'
        let cameraMode = 'free';
        let activeView = 'earth-moon';
        let speedMult = 1;
        let simStartReal = null;   // Date.now() when sim was activated
        let simStartDay = null;    // elapsed day when sim was activated
        let solarBaseDateMs = DEFAULT_SOLAR_DATE_MS;
        let solarSimStartDateMs = null;
        let paused = false;
        let pausedDay = null;
        let pausedSolarDateMs = null;
        let scrubSolarDateMs = null;
        let prevFrameTime = Date.now();
        let sunAngle = 0;          // Sun orbital angle
        let targetPos = null;
        let targetLook = null;
        let lastPlanetDateInputValue = '';
        let observerAngleResetTimeout = null;
        let currentObserverVantagePoint = 'From Space';
        let zoomForwardAmount = 0;

        function getHashFocusValue() {
            return new URLSearchParams(window.location.hash.replace(/^#/, '')).get('focus');
        }

        function setFocusHash(focus) {
            const nextHash = `focus=${focus}`;
            if (window.location.hash.replace(/^#/, '') === nextHash) return;
            window.location.hash = nextHash;
        }

        function focusOrion() {
            cameraMode = 'follow-orion';
            syncActiveButtons();
            controls.enabled = true;
            const op = orionGroup.position.clone();
            targetPos = op.clone().add(new THREE.Vector3(4.5, 4.5, 10));
            targetLook = op.clone();
            setFocusHash('orion');
        }

        function applyFocusHash() {
            switch (getHashFocusValue()) {
                case 'orion':
                    if (cameraMode !== 'follow-orion') focusOrion();
                    break;
                case 'earth':
                    focusEarth();
                    break;
                case 'moon':
                    focusMoon();
                    break;
                case 'earthmoon':
                    focusEarthMoon();
                    break;
                case 'solarsystem':
                    focusSolarSystem();
                    break;
                case 'mars2033':
                    focusMars2033();
                    break;
                default:
                    break;
            }
        }

        function roundCameraValue(value) {
            return Number(value.toFixed(3));
        }

        function pulseObserverControl(elementId) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.classList.add('sim-active');
            if (observerAngleResetTimeout !== null) {
                clearTimeout(observerAngleResetTimeout);
            }
            observerAngleResetTimeout = window.setTimeout(() => {
                el.classList.remove('sim-active');
                observerAngleResetTimeout = null;
            }, 1200);
        }

        function setObserverPanelVisible(visible) {
            const panel = document.getElementById('observerSpecs');
            const btn = document.getElementById('btn-observer-angle');
            panel.classList.toggle('open', visible);
            panel.setAttribute('aria-hidden', visible ? 'false' : 'true');
            btn.classList.toggle('active', visible);
            if (!visible) setObserverEditorVisible(false);
        }

        function setObserverEditorVisible(visible) {
            const advanced = document.getElementById('observer-specs-advanced');
            advanced.classList.toggle('open', visible);
            advanced.setAttribute('aria-hidden', visible ? 'false' : 'true');
            document.getElementById('observer-specs-toggle-wrap').classList.toggle('hidden', visible);
        }

        async function writeClipboardText(text) {
            if (navigator.clipboard && window.isSecureContext) {
                await navigator.clipboard.writeText(text);
                return;
            }

            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.setAttribute('readonly', '');
            textArea.style.position = 'fixed';
            textArea.style.opacity = '0';
            textArea.style.pointerEvents = 'none';
            document.body.appendChild(textArea);
            textArea.select();

            const copied = document.execCommand('copy');
            document.body.removeChild(textArea);

            if (!copied) {
                throw new Error('Clipboard copy failed');
            }
        }

        function getObserverPayloadFromCamera(position = camera.position.clone(), target = controls.target.clone(), extra = {}) {
            const offset = position.clone().sub(target);
            const spherical = new THREE.Spherical().setFromVector3(offset);
            return {
                view: activeView,
                cameraMode,
                vantagePoint: currentObserverVantagePoint,
                distance: roundCameraValue(spherical.radius),
                azimuthDeg: roundCameraValue(THREE.MathUtils.radToDeg(spherical.theta)),
                polarDeg: roundCameraValue(THREE.MathUtils.radToDeg(spherical.phi)),
                position: {
                    x: roundCameraValue(position.x),
                    y: roundCameraValue(position.y),
                    z: roundCameraValue(position.z)
                },
                target: {
                    x: roundCameraValue(target.x),
                    y: roundCameraValue(target.y),
                    z: roundCameraValue(target.z)
                },
                ...extra
            };
        }

        function setObserverJsonText(payload) {
            document.getElementById('observer-json').value = JSON.stringify(payload, null, 2);
        }

        function getCurrentViewAnchorTarget() {
            if (cameraMode === 'follow-orion') return orionGroup.position.clone();
            if (cameraMode === 'earth-moon') {
                const mid = moonGroup.position.clone().multiplyScalar(0.45);
                mid.y = 0;
                return mid;
            }
            if (cameraMode === 'mars-2033') {
                return controls.target.clone();
            }
            if (cameraMode === 'solar-system') return SOLAR_CENTER.clone();
            return controls.target.clone();
        }

        function getSolarBodyWorldPos(name, dateMs = getCurrentSolarDateMs()) {
            if (name === 'Sun') return SOLAR_CENTER.clone();
            if (!solarPlanets[name]) return null;
            return getPlanetWorldPos(solarPlanets[name].data, dateMs);
        }

        function getEarthWorldPosForView() {
            if (activeView === 'earth-moon' || cameraMode === 'follow-orion') {
                return new THREE.Vector3(0, 0, 0);
            }
            return getSolarBodyWorldPos('Earth');
        }

        function getMoonWorldPosForView() {
            return moonGroup.position.clone();
        }

        function getAstroidBeltWorldPos(target = getCurrentViewAnchorTarget(), dateMs = getCurrentSolarDateMs()) {
            const mars = getPlanetWorldPos(solarPlanets.Mars.data, dateMs);
            const jupiter = getPlanetWorldPos(solarPlanets.Jupiter.data, dateMs);
            const beltRadius = mars.distanceTo(SOLAR_CENTER) * 0.45 + jupiter.distanceTo(SOLAR_CENTER) * 0.55;
            const radial = target.clone().sub(SOLAR_CENTER);
            if (radial.lengthSq() < 1e-6) radial.set(1, 0, 0);
            radial.normalize();
            return SOLAR_CENTER.clone().add(radial.multiplyScalar(beltRadius)).add(new THREE.Vector3(0, 1200, 0));
        }

        function getObserverVantageAnchor(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun': return getSolarBodyWorldPos('Sun');
                case 'From Mercury': return getSolarBodyWorldPos('Mercury');
                case 'From Venus': return getSolarBodyWorldPos('Venus');
                case 'From Earth': return getEarthWorldPosForView();
                case 'From Moon': return getMoonWorldPosForView();
                case 'From Mars': return getSolarBodyWorldPos('Mars');
                case 'From Astroid Belt': return getAstroidBeltWorldPos();
                case 'From Jupiter': return getSolarBodyWorldPos('Jupiter');
                case 'From Saturn': return getSolarBodyWorldPos('Saturn');
                case 'From Uranus': return getSolarBodyWorldPos('Uranus');
                case 'From Neptune': return getSolarBodyWorldPos('Neptune');
                default: return null;
            }
        }

        function getObserverFallbackTarget(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun':
                    return getSolarBodyWorldPos('Earth');
                case 'From Earth':
                    return activeView === 'earth-moon' ? moonGroup.position.clone() : getSolarBodyWorldPos('Sun');
                case 'From Moon':
                    return new THREE.Vector3(0, 0, 0);
                case 'From Mars':
                    return getSolarBodyWorldPos('Earth');
                case 'From Astroid Belt':
                    return SOLAR_CENTER.clone();
                default:
                    return SOLAR_CENTER.clone();
            }
        }

        function getObserverVantageStandOff(vantagePoint) {
            switch (vantagePoint) {
                case 'From Sun': return 2600;
                case 'From Moon': return 9;
                case 'From Astroid Belt': return 2800;
                case 'From Jupiter':
                case 'From Saturn':
                case 'From Uranus':
                case 'From Neptune':
                    return 32;
                default: return 16;
            }
        }

        function buildObserverVantagePayload(vantagePoint) {
            if (vantagePoint === 'From Space') {
                currentObserverVantagePoint = vantagePoint;
                return getObserverPayloadFromCamera(camera.position.clone(), controls.target.clone(), {
                    vantagePoint
                });
            }

            const anchor = getObserverVantageAnchor(vantagePoint);
            if (!anchor) {
                currentObserverVantagePoint = 'From Space';
                return getObserverPayloadFromCamera();
            }

            let lookTarget = getCurrentViewAnchorTarget();
            if (lookTarget.distanceToSquared(anchor) < 1) {
                lookTarget = getObserverFallbackTarget(vantagePoint);
            }

            const direction = lookTarget.clone().sub(anchor);
            if (direction.lengthSq() < 1e-6) direction.set(1, 0.12, 1);
            const position = anchor.clone().add(direction.normalize().multiplyScalar(getObserverVantageStandOff(vantagePoint)));
            currentObserverVantagePoint = vantagePoint;
            return getObserverPayloadFromCamera(position, lookTarget, {
                vantagePoint,
                view: activeView,
                cameraMode
            });
        }

        function parseObserverPayload() {
            const payload = JSON.parse(document.getElementById('observer-json').value);
            if (!payload || typeof payload !== 'object') {
                throw new Error('Observer JSON must be an object.');
            }
            if (!payload.target || typeof payload.target !== 'object') {
                throw new Error('Observer JSON requires a target object.');
            }

            const target = new THREE.Vector3(
                Number(payload.target.x),
                Number(payload.target.y),
                Number(payload.target.z)
            );
            if (!Number.isFinite(target.x) || !Number.isFinite(target.y) || !Number.isFinite(target.z)) {
                throw new Error('Target coordinates must be numeric.');
            }

            let position;
            if (
                Number.isFinite(Number(payload.distance)) &&
                Number.isFinite(Number(payload.azimuthDeg)) &&
                Number.isFinite(Number(payload.polarDeg))
            ) {
                position = target.clone().add(
                    new THREE.Vector3().setFromSpherical(
                        new THREE.Spherical(
                            Number(payload.distance),
                            THREE.MathUtils.degToRad(Number(payload.polarDeg)),
                            THREE.MathUtils.degToRad(Number(payload.azimuthDeg))
                        )
                    )
                );
            } else if (payload.position && typeof payload.position === 'object') {
                position = new THREE.Vector3(
                    Number(payload.position.x),
                    Number(payload.position.y),
                    Number(payload.position.z)
                );
            }

            if (!position || !Number.isFinite(position.x) || !Number.isFinite(position.y) || !Number.isFinite(position.z)) {
                throw new Error('Observer JSON needs numeric position or spherical values.');
            }

            return {
                view: payload.view,
                cameraMode: payload.cameraMode,
                vantagePoint: payload.vantagePoint || document.getElementById('vantagePoint').value || 'From Space',
                position,
                target
            };
        }

        function applyObserverCamera(position, target, viewOverride, cameraModeOverride, vantagePointOverride) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            zoomForwardAmount = 0;
            if (viewOverride) activeView = viewOverride;
            if (cameraModeOverride) cameraMode = cameraModeOverride;
            if (vantagePointOverride) currentObserverVantagePoint = vantagePointOverride;
            camera.position.copy(position);
            controls.target.copy(target);
            controls.update();
            syncActiveButtons();
        }

        function getCurrentForwardDirection() {
            const forward = controls.target.clone().sub(camera.position);
            if (forward.lengthSq() < 1e-6) forward.set(0, 0, -1);
            return forward.normalize();
        }

        function zoomCameraBy(scaleFactor) {
            targetPos = null;
            targetLook = null;
            controls.enabled = true;
            const offset = camera.position.clone().sub(controls.target);
            if (offset.lengthSq() < 1e-6) offset.set(0, 0, 1);
            const currentRadius = offset.length();
            const zoomingIn = scaleFactor < 1;
            const trackedView = cameraMode === 'follow-orion' || cameraMode === 'earth-moon' || cameraMode === 'mars-2033';
            const nearZoomThreshold = trackedView ? 12 : 2;
            if (zoomingIn && trackedView && currentRadius <= nearZoomThreshold) {
                zoomForwardAmount += Math.max(1.5, currentRadius * 0.42);
            } else if (!zoomingIn && zoomForwardAmount > 0) {
                zoomForwardAmount = Math.max(0, zoomForwardAmount - Math.max(1.5, currentRadius * 0.5));
            }
            const nextRadius = Math.max(1.2, currentRadius * scaleFactor);
            camera.position.copy(
                controls.target.clone().add(offset.normalize().multiplyScalar(nextRadius))
            );
            controls.update();
        }

        function clearActiveButtons() {
            document.getElementById('btn-follow').classList.remove('active');
            document.getElementById('btn-earth-moon').classList.remove('active');
            document.getElementById('btn-solar-system').classList.remove('active');
            document.getElementById('btn-mars-2033').classList.remove('active');
        }

        function setActiveViewButton(id) {
            clearActiveButtons();
            document.getElementById(id).classList.add('active');
        }

        function syncActiveButtons() {
            if (cameraMode === 'follow-orion') {
                setActiveViewButton('btn-follow');
                return;
            }

            setActiveViewButton(
                activeView === 'mars-2033' ? 'btn-mars-2033' :
                activeView === 'solar-system' ? 'btn-solar-system' :
                'btn-earth-moon'
            );
        }

        function getCurrentSceneDay(now = Date.now()) {
            if (scrubDay !== null) return scrubDay;
            if (paused && pausedDay !== null) return pausedDay;
            if (simStartReal !== null && simStartDay !== null) {
                return Math.max(0, simStartDay + (now - simStartReal) * speedMult / MS_PER_DAY);
            }
            return Math.max(0, (now - LAUNCH_TIME) / MS_PER_DAY);
        }

        function getCurrentSolarDateMs(now = Date.now()) {
            if (scrubSolarDateMs !== null) return scrubSolarDateMs;
            if (paused && pausedSolarDateMs !== null) return pausedSolarDateMs;
            if (simStartReal !== null && solarSimStartDateMs !== null) {
                return solarSimStartDateMs + (now - simStartReal) * speedMult;
            }
            return solarBaseDateMs;
        }

        function isMars2033TimelineView() {
            return activeView === 'mars-2033';
        }

        function clampMars2033DateMs(dateMs) {
            return Math.min(MARS_2033_RETURN_EARTH_MS, Math.max(MARS_2033_DEPART_EARTH_MS, dateMs));
        }

        function updatePlaybackButton() {
            const btn = document.getElementById('btn-play-pause');
            const icon = btn.querySelector('.timeline-playback-icon');
            const isPausedState = paused || scrubDay !== null || scrubSolarDateMs !== null;
            icon.innerHTML = isPausedState ? '&#9654;' : '&#10074;&#10074;';
            btn.setAttribute('aria-label', isPausedState ? 'Play playback' : 'Pause playback');
            btn.classList.toggle('sim-active', isPausedState);
            btn.classList.toggle('is-playing', !isPausedState);
        }

        window.onPlanetDateChange = (value) => {
            const nextDateMs = dateInputValueToMs(value);
            solarBaseDateMs = nextDateMs;
            scrubSolarDateMs = null;

            if (simStartReal !== null) {
                solarSimStartDateMs = nextDateMs;
            } else if (paused) {
                pausedSolarDateMs = nextDateMs;
            } else {
                solarSimStartDateMs = null;
                pausedSolarDateMs = null;
            }
        };

        // Follow Orion: orbit controls stay enabled, target tracks Orion
        window.toggleFollow = () => {
            if (cameraMode === 'follow-orion') {
                cameraMode = 'free';
                syncActiveButtons();
                setFocusHash(
                    activeView === 'mars-2033' ? 'mars2033' :
                    activeView === 'solar-system' ? 'solarsystem' :
                    'earthmoon'
                );
                return;
            }
            focusOrion();
        };

        window.focusEarth = () => {
            cameraMode = 'free';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            targetPos = new THREE.Vector3(0, eR * 6, eR * 8);
            targetLook = new THREE.Vector3(0, 0, 0);
            setFocusHash('earth');
        };

        window.focusMoon = () => {
            cameraMode = 'free';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            const mp = moonGroup.position;
            targetPos = new THREE.Vector3(mp.x + mR * 4, mp.y + mR * 6, mp.z + mR * 10);
            targetLook = mp.clone();
            setFocusHash('moon');
        };

        window.focusEarthMoon = () => {
            cameraMode = 'earth-moon';
            activeView = 'earth-moon';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            const mid = moonGroup.position.clone().multiplyScalar(0.45);
            mid.y = 0;
            targetPos = new THREE.Vector3(mid.x, 100, mid.z + 60);
            targetLook = mid.clone();
            setFocusHash('earthmoon');
        };

        window.focusSolarSystem = () => {
            cameraMode = 'solar-system';
            activeView = 'solar-system';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            targetPos = SOLAR_CENTER.clone().add(new THREE.Vector3(0, 165000, 435000));
            targetLook = SOLAR_CENTER.clone();
            setFocusHash('solarsystem');
        };

        window.focusMars2033 = () => {
            cameraMode = 'mars-2033';
            activeView = 'mars-2033';
            syncActiveButtons();
            controls.enabled = true;
            zoomForwardAmount = 0;
            targetPos = MARS_2033_INITIAL_CAMERA_POS.clone();
            targetLook = MARS_2033_INITIAL_CAMERA_TARGET.clone();
            solarBaseDateMs = MARS_2033_DEPART_EARTH_MS;
            scrubSolarDateMs = null;
            scrubbing = false;
            if (simStartReal !== null) solarSimStartDateMs = MARS_2033_DEPART_EARTH_MS;
            if (paused) pausedSolarDateMs = MARS_2033_DEPART_EARTH_MS;
            setFocusHash('mars2033');
        };

        window.focusOverview = window.focusEarthMoon;

        window.addEventListener('hashchange', applyFocusHash);

        window.zoomIn = () => zoomCameraBy(0.82);
        window.zoomOut = () => zoomCameraBy(1.22);

        window.openObserverSpecs = () => {
            const payload = getObserverPayloadFromCamera(camera.position.clone(), controls.target.clone(), {
                vantagePoint: currentObserverVantagePoint
            });
            document.getElementById('vantagePoint').value = payload.vantagePoint || 'From Space';
            setObserverJsonText(payload);
            setObserverEditorVisible(false);
            setObserverPanelVisible(true);
        };

        window.closeObserverSpecs = () => {
            setObserverPanelVisible(false);
        };

        window.toggleObserverSpecsEditor = () => {
            const advanced = document.getElementById('observer-specs-advanced');
            setObserverEditorVisible(!advanced.classList.contains('open'));
        };

        window.copyObserverJson = async () => {
            try {
                await writeClipboardText(document.getElementById('observer-json').value);
                pulseObserverControl('btn-observer-angle');
                pulseObserverControl('btn-copy-observer-json');
            } catch (error) {
                console.error(error);
            }
        };

        window.applyObserverSpecs = () => {
            try {
                const payload = parseObserverPayload();
                document.getElementById('vantagePoint').value = payload.vantagePoint;
                applyObserverCamera(payload.position, payload.target, payload.view, payload.cameraMode, payload.vantagePoint);
                setObserverJsonText(getObserverPayloadFromCamera(payload.position, payload.target, {
                    view: payload.view || activeView,
                    cameraMode: payload.cameraMode || cameraMode,
                    vantagePoint: payload.vantagePoint
                }));
            } catch (error) {
                console.error(error);
                alert(error.message);
            }
        };

        window.onVantagePointChange = (value) => {
            const payload = buildObserverVantagePayload(value);
            setObserverJsonText(payload);
            applyObserverCamera(
                new THREE.Vector3(payload.position.x, payload.position.y, payload.position.z),
                new THREE.Vector3(payload.target.x, payload.target.y, payload.target.z),
                payload.view,
                payload.cameraMode,
                payload.vantagePoint
            );
        };

        // Accelerate time
        window.toggleSimMenu = () => {
            document.getElementById('sim-dropdown').classList.toggle('open');
        };

        // Slider maps 0-100 → MIN_SIM_SPEED to MAX_SIM_SPEED (exponential)
        function sliderToSpeed(val) {
            const t = val / 100; // 0→1
            return Math.round(MIN_SIM_SPEED * Math.pow(MAX_SIM_SPEED / MIN_SIM_SPEED, t));
        }

        function speedToSlider(spd) {
            return Math.round(100 * Math.log(spd / MIN_SIM_SPEED) / Math.log(MAX_SIM_SPEED / MIN_SIM_SPEED));
        }

        window.setSpeed = (spd) => {
            simStartReal = Date.now();
            // Start simulation from scrub position if user was scrubbing, else from real time
            simStartDay = getCurrentSceneDay(simStartReal);
            solarSimStartDateMs = getCurrentSolarDateMs(simStartReal);
            scrubDay = null;
            scrubSolarDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            speedMult = spd;
            document.getElementById('sim-dropdown').classList.remove('open');
            document.getElementById('btn-sim').classList.add('sim-active');
            document.getElementById('btn-sim').textContent = `Accelerating ${spd.toLocaleString()}x`;
            document.getElementById('btn-reset').style.display = 'block';
            // Show slider and sync it
            document.getElementById('sim-slider-wrap').classList.add('visible');
            document.getElementById('sim-slider').value = speedToSlider(spd);
            document.getElementById('sim-slider-label').textContent = spd.toLocaleString() + 'x';
            updatePlaybackButton();
        };

        window.onSliderChange = (val) => {
            const spd = sliderToSpeed(Number(val));
            // Keep simStartReal but recalculate simStartDay from current simDay
            const now = Date.now();
            simStartDay = getCurrentSceneDay(now);
            solarSimStartDateMs = getCurrentSolarDateMs(now);
            simStartReal = now;
            scrubDay = null;
            scrubSolarDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            speedMult = spd;
            document.getElementById('btn-sim').textContent = `Accelerating ${spd.toLocaleString()}x`;
            document.getElementById('sim-slider-label').textContent = spd.toLocaleString() + 'x';
            document.getElementById('btn-reset').style.display = 'block';
            document.getElementById('sim-slider-wrap').classList.add('visible');
            updatePlaybackButton();
        };

        window.togglePlayback = () => {
            const now = Date.now();
            if (paused || scrubDay !== null || scrubSolarDateMs !== null) {
                const resumeDay = scrubDay !== null ? scrubDay : pausedDay;
                simStartDay = Math.max(0, resumeDay ?? getCurrentSceneDay(now));
                solarSimStartDateMs = scrubSolarDateMs ?? pausedSolarDateMs ?? getCurrentSolarDateMs(now);
                simStartReal = now;
                scrubDay = null;
                scrubSolarDateMs = null;
                paused = false;
                pausedDay = null;
                pausedSolarDateMs = null;
                document.getElementById('btn-reset').style.display = 'block';
            } else {
                pausedDay = getCurrentSceneDay(now);
                pausedSolarDateMs = getCurrentSolarDateMs(now);
                paused = true;
                simStartReal = null;
                simStartDay = null;
                solarSimStartDateMs = null;
                document.getElementById('btn-reset').style.display = 'block';
            }
            updatePlaybackButton();
        };

        window.resetRealTime = () => {
            speedMult = 1;
            simStartReal = null;
            simStartDay = null;
            solarSimStartDateMs = null;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            scrubDay = null;
            scrubSolarDateMs = null;
            document.getElementById('btn-sim').classList.remove('sim-active');
            document.getElementById('btn-sim').textContent = 'Accelerate';
            document.getElementById('btn-reset').style.display = 'none';
            document.getElementById('sim-slider-wrap').classList.remove('visible');
            updatePlaybackButton();
        };

        // Timeline scrub — user drags the mission timeline slider
        let scrubDay = null;
        let scrubbing = false;

        window.onTimelineScrub = (val) => {
            if (isMars2033TimelineView()) {
                const progress = val / 10000;
                scrubSolarDateMs = clampMars2033DateMs(
                    MARS_2033_DEPART_EARTH_MS + progress * MARS_2033_MISSION_DURATION_MS
                );
                scrubDay = null;
            } else {
                // Slider 0-10000 maps to TLI_DAY → MISSION_DAYS
                scrubDay = TLI_DAY + (val / 10000) * (MISSION_DAYS - TLI_DAY);
                scrubSolarDateMs = null;
            }
            scrubbing = true;
            paused = false;
            pausedDay = null;
            pausedSolarDateMs = null;
            simStartReal = null;
            simStartDay = null;
            solarSimStartDateMs = null;
            if (speedMult > 1) {
                speedMult = 1;
                document.getElementById('btn-sim').classList.remove('sim-active');
                document.getElementById('btn-sim').textContent = 'Accelerate';
                document.getElementById('btn-reset').style.display = 'none';
                document.getElementById('sim-slider-wrap').classList.remove('visible');
            }
            updatePlaybackButton();
        };

        // Detect when user finishes scrubbing
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('timeline-slider');
            const progressTrack = document.getElementById('progress-track');
            if (slider) {
                slider.addEventListener('pointerup', () => { scrubbing = false; });
                slider.addEventListener('touchend', () => { scrubbing = false; });
            }
            if (progressTrack && slider) {
                progressTrack.addEventListener('click', (event) => {
                    if (event.target === slider) return;
                    const rect = progressTrack.getBoundingClientRect();
                    const ratio = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
                    const value = Math.round(ratio * 10000);
                    slider.value = String(value);
                    window.onTimelineScrub(value);
                    scrubbing = false;
                });
            }
        });

        // Cancel camera animation as soon as user interacts
        ['pointerdown', 'wheel', 'touchstart'].forEach(evt => {
            renderer.domElement.addEventListener(evt, () => {
                targetPos = null;
                targetLook = null;
                currentObserverVantagePoint = 'From Space';
                zoomForwardAmount = 0;
            }, { passive: true });
        });

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.sim-group')) {
                document.getElementById('sim-dropdown').classList.remove('open');
            }
        });

        // ═══════════════════════════════════════════
        // ANIMATION LOOP
        // ═══════════════════════════════════════════
        let prevOrionPos = null;

        function animate() {
            requestAnimationFrame(animate);
            const now = Date.now();

            // Delta time (seconds)
            const dt = (now - prevFrameTime) / 1000;
            prevFrameTime = now;

            // Mission time (real for HUD)
            const realElapsed = now - LAUNCH_TIME;
            const realElapsedDays = Math.max(0, realElapsed / MS_PER_DAY);
            const realT = Math.max(0, Math.min(realElapsed / MISSION_DURATION_MS, 1.0));
            const realDay = realT * MISSION_DAYS;
            const solarDateMs = getCurrentSolarDateMs(now);
            const solarDate = new Date(solarDateMs);

            // Simulated time for 3D scene
            let simDayRaw;
            if (scrubDay !== null) {
                // User is scrubbing the timeline
                simDayRaw = scrubDay;
            } else if (paused && pausedDay !== null) {
                simDayRaw = pausedDay;
            } else if (simStartReal !== null && simStartDay !== null) {
                const dtMs = now - simStartReal;
                simDayRaw = simStartDay + (dtMs * speedMult) / MS_PER_DAY;
            } else {
                simDayRaw = realElapsedDays;
            }
            const simDay = Math.max(0, Math.min(simDayRaw, MISSION_DAYS));
            const simT = simDay / MISSION_DAYS;
            const starScale = activeView === 'solar-system' ? SOLAR_STAR_SCALE : 1;
            starBackgroundGroup.scale.lerp(
                new THREE.Vector3(starScale, starScale, starScale),
                0.08
            );

            // ── Update Solar System ──
            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                if (Math.abs(solarDateMs - planet.lastOrbitRefreshMs) >= 30 * MS_PER_DAY) {
                    refreshSolarOrbitGeometry(planet, solarDateMs);
                }
                planet.group.position.copy(getPlanetLocalPos(planet.data, solarDateMs));
                const heliocentricOrbitMode = activeView === 'solar-system' || activeView === 'mars-2033';
                const basePlanetVisualBoost = activeView === 'solar-system'
                    ? (name === 'Earth' || name === 'Mars' ? 40 : 28)
                    : activeView === 'mars-2033'
                    ? (name === 'Earth' || name === 'Mars' ? 9 : 6)
                    : 1;
                const zoomResponsiveBoost = heliocentricOrbitMode
                    ? Math.min(
                        activeView === 'solar-system' ? 5.5 : 4.5,
                        Math.max(
                            1,
                            camera.position.distanceTo(controls.target) / (activeView === 'solar-system' ? 180000 : 50000)
                        )
                    )
                    : 1;
                const planetVisualBoost = basePlanetVisualBoost * zoomResponsiveBoost;
                planet.visual.scale.setScalar(planetVisualBoost);
                planet.label.position.y = planet.baseLabelY + (planetVisualBoost - 1) * planet.bodyRadius * 1.35;
                planet.body.material.opacity = heliocentricOrbitMode ? 1 : 0.96;
                planet.marker.visible = activeView === 'solar-system' || activeView === 'mars-2033';
                planet.marker.material.opacity = activeView === 'solar-system' ? 0.96 : activeView === 'mars-2033' ? 0.92 : 0.8;
                planet.glow.material.opacity = activeView === 'mars-2033' ? 0.34 : activeView === 'solar-system' ? 0.48 : 0.18;
                if (planet.sprite) {
                    planet.sprite.material.opacity = activeView === 'mars-2033' ? 0.7 : activeView === 'solar-system' ? 0.92 : 0.42;
                }
                planet.orbitTube.material.opacity = heliocentricOrbitMode
                    ? (name === 'Earth' ? 0.26 : 0.18)
                    : 0;
                planet.orbitLine.material.opacity = heliocentricOrbitMode
                    ? Math.min(0.95, planet.orbitBaseOpacity + 0.36)
                    : planet.orbitBaseOpacity;
            }

            const mars2033EarthDepart = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS);
            const mars2033MarsArrive = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS);
            const mars2033MarsDepart = getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS);
            const mars2033EarthReturn = getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS);
            const mars2033OutHeight = Math.max(2000, mars2033EarthDepart.distanceTo(mars2033MarsArrive) * 0.12);
            const mars2033BackHeight = Math.max(2000, mars2033MarsDepart.distanceTo(mars2033EarthReturn) * 0.12);
            const mars2033Outbound = buildTransferSegment(mars2033EarthDepart, mars2033MarsArrive, mars2033OutHeight, 1200);
            const mars2033Stay = buildHoldArc(mars2033MarsArrive, mars2033Outbound[mars2033Outbound.length - 1], mars2033MarsDepart, mars2033OutHeight * 0.06).slice(1);
            const mars2033Return = buildTransferSegment(mars2033MarsDepart, mars2033EarthReturn, -mars2033BackHeight, 950).slice(1);
            const mars2033Pts = mars2033Outbound.concat(mars2033Stay, mars2033Return);
            mars2033TransferLine.geometry.dispose();
            mars2033TransferLine.geometry = new THREE.BufferGeometry().setFromPoints(mars2033Pts);
            mars2033TransferLine.computeLineDistances();
            const mars2033OutboundCount = Math.max(1, mars2033Outbound.length - 1);
            const mars2033StayCount = Math.max(1, mars2033Stay.length - 1);
            const mars2033ReturnCount = Math.max(1, mars2033Return.length - 1);
            const mars2033PointCount = Math.max(1, mars2033Pts.length - 1);
            let mars2033ProgressT = 0;
            if (solarDateMs < MARS_2033_ARRIVE_MARS_MS) {
                mars2033ProgressT = ((solarDateMs - MARS_2033_DEPART_EARTH_MS) / (MARS_2033_ARRIVE_MARS_MS - MARS_2033_DEPART_EARTH_MS)) * (mars2033OutboundCount / mars2033PointCount);
            } else if (solarDateMs < MARS_2033_DEPART_MARS_MS) {
                mars2033ProgressT =
                    (mars2033OutboundCount + ((solarDateMs - MARS_2033_ARRIVE_MARS_MS) / (MARS_2033_DEPART_MARS_MS - MARS_2033_ARRIVE_MARS_MS)) * mars2033StayCount) /
                    mars2033PointCount;
            } else if (solarDateMs < MARS_2033_RETURN_EARTH_MS) {
                mars2033ProgressT =
                    (mars2033OutboundCount + mars2033StayCount + ((solarDateMs - MARS_2033_DEPART_MARS_MS) / (MARS_2033_RETURN_EARTH_MS - MARS_2033_DEPART_MARS_MS)) * mars2033ReturnCount) /
                    mars2033PointCount;
            } else {
                mars2033ProgressT = 1;
            }
            const mars2033TraveledIdx = Math.min(
                mars2033Pts.length,
                Math.max(2, Math.ceil(Math.max(0, Math.min(1, mars2033ProgressT)) * mars2033PointCount) + 1)
            );
            mars2033TraveledLine.geometry.dispose();
            mars2033TraveledLine.geometry = new THREE.BufferGeometry().setFromPoints(mars2033Pts.slice(0, mars2033TraveledIdx));
            mars2033TransferGlow.geometry.dispose();
            mars2033TransferGlow.geometry = new THREE.BufferGeometry().setFromPoints(mars2033Pts);
            const showMars2033Transfer = activeView === 'mars-2033';
            mars2033TransferLine.visible = showMars2033Transfer;
            mars2033TraveledLine.visible = showMars2033Transfer;
            mars2033TransferGlow.visible = showMars2033Transfer;
            const mars2033CraftLocal = getMars2033VehicleLocalPos(
                solarDateMs,
                mars2033Outbound,
                mars2033Stay,
                mars2033Return
            );
            mars2033CraftGroup.position.copy(mars2033CraftLocal);
            mars2033CraftGroup.visible = showMars2033Transfer;
            mars2033Orb.material.opacity = 0.92;

            // ── Update Moon ──
            const moonKm = getMoonPos(simDay);
            moonGroup.position.set(moonKm.x * SCALE, moonKm.y * SCALE, moonKm.z * SCALE);

            // ── Update Orion ──
            const orionKm = getTrajectoryPos(simDay);
            const orionSc = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            orionGroup.position.copy(orionSc);

            // Orient along trajectory
            const nextKm = getTrajectoryPos(Math.min(simDay + 0.005, MISSION_DAYS));
            const dir = new THREE.Vector3().subVectors(
                new THREE.Vector3(nextKm.x, nextKm.y, nextKm.z),
                orionKm
            ).normalize();
            orionGroup.lookAt(orionSc.clone().add(dir.clone().multiplyScalar(SCALE)));

            // Beacon pulse
            beacon.material.opacity = 0.7 + 0.3 * Math.sin(now * 0.006);
            engineGlow.intensity = 2 + Math.sin(now * 0.004) * 1;

            // ── Traveled trajectory ──
            // trajPts maps data indices TLI_INDEX..TRAJ_N-1, 10 subdivisions each
            // Convert simDay to matching data index
            const dataIdx = (simDay - TRAJ_START_DAY) / TRAJ_STEP_DAYS;
            const trajIdx = Math.max(0, (dataIdx - TLI_INDEX) * 10);
            const traveledIdx = Math.min(trajPts.length, Math.max(2, Math.ceil(trajIdx)));
            const traveled = trajPts.slice(0, traveledIdx);
            traveledLine.geometry.dispose();
            traveledLine.geometry = new THREE.BufferGeometry().setFromPoints(traveled);

            // ── Earth-Moon line ──
            emLine.geometry.dispose();
            emLine.geometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, 0), moonGroup.position.clone()
            ]);
            emLine.computeLineDistances();

            // ── Earth rotation (360° in 24h, accelerated with sim) ──
            const earthAngularVel = (2 * Math.PI) / 86400; // rad/s
            earthMesh.rotation.y += earthAngularVel * dt * (speedMult > 1 ? speedMult : 1);

            // ── Sun orbital motion (Earth orbits Sun in 365.25 days) ──
            const sunAngularVel = (2 * Math.PI) / (365.25 * 86400); // rad/s
            sunAngle += sunAngularVel * dt * (speedMult > 1 ? speedMult : 1);
            const sunDist = AU_KM * SCALE;
            sunDir.position.set(
                Math.cos(sunAngle) * sunDist,
                80,
                -Math.sin(sunAngle) * sunDist * 0.5
            );

            // ── Camera ──
            // Animate transitions first (button clicks)
            if (targetPos) {
                camera.position.lerp(targetPos, 0.06);
                controls.target.lerp(targetLook, 0.06);
                if (camera.position.distanceTo(targetPos) < 1.0) {
                    targetPos = null;
                    targetLook = null;
                }
            }

            // After transition, continuously track targets (direct copy, no lerp = no fighting)
            if (!targetPos) {
                if (cameraMode === 'follow-orion') {
                    // Move camera with Orion — keep relative offset stable
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(orionSc).add(dolly);
                    camera.position.copy(orionSc).add(offset).add(dolly);
                } else if (cameraMode === 'earth-moon') {
                    const mid = moonGroup.position.clone().multiplyScalar(0.45);
                    mid.y = 0;
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(mid).add(dolly);
                    camera.position.copy(mid).add(offset).add(dolly);
                }
            }

            controls.update();
            if (activeView === 'solar-system') {
                starBackgroundGroup.position.lerp(SOLAR_CENTER, 0.12);
            } else {
                starBackgroundGroup.position.copy(camera.position);
            }
            syncActiveButtons();

            // Labels face camera
            earthLabel.lookAt(camera.position);
            moonLabel.lookAt(camera.position);
            orionLabel.lookAt(camera.position);
            mars2033CraftLabel.lookAt(camera.position);
            for (const name in solarPlanets) {
                solarPlanets[name].label.lookAt(camera.position);
            }

            // ═══ HUD UPDATE — uses simDay during simulation/scrub ═══
            const hudDay = (scrubDay !== null || speedMult > 1) ? simDay : realDay;
            const hudT = hudDay / MISSION_DAYS;
            const hudElapsedMs = hudDay * MS_PER_DAY;
            const mars2033TimelineMs = clampMars2033DateMs(solarDateMs);
            const mars2033Progress = (mars2033TimelineMs - MARS_2033_DEPART_EARTH_MS) / MARS_2033_MISSION_DURATION_MS;
            const mars2033MissionDay = Math.max(0, (mars2033TimelineMs - MARS_2033_DEPART_EARTH_MS) / MS_PER_DAY);
            const mars2033ArrivalProgress = (MARS_2033_ARRIVE_MARS_MS - MARS_2033_DEPART_EARTH_MS) / MARS_2033_MISSION_DURATION_MS;
            const mars2033DepartMarsProgress = (MARS_2033_DEPART_MARS_MS - MARS_2033_DEPART_EARTH_MS) / MARS_2033_MISSION_DURATION_MS;

            // Human-readable date/time in user's timezone
            const missionDate = new Date(LAUNCH_TIME + hudElapsedMs);
            const solarDateValue = msToDateInputValue(solarDateMs);
            if (solarDateValue !== lastPlanetDateInputValue) {
                document.getElementById('planet-date-input').value = solarDateValue;
                lastPlanetDateInputValue = solarDateValue;
            }

            if (activeView === 'solar-system' || activeView === 'mars-2033') {
                document.getElementById('timeline-title-text').textContent = 'Planet Date';
                document.getElementById('met-display').textContent = solarDate.toLocaleDateString(undefined, {
                    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC'
                });
            } else {
                const dateStr = missionDate.toLocaleDateString(undefined, {
                    weekday: 'short', month: 'short', day: 'numeric'
                });
                const timeStr = missionDate.toLocaleTimeString(undefined, {
                    hour: '2-digit', minute: '2-digit', hour12: false
                });
                document.getElementById('timeline-title-text').textContent = 'Mission Time';
                document.getElementById('met-display').textContent = `${dateStr}, ${timeStr}`;
            }
            document.getElementById('mission-name').textContent =
                activeView === 'mars-2033' ? 'MARS 2033' : 'ARTEMIS II';

            // Update timeline slider (only when not being dragged)
            if (!scrubbing) {
                const sliderVal = isMars2033TimelineView()
                    ? mars2033Progress * 10000
                    : Math.max(0, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY)) * 10000;
                document.getElementById('timeline-slider').value = Math.round(Math.min(10000, sliderVal));
            }
            // Update slider gradient fill
            const pct = isMars2033TimelineView()
                ? Math.max(0, Math.min(100, mars2033Progress * 100))
                : Math.max(0, Math.min(100, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY) * 100));
            document.getElementById('timeline-slider').style.background =
                `linear-gradient(90deg, #ff6b35 0%, #6ec6ff ${pct}%, rgba(255,255,255,0.08) ${pct}%)`;

            // Phase labels
            if (isMars2033TimelineView()) {
                [
                    ['pl-launch', 'Depart', 0, 0.03],
                    ['pl-tli', 'Cruise', 0.03, mars2033ArrivalProgress],
                    ['pl-transit', 'Arrive Mars', mars2033ArrivalProgress, Math.min(1, mars2033ArrivalProgress + 0.03)],
                    ['pl-flyby', 'Stay', Math.min(1, mars2033ArrivalProgress + 0.03), mars2033DepartMarsProgress],
                    ['pl-return', 'Depart Mars', mars2033DepartMarsProgress, Math.min(1, mars2033DepartMarsProgress + 0.03)],
                    ['pl-reentry', 'Return', Math.min(1, mars2033DepartMarsProgress + 0.03), 1.0001]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    el.textContent = label;
                    el.classList.toggle('active', mars2033Progress >= start && mars2033Progress < end);
                });
            } else {
                [['pl-launch','Launch',0,0.106],['pl-tli','TLI',0.106,0.15],['pl-transit','Transit',0.15,0.53],
                 ['pl-flyby','Flyby',0.53,0.63],['pl-return','Return',0.63,0.95],['pl-reentry','Entry',0.95,1]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    el.textContent = label;
                    el.classList.toggle('active', hudT >= start && hudT < end);
                });
            }

            // Phase text (matches real Artemis II timeline)
            let phase = 'Mission Complete';
            if (isMars2033TimelineView()) {
                if (mars2033TimelineMs < MARS_2033_ARRIVE_MARS_MS) phase = 'Outbound Transfer';
                else if (mars2033TimelineMs < MARS_2033_DEPART_MARS_MS) phase = 'Mars Surface Window';
                else if (mars2033TimelineMs < MARS_2033_RETURN_EARTH_MS) phase = 'Return Transfer';
                else phase = 'Earth Return';
            } else {
                if (hudDay < 1.06) phase = 'Earth Orbit';
                else if (hudDay < 1.5) phase = 'Translunar Injection';
                else if (hudDay < 5.3) phase = 'Translunar Coast';
                else if (hudDay < 6.3) phase = 'Lunar Flyby';
                else if (hudDay < 9.5) phase = 'Return Transit';
                else if (hudDay < 10) phase = 'Re-entry';
            }
            document.getElementById('phase-text').textContent = phase;

            // MET counter
            const metMs = isMars2033TimelineView()
                ? Math.max(0, mars2033TimelineMs - MARS_2033_DEPART_EARTH_MS)
                : Math.max(0, hudElapsedMs);
            const metD = Math.floor(metMs / MS_PER_DAY);
            const metH = Math.floor((metMs % MS_PER_DAY) / 3600000);
            const metM = Math.floor((metMs % 3600000) / 60000);
            const metS = Math.floor((metMs % 60000) / 1000);
            document.getElementById('met-counter').textContent =
                `T+${String(metD).padStart(2,'0')}:${String(metH).padStart(2,'0')}:${String(metM).padStart(2,'0')}:${String(metS).padStart(2,'0')}`;

            // Distances
            const dEarth = Math.max(0, orionKm.length() - EARTH_RADIUS_KM);
            const dMoon = Math.max(0, orionKm.clone().sub(moonKm).length() - MOON_RADIUS_KM);

            document.getElementById('dist-earth').textContent = formatKm(dEarth);
            document.getElementById('dist-moon').textContent = formatKm(dMoon);

            // Velocity
            const velStep = 0.002;
            const prevKm = getTrajectoryPos(Math.max(0, simDay - velStep));
            const vel = orionKm.clone().sub(prevKm).length() / (velStep * 86400);
            document.getElementById('velocity').textContent = vel.toFixed(2);

            // Mission day
            document.getElementById('mission-day').textContent = isMars2033TimelineView()
                ? `Day ${Math.floor(mars2033MissionDay) + 1} of ${Math.round(MARS_2033_MISSION_DAYS)}`
                : `Day ${Math.floor(hudDay) + 1} of 10`;

            // Render
            composer.render();
        }

        // ═══════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════
        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
            composer.setSize(innerWidth, innerHeight);
        });

        // Start in Earth & Moon mode and seed solar-system positions
        (() => {
            const now = Date.now();
            const elapsed = now - LAUNCH_TIME;
            const t = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0));
            const day = t * MISSION_DAYS;
            document.getElementById('planet-date-input').value = msToDateInputValue(solarBaseDateMs);
            lastPlanetDateInputValue = msToDateInputValue(solarBaseDateMs);

            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                planet.group.position.copy(getPlanetLocalPos(planet.data, solarBaseDateMs));
                refreshSolarOrbitGeometry(planet, solarBaseDateMs);
            }

            const moonKm = getMoonPos(day);
            moonGroup.position.set(moonKm.x * SCALE, moonKm.y * SCALE, moonKm.z * SCALE);
            const mid = moonGroup.position.clone().multiplyScalar(0.45);
            mid.y = 0;
            camera.position.set(mid.x, 100, mid.z + 60);
            controls.target.copy(mid);
            controls.update();
            starBackgroundGroup.position.copy(camera.position);
            cameraMode = 'earth-moon';
            activeView = 'earth-moon';
            syncActiveButtons();
            updatePlaybackButton();
            if (getHashFocusValue()) applyFocusHash();
            else setFocusHash('earthmoon');
        })();

        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);

        animate();
    </script>
</body>
</html>
