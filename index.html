                        camera.position.copy(focusAnchor).add(offset).add(dolly).add(trackedPanOffset);
                    }
                } else if (cameraMode === 'earth-moon') {
                    const mid = getEarthMoonViewCenter();
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(mid).add(dolly).add(trackedPanOffset);
                    camera.position.copy(mid).add(offset).add(dolly).add(trackedPanOffset);
                } else if (cameraMode === 'event') {
                    const offset = camera.position.clone().sub(controls.target);
                    const dolly = getCurrentForwardDirection().multiplyScalar(zoomForwardAmount);
                    controls.target.copy(activeEventWorldPos).add(dolly).add(trackedPanOffset);
                    camera.position.copy(activeEventWorldPos).add(offset).add(dolly).add(trackedPanOffset);
                }
            }

            controls.update();
            if (cameraMode === 'follow-orion' || cameraMode === 'focus-earth' || cameraMode === 'focus-moon' || cameraMode === 'earth-moon' || cameraMode === 'event') {
                if (!lastTrackedAutoTarget) {
                    lastTrackedAutoTarget = new THREE.Vector3();
                }
                lastTrackedAutoTarget.copy(controls.target);
            } else {
                lastTrackedAutoTarget = null;
            }
            if (activeView === 'solar-system') {
                starBackgroundGroup.position.lerp(SOLAR_CENTER, 0.12);
            } else {
                starBackgroundGroup.position.copy(camera.position);
            }
            syncActiveButtons();

            // Labels face camera
            earthLabel.lookAt(camera.position);
            moonLabel.lookAt(camera.position);
            sphereLabel.lookAt(camera.position);
            eventModelLabel.lookAt(camera.position);
            mars2033CraftLabel.lookAt(camera.position);
            for (const name in solarPlanets) {
                solarPlanets[name].label.lookAt(camera.position);
            }

            // ═══ HUD UPDATE — uses simDay during simulation/scrub ═══
            const hudDay = isModelTimelineDriven() ? simDay : realDay;
            const hudT = hudDay / MISSION_DAYS;
            const hudElapsedMs = hudDay * MS_PER_DAY;
            const missionTimelineMs = clampMissionDateMs(solarDateMs);
            const missionProgress = (missionTimelineMs - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs);
            const missionDay = Math.max(0, (missionTimelineMs - currentEventStartMs) / MS_PER_DAY);
            const marsArrivalProgress = currentEventKind === 'mars'
                ? (MARS_2033_ARRIVE_MARS_MS - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs)
                : 0;
            const marsDepartProgress = currentEventKind === 'mars'
                ? (MARS_2033_DEPART_MARS_MS - currentEventStartMs) / Math.max(MS_PER_DAY, currentEventEndMs - currentEventStartMs)
                : 0;
            const planetDateInputEl = document.getElementById('planet-date-input');
            const timelineTitleTextEl = document.getElementById('timeline-title-text');
            const metDisplayEl = document.getElementById('met-display');
            const missionNameEl = document.getElementById('mission-name');
            const timelineSliderEl = document.getElementById('timeline-slider');
            const currentTimeMarkerEl = document.getElementById('timeline-current-marker');
            const arriveMarkerEl = document.getElementById('timeline-marker-arrive');
            const departMarkerEl = document.getElementById('timeline-marker-depart');
            const phaseTextEl = document.getElementById('phase-text');
            const metCounterEl = document.getElementById('met-counter');
            const distEarthEl = document.getElementById('dist-earth');
            const distMoonEl = document.getElementById('dist-moon');
            const velocityEl = document.getElementById('velocity');
            const missionDayEl = document.getElementById('mission-day');
            const hudDomUpdateKey = [
                currentEventId,
                activeView,
                cameraMode,
                paused ? 'paused' : 'running',
                scrubbing ? 'scrubbing' : 'steady',
                telemetryDistanceToggleShowsMoon ? 'moon' : 'earth'
            ].join('|');
            const hudDomNow = Date.now();
            const shouldUpdateHudDom = hudDomUpdateKey !== lastHudDomUpdateKey || (hudDomNow - lastHudDomUpdateMs) >= 250;
            if (shouldUpdateHudDom) {
                lastHudDomUpdateKey = hudDomUpdateKey;
                lastHudDomUpdateMs = hudDomNow;
            }

            // Human-readable date/time in user's timezone
            const missionDate = new Date(LAUNCH_TIME + hudElapsedMs);
            const solarDateValue = msToDateInputValue(solarDateMs);
            if (shouldUpdateHudDom && solarDateValue !== lastPlanetDateInputValue) {
                setValueIfChanged(planetDateInputEl, solarDateValue);
                lastPlanetDateInputValue = solarDateValue;
            }

            if (shouldUpdateHudDom) {
                if (activeView === 'solar-system' || isEventView()) {
                    setTextIfChanged(timelineTitleTextEl, 'Planet Date');
                    setTextIfChanged(metDisplayEl, solarDate.toLocaleDateString(undefined, {
                        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC'
                    }));
                } else {
                    const dateStr = missionDate.toLocaleDateString(undefined, {
                        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
                    });
                    const timeStr = missionDate.toLocaleTimeString(undefined, {
                        hour: '2-digit', minute: '2-digit', hour12: false
                    });
                    setTextIfChanged(timelineTitleTextEl, 'Mission Time');
                    setTextIfChanged(metDisplayEl, `${dateStr}, ${timeStr}`);
                }
                setTextIfChanged(missionNameEl, currentEventName);
            }

            // Update timeline slider (only when not being dragged)
            if (shouldUpdateHudDom && !scrubbing) {
                const sliderVal = isEventTimelineView()
                    ? missionProgress * 10000
                    : Math.max(0, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY)) * 10000;
                setValueIfChanged(timelineSliderEl, Math.round(Math.min(10000, sliderVal)));
            }
            // Update slider gradient fill
            const pct = isEventTimelineView()
                ? Math.max(0, Math.min(100, missionProgress * 100))
                : Math.max(0, Math.min(100, (hudDay - TLI_DAY) / (MISSION_DAYS - TLI_DAY) * 100));
            if (shouldUpdateHudDom) {
                setStyleIfChanged(
                    timelineSliderEl,
                    'background',
                    `linear-gradient(90deg, #ff6b35 0%, #6ec6ff ${pct}%, rgba(255,255,255,0.08) ${pct}%)`
                );
                if (isEventTimelineView() && currentEventKind === 'mars') {
                    setStyleIfChanged(arriveMarkerEl, 'left', `${marsArrivalProgress * 100}%`);
                    setStyleIfChanged(departMarkerEl, 'left', `${marsDepartProgress * 100}%`);
                    toggleClassIfChanged(arriveMarkerEl, 'visible', true);
                    toggleClassIfChanged(departMarkerEl, 'visible', true);
                } else {
                    toggleClassIfChanged(arriveMarkerEl, 'visible', false);
                    toggleClassIfChanged(departMarkerEl, 'visible', false);
                }
            }
            if (currentTimeMarkerEl) {
                const missionHasStarted = currentEventStartMs <= Date.now();
                const markerVisible = missionHasStarted && missionTimelineMs >= currentEventStartMs && missionTimelineMs <= currentEventEndMs;
                toggleClassIfChanged(currentTimeMarkerEl, 'visible', markerVisible);
                if (markerVisible) {
                    setStyleIfChanged(currentTimeMarkerEl, 'left', `${pct}%`);
                }
            }

            // Phase labels
            if (shouldUpdateHudDom && currentEventKind === 'mars') {
                const labels = currentEventPhaseLabels || ['Depart', '', 'Arrive Mars', 'Stay', 'Depart Mars', 'Return'];
                [
                    ['pl-launch', labels[0] || 'Depart', 0, 0.03],
                    ['pl-tli', labels[1] || '', 0.03, marsArrivalProgress],
                    ['pl-transit', labels[2] || 'Arrive Mars', marsArrivalProgress, Math.min(1, marsArrivalProgress + 0.03)],
                    ['pl-flyby', labels[3] || 'Stay', Math.min(1, marsArrivalProgress + 0.03), marsDepartProgress],
                    ['pl-return', labels[4] || 'Depart Mars', marsDepartProgress, Math.min(1, marsDepartProgress + 0.03)],
                    ['pl-reentry', labels[5] || 'Return', Math.min(1, marsDepartProgress + 0.03), 1.0001]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    setTextIfChanged(el, label);
                    toggleClassIfChanged(el, 'active', missionProgress >= start && missionProgress < end);
                });
                setStyleIfChanged(document.getElementById('pl-transit'), 'transform', 'translateX(-20px)');
                setStyleIfChanged(document.getElementById('pl-flyby'), 'transform', 'translateX(-10px)');
            } else if (shouldUpdateHudDom && currentEventKind !== 'orion') {
                const labels = currentEventPhaseLabels || ['Launch', 'Phase 2', 'Phase 3', 'Phase 4', 'Phase 5', 'Complete'];
                const boundaries = [0, 1 / 6, 2 / 6, 3 / 6, 4 / 6, 5 / 6, 1.0001];
                ['pl-launch', 'pl-tli', 'pl-transit', 'pl-flyby', 'pl-return', 'pl-reentry'].forEach((id, index) => {
                    const el = document.getElementById(id);
                    setTextIfChanged(el, labels[index] || '');
                    toggleClassIfChanged(el, 'active', missionProgress >= boundaries[index] && missionProgress < boundaries[index + 1]);
                });
                setStyleIfChanged(document.getElementById('pl-transit'), 'transform', '');
                setStyleIfChanged(document.getElementById('pl-flyby'), 'transform', '');
            } else if (shouldUpdateHudDom) {
                [['pl-launch','Launch',0,0.106],['pl-tli','TLI',0.106,0.15],['pl-transit','Transit',0.15,0.53],
                 ['pl-flyby','Flyby',0.53,0.63],['pl-return','Return',0.63,0.95],['pl-reentry','Entry',0.95,1]
                ].forEach(([id, label, start, end]) => {
                    const el = document.getElementById(id);
                    setTextIfChanged(el, label);
                    toggleClassIfChanged(el, 'active', hudT >= start && hudT < end);
                });
                setStyleIfChanged(document.getElementById('pl-transit'), 'transform', '');
                setStyleIfChanged(document.getElementById('pl-flyby'), 'transform', '');
            }

            // Phase text (matches real Artemis II timeline)
            let phase = currentEventPhaseText || 'Mission Complete';
            if (currentEventKind === 'mars') {
                if (missionTimelineMs < MARS_2033_ARRIVE_MARS_MS) phase = 'Outbound Transfer';
                else if (missionTimelineMs < MARS_2033_DEPART_MARS_MS) phase = 'Mars Surface Window';
                else if (missionTimelineMs < MARS_2033_RETURN_EARTH_MS) phase = 'Return Transfer';
                else phase = 'Earth Return';
            } else if (currentEventKind !== 'orion') {
                if (currentEventPhaseText) {
                    phase = currentEventPhaseText;
                } else {
                    const labels = currentEventPhaseLabels || ['Mission In Progress'];
                    const index = Math.min(labels.length - 1, Math.max(0, Math.floor(missionProgress * labels.length)));
                    phase = labels[index] || 'Mission In Progress';
                }
            } else {
                if (hudDay < 1.06) phase = 'Earth Orbit';
                else if (hudDay < 1.5) phase = 'Translunar Injection';
                else if (hudDay < 5.3) phase = 'Translunar Coast';
                else if (hudDay < 6.3) phase = 'Lunar Flyby';
                else if (hudDay < 9.5) phase = 'Return Transit';
                else if (hudDay < 10) phase = 'Re-entry';
            }
            if (shouldUpdateHudDom) {
                setTextIfChanged(phaseTextEl, phase);
            }

            // MET counter
            const metMs = isEventTimelineView()
                ? Math.max(0, missionTimelineMs - currentEventStartMs)
                : Math.max(0, hudElapsedMs);
            const metD = Math.floor(metMs / MS_PER_DAY);
            const metH = Math.floor((metMs % MS_PER_DAY) / 3600000);
            const metM = Math.floor((metMs % 3600000) / 60000);
            const metS = Math.floor((metMs % 60000) / 1000);
            if (shouldUpdateHudDom) {
                setTextIfChanged(
                    metCounterEl,
                    `T+${String(metD).padStart(2,'0')}:${String(metH).padStart(2,'0')}:${String(metM).padStart(2,'0')}:${String(metS).padStart(2,'0')}`
                );
            }

            // Distances
            const activeCraftWorld = currentEventKind === 'orion' ? orionWorld : activeEventWorldPos;
            const dEarth = Math.max(0, activeCraftWorld.distanceTo(earthGroup.position) / SCALE - EARTH_RADIUS_KM);
            const dMoon = Math.max(0, activeCraftWorld.distanceTo(moonGroup.position) / SCALE - MOON_RADIUS_KM);
            const formattedEarthDistance = formatKm(dEarth);
            const formattedMoonDistance = formatKm(dMoon);
            const showMoonInPrimaryDistanceSlot = telemetryDistanceToggleShowsMoon && getTrackerWidth() <= 500;

            if (shouldUpdateHudDom) {
                setTextIfChanged(distEarthEl, showMoonInPrimaryDistanceSlot ? formattedMoonDistance : formattedEarthDistance);
                setTextIfChanged(distMoonEl, formattedMoonDistance);
            }

            // Velocity
            const velStep = 0.002;
            const prevOrionKm = getTrajectoryPos(Math.max(0, simDay - velStep));
            const prevCraftWorld = currentEventKind === 'orion'
                ? earthWorld.clone().add(new THREE.Vector3(prevOrionKm.x * SCALE, prevOrionKm.y * SCALE, prevOrionKm.z * SCALE))
                : missionRoutePointsWorld.length
                ? samplePathPoints(missionRoutePointsWorld, Math.max(0, missionProgressT - velStep))
                : activeEventWorldPos.clone();
            const vel = activeCraftWorld.distanceTo(prevCraftWorld) / SCALE / (velStep * 86400);
            if (shouldUpdateHudDom) {
                setTextIfChanged(velocityEl, vel.toFixed(2));
            }

            // Mission day
            if (shouldUpdateHudDom) {
                setTextIfChanged(
                    missionDayEl,
                    isEventTimelineView()
                        ? `Day ${Math.floor(missionDay) + 1} of ${Math.max(1, Math.round((currentEventEndMs - currentEventStartMs) / MS_PER_DAY))}`
                        : `Day ${Math.floor(hudDay) + 1} of ${Math.round(MISSION_DAYS)}`
                );
                setTelemetryReadyIfPopulated();
            }

            const currentEventComplete = currentEventDisableCompletion
                ? false
                : currentEventKind === 'orion'
                ? hudDay >= MISSION_DAYS - 0.001
                : missionTimelineMs >= currentEventEndMs - 1000;
            setRestartButtonVisible(currentEventComplete);
            if (currentEventComplete && !paused) {
                paused = true;
                simStartReal = null;
                simStartDay = null;
                scrubDay = null;
                scrubSolarDateMs = null;
                if (currentEventKind === 'orion') {
                    pausedDay = MISSION_DAYS;
                    pausedSolarDateMs = getEventDateMs(MISSION_DAYS);
                } else {
                    pausedDay = null;
                    pausedSolarDateMs = currentEventEndMs;
                }
                updatePlaybackButton();
            }

            // Render
            composer.render();
        }

        // ═══════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════
        function updateTrackerLayoutSize() {
            camera.aspect = getTrackerWidth() / getTrackerHeight();
            camera.updateProjectionMatrix();
            renderer.setSize(getTrackerWidth(), getTrackerHeight());
            composer.setSize(getTrackerWidth(), getTrackerHeight());
            syncMobileControlsFooter();
            updateOverviewButtonText();
            refreshSpeedControls();
        }

        window.addEventListener('resize', updateTrackerLayoutSize);
        if (typeof ResizeObserver !== 'undefined' && trackerRoot) {
            new ResizeObserver(() => updateTrackerLayoutSize()).observe(trackerRoot);
        }

        async function initializeApp() {
            const initialEventId = getRequestedEventId();
            const initialSpec = await loadEventSpecById(initialEventId);
            primeEventUi(initialSpec);
            await applyEventSpecById(initialEventId, { updateHash: !getHashEventValue(), focusDefaultView: false });
            if (currentEventKind === 'orion') {
                await ensureHistoricOrionTrajectoryLoaded();
            }
            await new Promise((r) => setTimeout(r, 0));
            const now = Date.now();
            const elapsed = now - LAUNCH_TIME;
            const t = Math.max(0, Math.min(elapsed / MISSION_DURATION_MS, 1.0));
            const day = t * MISSION_DAYS;
            document.getElementById('planet-date-input').value = msToDateInputValue(solarBaseDateMs);
            lastPlanetDateInputValue = msToDateInputValue(solarBaseDateMs);

            const initialMissionDateMs = currentEventKind === 'orion' ? getEventDateMs(day) : solarBaseDateMs;
            for (const name in solarPlanets) {
                const planet = solarPlanets[name];
                planet.group.position.copy(getPlanetLocalPos(planet.data, initialMissionDateMs));
                refreshSolarOrbitGeometry(planet, initialMissionDateMs);
            }

            const earthWorld = getPlanetWorldPos(solarPlanets.Earth.data, initialMissionDateMs);
            earthGroup.position.copy(earthWorld);
            const moonOffset = currentEventKind === 'orion'
                ? getMoonOffsetForOrionDay(day)
                : getMoonOffsetForDateMs(initialMissionDateMs);
            moonOrbitVisualGroup.position.copy(earthWorld);
            moonGroup.position.copy(earthWorld.clone().add(moonOffset));
            const initialMoonOrbitPts = currentEventKind === 'orion'
                ? buildMoonOrbitPointsAroundOrionDay(day, 240)
                : buildMoonOrbitPointsAroundDate(initialMissionDateMs, 27.321661, 240);
            moonOrbitReferenceLine.geometry.dispose();
            moonOrbitReferenceLine.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonOrbitPts);
            moonOrbitReferenceGlow.geometry.dispose();
            moonOrbitReferenceGlow.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonOrbitPts);
            const initialMoonArcPts = currentEventKind === 'orion'
                ? buildMoonOrbitPointsAroundOrionDay(day, 180)
                : buildMoonOrbitPointsAroundDate(initialMissionDateMs, 27.321661, 180);
            moonOrbitCurrentArc.geometry.dispose();
            moonOrbitCurrentArc.geometry = new THREE.BufferGeometry().setFromPoints(initialMoonArcPts);
            lastMoonOrbitRefreshMs = currentEventKind === 'orion' ? day : initialMissionDateMs;
            const orionKm = getTrajectoryPos(day);
            const orionOffset = new THREE.Vector3(orionKm.x * SCALE, orionKm.y * SCALE, orionKm.z * SCALE);
            const orionWorld = earthWorld.clone().add(orionOffset);
            trajectoryGroup.position.copy(earthWorld);
            trajectoryGroup.visible = currentEventKind === 'orion';
            activeEventWorldPos.copy(
                currentEventKind === 'orion'
                    ? orionWorld
                    : currentEventKind === 'mars'
                    ? getMars2033VehicleLocalPos(
                        initialMissionDateMs,
                        buildTransferSegment(
                            getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS),
                            getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS),
                            Math.max(2000, getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_DEPART_EARTH_MS).distanceTo(getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS)) * 0.12),
                            1200
                        ),
                        buildPlanetTimedPath(solarPlanets.Mars.data, MARS_2033_ARRIVE_MARS_MS, MARS_2033_DEPART_MARS_MS, 10).slice(1),
                        buildTransferSegment(
                            getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS),
                            getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS),
                            -Math.max(2000, getPlanetLocalPos(solarPlanets.Mars.data, MARS_2033_DEPART_MARS_MS).distanceTo(getPlanetLocalPos(solarPlanets.Earth.data, MARS_2033_RETURN_EARTH_MS)) * 0.12),
                            950
                        ).slice(1)
                    ).add(SOLAR_CENTER)
                    : currentEventKind === 'earth-orbit' && currentEventEarthOrbit
                    ? earthWorld.clone().add(getEarthOrbitEventLocalPos(currentEventEarthOrbit, initialMissionDateMs))
                    : currentEventKind === 'orbit' && currentEventOrbit
                    ? getOrbitEventLocalPos(currentEventOrbit, initialMissionDateMs).add(SOLAR_CENTER)
                    : getCustomEventWorldPos(initialMissionDateMs, currentEventSegments)
            );
            sphereCraftGroup.position.copy(activeEventWorldPos);
            eventModelGroup.position.copy(getEventModelWorldPos(activeEventWorldPos));
            mars2033CraftGroup.position.copy(activeEventWorldPos.clone().sub(SOLAR_CENTER));
            document.getElementById('event').value = currentEventId;
            syncEventVehicleVisibility();
            updateFollowButtonText();
            const mid = getEarthMoonViewCenter();
            const earthMoonFocusCamera = getEventFocusCamera('earthMoon', mid);
            camera.position.copy(earthMoonFocusCamera.position);
            controls.target.copy(earthMoonFocusCamera.target);
            controls.update();
            starBackgroundGroup.position.copy(camera.position);
            if (getHashFollowValue() || getHashFocusValue()) applyFocusHash();
            else if (currentEventOverviewView === 'event') focusEventView(false, true, currentEventPreserveStartupCamera);
            else {
                focusOverview(false);
                setFocusHash('overview');
            }
            updatePlaybackButton();
        }

        hydrateEventMenu(INITIAL_EVENT_ID);
        animate();
        initializeApp()
            .then(() => {
                if (currentEventKind === 'orion') {
                    setTrajectorySourceLabel('Loading NASA AROW Ephemeris...');
                    ensureOrionArowLoaded();
                } else {
                    setTrajectorySourceLabel('Embedded JPL Horizons Fallback');
                }
                document.getElementById('loading').classList.add('hidden');
            })
            .catch((error) => {
                console.error(error);
                document.getElementById('loading').classList.add('hidden');
            });
    </script>
    </div>
</body>
</html>
